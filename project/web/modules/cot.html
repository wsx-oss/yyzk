<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoT智能决策</title>
  <link rel="icon" type="image/jpeg" href="/app/logo.jpg" />
  <link rel="stylesheet" href="/app/modules/common.css" />
  <style>
    .module-title::before { content: "\1F9E0"; }
    .cot-header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
    .cot-header-row .module-title { margin-bottom: 0; }
    .cot-header-btns { display: flex; gap: 8px; flex-wrap: wrap; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: #fff; border-radius: 12px; padding: 28px; width: 680px; max-width: 95vw; max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

    /* Pagination */
    .pagination-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding: 12px 0; font-size: 13px; color: #64748b; }
    .pagination-bar button { padding: 6px 14px; border: 1px solid #e2e8f0; border-radius: 10px; background: #fff; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .pagination-bar button:hover:not(:disabled) { background: #f1f5f9; border-color: #cbd5e1; }
    .pagination-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-action { padding: 4px 12px; font-size: 12px; border-radius: 8px; }
    
    /* Task type badges */
    .task-type-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .task-type-scheduling { background: #e0e7ff; color: #3730a3; }
    .task-type-fault_diagnosis { background: #fef3c7; color: #92400e; }
    .task-type-path_optimization { background: #dbeafe; color: #1e40af; }
    .task-type-mission_planning { background: #d1fae5; color: #065f46; }
    
    /* Confidence indicator */
    .confidence-bar {
      display: inline-block;
      width: 100px;
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      overflow: hidden;
      vertical-align: middle;
      margin-left: 8px;
    }
    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981);
      transition: width 0.3s;
    }
    
    /* ====== Detail modal: info card ====== */
    .detail-info-card {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 20px 24px; margin-bottom: 20px;
    }
    .detail-info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px 28px; font-size: 14px;
    }
    .detail-info-grid .info-label {
      font-size: 12px; color: #94a3b8; font-weight: 500; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .detail-info-grid .info-value {
      font-size: 14px; color: #1e293b; font-weight: 500;
    }
    .detail-info-grid .info-value code {
      font-size: 12px; background: #e2e8f0; padding: 2px 8px; border-radius: 8px; color: #334155;
    }
    .detail-confidence-row {
      margin-top: 16px; padding-top: 16px; border-top: 1px solid #e2e8f0;
      display: flex; align-items: center; gap: 12px; font-size: 14px;
    }
    .detail-confidence-row .conf-label { color: #64748b; font-weight: 500; }
    .detail-confidence-row .conf-value { font-size: 18px; font-weight: 700; color: #165dff; }
    .detail-confidence-bar {
      flex: 1; height: 8px; background: #e2e8f0; border-radius: 8px; overflow: hidden;
    }
    .detail-confidence-bar .fill {
      height: 100%; border-radius: 8px;
      background: linear-gradient(90deg, #ef4444 0%, #f59e0b 40%, #10b981 100%);
      transition: width 0.5s ease;
    }

    /* ====== Detail modal: reasoning steps ====== */
    .chain-steps-title {
      font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .chain-steps-title .steps-count {
      font-size: 12px; background: #165dff; color: #fff; padding: 2px 10px;
      border-radius: 10px; font-weight: 600;
    }
    .chain-steps {
      max-height: 420px; overflow-y: auto; margin: 0 0 20px 0;
      padding-right: 4px;
    }
    .chain-steps::-webkit-scrollbar { width: 5px; }
    .chain-steps::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .chain-step {
      background: #fff; border: 1px solid #e2e8f0; border-left: 4px solid #165dff;
      padding: 18px 20px; margin-bottom: 14px; border-radius: 0 10px 10px 0;
      transition: box-shadow 0.2s;
    }
    .chain-step:hover { box-shadow: 0 2px 12px rgba(14,165,233,0.08); }
    .chain-step:last-child { margin-bottom: 0; }
    .chain-step-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
    }
    .chain-step-header-left { display: flex; align-items: center; gap: 10px; }
    .step-number {
      background: linear-gradient(135deg, #165dff, #6366f1); color: #fff;
      width: 28px; height: 28px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .step-type {
      font-size: 12px; font-weight: 600; color: #fff;
      background: #165dff; padding: 3px 10px; border-radius: 10px;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .step-confidence-tag {
      font-size: 12px; color: #64748b; font-weight: 500;
      background: #f1f5f9; padding: 3px 10px; border-radius: 10px;
    }
    .step-section { margin: 10px 0; }
    .step-section-label {
      font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 4px;
    }
    .step-context {
      font-size: 13px; color: #64748b; line-height: 1.6;
    }
    .step-question {
      font-size: 14px; font-weight: 600; color: #0f172a; line-height: 1.5;
    }
    .step-thought {
      font-size: 13px; color: #475569; line-height: 1.7;
      background: #f8fafc; padding: 10px 14px; border-radius: 10px;
      border-left: 3px solid #cbd5e1;
    }
    .step-answer {
      background: linear-gradient(135deg, #e0f2fe, #eff6ff);
      padding: 12px 16px; border-radius: 8px;
      color: #0c4a6e; font-size: 14px; font-weight: 600; line-height: 1.5;
    }

    /* ====== Detail modal: final decision ====== */
    .final-decision {
      background: linear-gradient(135deg, #f0f9ff, #ecfdf5);
      border: 2px solid #165dff; padding: 22px 24px;
      border-radius: 12px; margin-top: 4px;
      position: relative; overflow: hidden;
    }
    .final-decision::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(14,165,233,0.06);
    }
    .final-decision-title {
      font-size: 16px; font-weight: 700; color: #0c4a6e;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .final-decision-content {
      color: #1e293b; line-height: 1.7; font-size: 14px;
    }

    /* ====== Detail modal: raw text ====== */
    .raw-text-section {
      margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 16px;
    }
    .raw-text-toggle {
      font-size: 13px; color: #64748b; cursor: pointer; font-weight: 500;
      display: flex; align-items: center; gap: 6px; user-select: none;
    }
    .raw-text-toggle:hover { color: #165dff; }
    .raw-text-pre {
      background: #1e293b; color: #e2e8f0; padding: 16px 20px;
      border-radius: 8px; font-size: 12px; line-height: 1.6;
      overflow-x: auto; margin-top: 10px; font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
    }
    
    /* Create chain modal */
    .cot-form { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .cot-form .full-width { grid-column: 1 / -1; }
    .cot-form label { font-size: 13px; color: #64748b; font-weight: 500; margin-bottom: 4px; display: block; }
    .cot-form select, .cot-form input, .cot-form textarea { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; background: #fff; }
    .cot-form textarea { resize: vertical; min-height: 80px; }
    .cot-form input:focus, .cot-form select:focus, .cot-form textarea:focus { outline: none; border-color: var(--cc-primary, #165dff); box-shadow: 0 0 0 2px rgba(22,93,255,0.1); }
    
    /* Context editor */
    .context-editor { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; }
    .context-item { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; align-items: center; }
    .context-item input { margin: 0; }
    .btn-add-context { grid-column: 1 / -1; text-align: center; }
  </style>
</head>
<body>
  <div class="module-header">
    <div class="cot-header-row">
      <div class="module-title">CoT智能决策</div>
      <div class="cot-header-btns">
                <button class="btn btn-secondary" onclick="refreshList()">刷新</button>
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <label>任务类型</label>
        <select id="filterTaskType">
          <option value="">全部</option>
          <option value="scheduling">无人机调度</option>
          <option value="fault_diagnosis">故障诊断</option>
          <option value="path_optimization">路径优化</option>
          <option value="mission_planning">任务规划</option>
          <option value="flight_planning">飞行规划</option>
          <option value="emergency_analysis">应急分析</option>
        </select>
      </div>
      <div class="filter-group">
        <label>关联任务ID</label>
        <input id="filterTaskID" type="text" placeholder="输入任务ID" />
      </div>
      <div class="filter-group" style="display:flex;flex-direction:column;justify-content:flex-end;">
        <button class="btn btn-primary" onclick="search()" style="width:100%;">搜索</button>
      </div>
    </div>
  </div>

  <div class="card">
    <table class="data-table">
      <thead>
        <tr>
          <th>思维链ID</th>
          <th>任务类型</th>
          <th>关联任务</th>
          <th>创建时间</th>
          <th>步骤数</th>
          <th>总体置信度</th>
          <th>最终决策</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="chainsTbody"></tbody>
    </table>
    <div class="pagination-bar">
      <span id="paginationInfo">共 0 条</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <button id="btnPrev" onclick="changePage(-1)" disabled>&lt; 上一页</button>
        <span id="pageIndicator">1/1</span>
        <button id="btnNext" onclick="changePage(1)" disabled>下一页 &gt;</button>
      </div>
    </div>
  </div>

  <!-- Create Chain Modal -->
  <div class="modal-overlay" id="createModal">
    <div class="modal-box" style="width:640px;max-height:85vh;overflow-y:auto;">
      <div class="modal-title">创建思维链</div>
      <div class="cot-form">
        <div class="full-width">
          <label>任务类型 *</label>
          <select id="cotTaskType">
            <option value="">选择任务类型</option>
            <option value="scheduling">无人机调度</option>
            <option value="fault_diagnosis">故障诊断</option>
            <option value="path_optimization">路径优化</option>
            <option value="mission_planning">任务规划</option>
          </select>
        </div>
        <div class="full-width">
          <label>关联任务ID</label>
          <input id="cotTaskID" type="text" placeholder="例如: mission_123 或 drone_456" />
        </div>
        <div class="full-width">
          <label>推理类型</label>
          <select id="cotReasoningType">
            <option value="auto">自动选择</option>
            <option value="scheduling">调度推理</option>
            <option value="fault_diagnosis">故障诊断推理</option>
            <option value="path_optimization">路径优化推理</option>
            <option value="mission_planning">任务规划推理</option>
          </select>
        </div>
        <div class="full-width">
          <label>上下文数据（JSON格式）</label>
          <textarea id="cotContext" placeholder='例如: {&quot;key&quot;: &quot;value&quot;}'></textarea>
          <div style="font-size:11px;color:#94a3b8;margin-top:4px;">可选：提供额外的上下文信息帮助推理</div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeCreateModal()">取消</button>
        <button class="btn btn-primary" onclick="createChain()">创建思维链</button>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal-box" style="width:800px;max-height:90vh;overflow-y:auto;">
      <div class="modal-title" id="detailTitle">思维链详情</div>
      <div id="detailContent"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeDetailModal()">关闭</button>
        <button class="btn btn-danger" onclick="deleteCurrentChain()">删除</button>
      </div>
    </div>
  </div>

  <script src="/app/modules/common.js"></script>
  <script>
    let currentPage = 1;
    const pageSize = 20;
    let totalItems = 0;
    let currentChainID = null;

    // Load chains list
    async function loadChains() {
      try {
        const params = new URLSearchParams();
        const taskType = $('#filterTaskType').value;
        const taskID = $('#filterTaskID').value.trim();
        
        if (taskType) params.append('task_type', taskType);
        if (taskID) params.append('task_id', taskID);
        params.append('page', currentPage);
        params.append('page_size', pageSize);

        const res = await api('/cot/chains?' + params.toString());
        const data = await res.json();
        const items = Array.isArray(data.items) ? data.items : [];
        totalItems = data.total || 0;
        
        renderTable(items);
        updatePagination();
      } catch (e) {
        console.error('loadChains error:', e);
        $('#chainsTbody').innerHTML = '<tr><td colspan="8" style="text-align:center;color:#ef4444;padding:40px;">加载失败: ' + e.message + '</td></tr>';
      }
    }

    function renderTable(items) {
      const tbody = $('#chainsTbody');
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:40px;">暂无思维链数据</td></tr>';
        return;
      }

      tbody.innerHTML = items.map(item => {
        const stepCount = item.step_count || (item.steps ? item.steps.length : 0);
        const confidence = item.confidence || 0;
        const confidenceWidth = Math.round(confidence * 100);
        
        return `
          <tr>
            <td><code style="font-size:12px;">${esc(item.id)}</code></td>
            <td>${taskTypeBadge(item.task_type)}</td>
            <td>${esc(item.task_id) || '-'}</td>
            <td>${formatDate(item.created_at)}</td>
            <td>${stepCount}</td>
            <td>
              ${(confidence * 100).toFixed(1)}%
              <div class="confidence-bar">
                <div class="confidence-fill" style="width:${confidenceWidth}%"></div>
              </div>
            </td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(item.final_decision)}">${esc(item.final_decision)}</td>
            <td>
              <button class="btn btn-primary btn-action" onclick="viewChainDetail('${esc(item.id)}')">查看</button>
              <button class="btn btn-danger btn-action" onclick="deleteChain('${esc(item.id)}')">删除</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function taskTypeBadge(taskType) {
      const typeMap = {
        'scheduling': { label: '调度', class: 'task-type-scheduling' },
        'fault_diagnosis': { label: '故障诊断', class: 'task-type-fault_diagnosis' },
        'path_optimization': { label: '路径优化', class: 'task-type-path_optimization' },
        'mission_planning': { label: '任务规划', class: 'task-type-mission_planning' },
        'flight_planning': { label: '飞行规划', class: 'task-type-path_optimization' },
        'emergency_analysis': { label: '应急分析', class: 'task-type-fault_diagnosis' },
        'battery_analysis': { label: '电池分析', class: 'task-type-scheduling' }
      };
      const config = typeMap[taskType] || { label: taskType, class: 'task-type-mission_planning' };
      return `<span class="task-type-badge ${config.class}">${config.label}</span>`;
    }

    function esc(s) {
      if (!s && s !== 0) return '';
      if (typeof s === 'number') return s.toString();
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      try {
        const d = new Date(dateStr.replace(' ', 'T'));
        if (isNaN(d.getTime()) || d.getFullYear() < 2000) return '-';
        return d.toLocaleString('zh-CN', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        });
      } catch (e) {
        return dateStr;
      }
    }

    // Pagination
    function updatePagination() {
      const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
      $('#paginationInfo').textContent = `共 ${totalItems} 条`;
      $('#pageIndicator').textContent = `${currentPage}/${totalPages}`;
      $('#btnPrev').disabled = currentPage <= 1;
      $('#btnNext').disabled = currentPage >= totalPages;
    }

    function changePage(delta) {
      currentPage += delta;
      loadChains();
    }

    function search() {
      currentPage = 1;
      loadChains();
    }

    // Create modal
    function openCreateModal() {
      $('#cotTaskType').value = '';
      $('#cotTaskID').value = '';
      $('#cotReasoningType').value = 'auto';
      $('#cotContext').value = '';
      $('#createModal').classList.add('active');
    }

    function closeCreateModal() {
      $('#createModal').classList.remove('active');
    }

    async function createChain() {
      const taskType = $('#cotTaskType').value;
      const taskID = $('#cotTaskID').value.trim();
      const reasoningType = $('#cotReasoningType').value;
      const contextStr = $('#cotContext').value.trim();

      if (!taskType) {
        showToast('请选择任务类型', 'error');
        return;
      }

      let context = {};
      if (contextStr) {
        try {
          context = JSON.parse(contextStr);
        } catch (e) {
          showToast('上下文数据格式错误，请检查JSON格式', 'error');
          return;
        }
      }

      const body = {
        task_type: taskType,
        task_id: taskID,
        reasoning_type: reasoningType,
        context: context
      };

      try {
        const btn = $('#createModal .btn-primary');
        btn.disabled = true;
        btn.textContent = '创建中...';

        const res = await api('/cot/chains', { method: 'POST', body });
        const data = await res.json();
        
        if (data.error) {
          showToast(data.error, 'error');
          return;
        }

        showToast('思维链创建成功', 'success');
        closeCreateModal();
        loadChains();
        
        // Auto view detail
        setTimeout(() => viewChainDetail(data.chain.chain_id), 500);
      } catch (e) {
        showToast('创建失败: ' + e.message, 'error');
      } finally {
        const btn = $('#createModal .btn-primary');
        btn.disabled = false;
        btn.textContent = '创建思维链';
      }
    }

    // Detail modal
    async function viewChainDetail(chainID) {
      try {
        const res = await api('/cot/chains/' + chainID);
        const data = await res.json();
        
        if (!data.ok || !data.chain) {
          showToast('加载失败: ' + (data.error || '未知错误'), 'error');
          return;
        }

        const chain = data.chain;
        currentChainID = chainID;
        const confPct = ((chain.confidence || 0) * 100).toFixed(1);
        const confWidth = Math.round((chain.confidence || 0) * 100);
        const stepCount = chain.steps ? chain.steps.length : 0;

        const typeLabels = {
          scheduling: '无人机调度', fault_diagnosis: '故障诊断',
          path_optimization: '路径优化', mission_planning: '任务规划',
          flight_planning: '飞行规划', emergency_analysis: '应急分析',
          battery_analysis: '电池分析'
        };

        $('#detailTitle').innerHTML = `🧠 思维链详情 <span style="font-size:13px;font-weight:400;color:#64748b;margin-left:4px;">— ${typeLabels[chain.task_type] || chain.task_type}</span>`;

        let html = '';

        // Info card
        html += '<div class="detail-info-card">';
        html += '<div class="detail-info-grid">';
        html += `<div><div class="info-label">思维链 ID</div><div class="info-value"><code>${esc(chain.chain_id || chain.id)}</code></div></div>`;
        html += `<div><div class="info-label">任务类型</div><div class="info-value">${taskTypeBadge(chain.task_type)}</div></div>`;
        html += `<div><div class="info-label">关联任务</div><div class="info-value">${esc(chain.task_id) || '<span style="color:#94a3b8;">无</span>'}</div></div>`;
        html += `<div><div class="info-label">创建时间</div><div class="info-value">${formatDate(chain.created_at)}</div></div>`;
        html += '</div>';
        html += '<div class="detail-confidence-row">';
        html += `<span class="conf-label">总体置信度</span>`;
        html += `<span class="conf-value">${confPct}%</span>`;
        html += `<div class="detail-confidence-bar"><div class="fill" style="width:${confWidth}%"></div></div>`;
        html += '</div>';
        html += '</div>';

        // Steps
        if (stepCount > 0) {
          html += `<div class="chain-steps-title">📋 推理步骤 <span class="steps-count">${stepCount} 步</span></div>`;
          html += '<div class="chain-steps">';
          chain.steps.forEach((step, idx) => {
            const sConf = ((step.confidence || 0) * 100).toFixed(1);
            html += '<div class="chain-step">';
            html += '<div class="chain-step-header">';
            html += `<div class="chain-step-header-left"><span class="step-number">${step.step || idx + 1}</span><span class="step-type">${esc(step.type)}</span></div>`;
            html += `<span class="step-confidence-tag">置信度 ${sConf}%</span>`;
            html += '</div>';
            if (step.context) {
              html += `<div class="step-section"><div class="step-section-label">上下文</div><div class="step-context">${esc(step.context)}</div></div>`;
            }
            html += `<div class="step-section"><div class="step-section-label">问题</div><div class="step-question">${esc(step.question)}</div></div>`;
            if (step.thought) {
              html += `<div class="step-section"><div class="step-section-label">思考过程</div><div class="step-thought">${esc(step.thought)}</div></div>`;
            }
            html += `<div class="step-section"><div class="step-section-label">结论</div><div class="step-answer">${esc(step.answer)}</div></div>`;
            html += '</div>';
          });
          html += '</div>';
        }

        // Final decision
        html += '<div class="final-decision">';
        html += '<div class="final-decision-title">🎯 最终决策</div>';
        html += `<div class="final-decision-content">${esc(chain.final_decision)}</div>`;
        html += '</div>';

        // Raw display text (collapsible)
        if (data.display_text) {
          const rawId = 'rawText_' + Date.now();
          html += '<div class="raw-text-section">';
          html += `<div class="raw-text-toggle" onclick="var el=document.getElementById('${rawId}');el.style.display=el.style.display==='none'?'block':'none';this.querySelector('.arrow').textContent=el.style.display==='none'?'▶':'▼';">`;
          html += '<span class="arrow">▶</span> 查看原始推理文本';
          html += '</div>';
          html += `<pre class="raw-text-pre" id="${rawId}" style="display:none;">${esc(data.display_text)}</pre>`;
          html += '</div>';
        }

        $('#detailContent').innerHTML = html;
        $('#detailModal').classList.add('active');
      } catch (e) {
        showToast('加载详情失败: ' + e.message, 'error');
      }
    }

    function closeDetailModal() {
      $('#detailModal').classList.remove('active');
      currentChainID = null;
    }

    // Delete
    async function deleteChain(chainID) {
      if (!confirm('确定删除该思维链？此操作不可恢复。')) return;
      
      try {
        const res = await api('/cot/chains/' + chainID, { method: 'DELETE' });
        const data = await res.json();
        
        if (data.error) {
          showToast(data.error, 'error');
          return;
        }
        
        showToast('思维链已删除', 'success');
        loadChains();
      } catch (e) {
        showToast('删除失败: ' + e.message, 'error');
      }
    }

    async function deleteCurrentChain() {
      if (!currentChainID) return;
      await deleteChain(currentChainID);
      closeDetailModal();
    }

    function refreshList() {
      loadChains();
    }

    // Init
    (async function init() {
      try {
        // Show loading state
        $('#chainsTbody').innerHTML = '<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:40px;">加载中...</td></tr>';

        // Check if there's a chain_id in URL params (from flight planning)
        const urlParams = new URLSearchParams(window.location.search);
        const chainIdFromUrl = urlParams.get('chain_id');

        if (chainIdFromUrl) {
          await loadChains();
          setTimeout(() => viewChainDetail(chainIdFromUrl), 300);
        } else {
          await loadChains();
        }
      } catch (e) {
        console.error('CoT init error:', e);
        $('#chainsTbody').innerHTML = '<tr><td colspan="8" style="text-align:center;color:#ef4444;padding:40px;">页面初始化失败: ' + (e.message || '未知错误') + '</td></tr>';
      }
    })();
  </script>
</body>
</html>
