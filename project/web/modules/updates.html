<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>软件更新管理</title>
  <link rel="stylesheet" href="/app/modules/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="module-header">
    <div class="module-title">软件更新管理</div>
    <div class="filter-row">
      <div class="filter-group">
        <label>更新包名称</label>
        <input type="text" placeholder="请输入更新包名称(KB号)" />
      </div>
      <div class="filter-group">
        <label>更新状态</label>
        <select>
          <option>可执行</option>
          <option>已完成</option>
          <option>已跳过</option>
        </select>
      </div>
      <div class="filter-group">
        <label>更新类型</label>
        <select>
          <option>已执行</option>
        </select>
      </div>
    </div>
    <div class="filter-row" style="grid-template-columns: 1fr 2fr;">
      <div class="filter-group">
        <label>显示自动更新</label>
        <label style="display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;">
          <input type="checkbox" checked />
          <span style="font-size: 14px; font-weight: normal; color: #0f172a;">启用</span>
        </label>
      </div>
      <div class="filter-group">
        <label>显示手动触发</label>
        <label style="display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;">
          <input type="checkbox" />
          <span style="font-size: 14px; font-weight: normal; color: #0f172a;">启用</span>
        </label>
      </div>
    </div>
    <div class="action-buttons">
      <button class="btn btn-primary" onclick="search()">查询</button>
    </div>
  </div>

  <div class="card">
    <table class="data-table">
      <thead>
        <tr>
          <th>更新包名称</th>
          <th>更新包大小</th>
          <th>更新状态</th>
          <th>更新时间</th>
          <th>创建时间</th>
          <th>更新类型</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>智能工具规范定期更新包</td>
          <td>5.2MB</td>
          <td><span class="status-badge status-online">已完成</span></td>
          <td>2024-10-15</td>
          <td>启用</td>
          <td>跳过</td>
          <td>
            <button class="btn btn-primary btn-action">查看</button>
            <button class="btn btn-danger btn-action">删除</button>
          </td>
        </tr>
        <tr>
          <td>安全更新周四更新</td>
          <td>15.8MB</td>
          <td><span class="status-badge status-online">已完成</span></td>
          <td>2024-09-20</td>
          <td>启用</td>
          <td>跳过</td>
          <td>
            <button class="btn btn-primary btn-action">查看</button>
            <button class="btn btn-danger btn-action">删除</button>
          </td>
        </tr>
        <tr>
          <td>功能优化更新</td>
          <td>10.6MB</td>
          <td><span class="status-badge status-offline">已跳过</span></td>
          <td>2024-08-10</td>
          <td>启用</td>
          <td>跳过</td>
          <td>
            <button class="btn btn-primary btn-action">查看</button>
            <button class="btn btn-danger btn-action">删除</button>
          </td>
        </tr>
        <tr>
          <td>小幅提新链集成</td>
          <td>5.6MB</td>
          <td><span class="status-badge status-offline">已跳过</span></td>
          <td>2024-07-05</td>
          <td>启用</td>
          <td>跳过</td>
          <td>
            <button class="btn btn-primary btn-action">查看</button>
            <button class="btn btn-danger btn-action">删除</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="hint-box">
    <div><strong>使用提示:</strong></div>
    <div>1. 软件更新包包含功能改进、安全修复和性能优化等内容</div>
    <div>2. 定期检查并安装更新,确保系统始终保持最新状态</div>
    <div>3. 启用自动更新可在后台自动下载并提示安装</div>
  </div>

  <div class="card">
    <div class="card-title">更新统计</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
      <div>
        <div style="font-weight: 600; margin-bottom: 12px; text-align: center;">更新状态分布</div>
        <canvas id="statusChart" width="300" height="300"></canvas>
      </div>
      <div>
        <div style="font-weight: 600; margin-bottom: 12px; text-align: center;">更新类型分布</div>
        <canvas id="typeChart" width="300" height="300"></canvas>
      </div>
    </div>
  </div>

  <script src="/app/modules/common.js"></script>
  <script>
    createChart($('#statusChart'), {
      type: 'doughnut',
      data: {
        labels: ['已完成', '已跳过', '已重启'],
        datasets: [{
          data: [50, 30, 20],
          backgroundColor: ['#0ea5e9', '#ef4444', '#f59e0b']
        }]
      }
    });

    createChart($('#typeChart'), {
      type: 'bar',
      data: {
        labels: ['智能工具', '安全', '功能', '小幅'],
        datasets: [{
          label: '更新包数量',
          data: [12, 8, 6, 4],
          backgroundColor: ['#a855f7', '#10b981', '#0ea5e9']
        }]
      },
      options: {
        scales: { y: { beginAtZero: true } }
      }
    });

    function search() {
      showToast('正在查询更新包...', 'info');
    }
  </script>
</body>
</html>
