<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>软件更新管理</title>
  <link rel="stylesheet" href="/app/modules/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="module-header">
    <div class="module-title">软件更新管理</div>
    <div class="filter-row">
      <div class="filter-group">
        <label>版本关键字</label>
        <input id="filterKeyword" type="text" placeholder="请输入版本号或描述" />
      </div>
      <div class="filter-group">
        <label>更新状态</label>
        <select id="filterStatus">
          <option value="">全部</option>
          <option value="released">已发布</option>
          <option value="pending">待发布</option>
          <option value="installed">已安装</option>
        </select>
      </div>
    </div>
    <div class="action-buttons">
      <button class="btn btn-primary" onclick="search()">查询</button>
      <button class="btn btn-secondary" onclick="checkUpdate()">🔍 检查更新</button>
      <button class="btn btn-success" onclick="addUpdate()">➕ 新增版本</button>
    </div>
  </div>

  <div class="card" id="checkResultCard" style="display: none;">
    <div class="card-title">检查更新结果</div>
    <div id="checkResult" style="padding: 12px; background: #f8fafc; border-radius: 8px;"></div>
  </div>

  <div class="card">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>版本号</th>
          <th>描述</th>
          <th>状态</th>
          <th>创建时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="updatesTbody"></tbody>
    </table>
  </div>

  <div class="hint-box">
    <div><strong>使用提示:</strong></div>
    <div>1. 软件更新包包含功能改进、安全修复和性能优化等内容</div>
    <div>2. 定期检查并安装更新,确保系统始终保持最新状态</div>
    <div>3. 启用自动更新可在后台自动下载并提示安装</div>
  </div>

  <div class="card">
    <div class="card-title">更新统计</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
      <div>
        <div style="font-weight: 600; margin-bottom: 12px; text-align: center;">更新状态分布</div>
        <canvas id="statusChart" width="300" height="300"></canvas>
      </div>
      <div>
        <div style="font-weight: 600; margin-bottom: 12px; text-align: center;">版本发布时间线</div>
        <canvas id="typeChart" width="300" height="300"></canvas>
      </div>
    </div>
  </div>

  <script src="/app/modules/common.js"></script>
  <script>
    let allUpdates = [];
    let visibleUpdates = [];

    const statusLabelMap = { released: '已发布', pending: '待发布', installed: '已安装' };

    const statusChart = createChart($('#statusChart'), {
      type: 'doughnut',
      data: {
        labels: ['已发布', '待发布', '已安装', '其他'],
        datasets: [{
          data: [0, 0, 0, 0],
          backgroundColor: ['#0ea5e9', '#f59e0b', '#10b981', '#94a3b8']
        }]
      }
    });

    const typeChart = createChart($('#typeChart'), {
      type: 'bar',
      data: {
        labels: [],
        datasets: [{
          label: '版本',
          data: [],
          backgroundColor: '#0ea5e9'
        }]
      },
      options: {
        indexAxis: 'y',
        scales: { x: { beginAtZero: true, max: 1, display: false } },
        plugins: { legend: { display: false } }
      }
    });

    function renderTable(items) {
      const tbody = $('#updatesTbody');
      tbody.innerHTML = '';
      for (const it of items) {
        const tr = document.createElement('tr');

        const tdId = document.createElement('td');
        tdId.textContent = it.id;

        const tdVer = document.createElement('td');
        tdVer.textContent = it.version || '-';
        tdVer.style.fontWeight = '600';

        const tdDesc = document.createElement('td');
        tdDesc.textContent = it.description || '-';

        const tdStatus = document.createElement('td');
        const badge = document.createElement('span');
        const s = (it.status || '').toLowerCase();
        badge.className = 'status-badge ' + (s === 'released' || s === 'installed' ? 'status-online' : 'status-warning');
        badge.textContent = statusLabelMap[s] || it.status || '-';
        tdStatus.appendChild(badge);

        const tdTime = document.createElement('td');
        tdTime.textContent = formatDate(it.created_at);

        const tdActions = document.createElement('td');
        const viewBtn = document.createElement('button');
        viewBtn.className = 'btn btn-primary btn-action';
        viewBtn.textContent = '查看';
        viewBtn.onclick = () => {
          alert(`版本: ${it.version}\n描述: ${it.description}\n状态: ${it.status}\n时间: ${formatDate(it.created_at)}`);
        };
        tdActions.appendChild(viewBtn);

        tr.appendChild(tdId);
        tr.appendChild(tdVer);
        tr.appendChild(tdDesc);
        tr.appendChild(tdStatus);
        tr.appendChild(tdTime);
        tr.appendChild(tdActions);
        tbody.appendChild(tr);
      }
    }

    function updateCharts(items) {
      const counts = { released: 0, pending: 0, installed: 0, other: 0 };
      for (const it of items) {
        const s = (it.status || '').toLowerCase();
        if (counts.hasOwnProperty(s)) counts[s]++;
        else counts.other++;
      }
      if (statusChart) {
        statusChart.data.datasets[0].data = [counts.released, counts.pending, counts.installed, counts.other];
        statusChart.update();
      }
      if (typeChart) {
        const recent = items.slice(0, 8);
        typeChart.data.labels = recent.map(it => it.version || '?');
        typeChart.data.datasets[0].data = recent.map(() => 1);
        typeChart.update();
      }
    }

    async function loadUpdates() {
      try {
        const res = await api('/updates/list');
        const data = await res.json();
        allUpdates = Array.isArray(data.items) ? data.items : [];
        visibleUpdates = allUpdates.slice();
        renderTable(visibleUpdates);
        updateCharts(visibleUpdates);
      } catch (e) {
        showToast(e.message || '加载失败', 'error');
      }
    }

    function search() {
      const keyword = ($('#filterKeyword').value || '').trim().toLowerCase();
      const status = ($('#filterStatus').value || '').trim().toLowerCase();

      visibleUpdates = allUpdates.filter((it) => {
        if (status && (it.status || '').toLowerCase() !== status) return false;
        if (keyword) {
          const ver = (it.version || '').toLowerCase();
          const desc = (it.description || '').toLowerCase();
          if (!ver.includes(keyword) && !desc.includes(keyword)) return false;
        }
        return true;
      });

      renderTable(visibleUpdates);
      updateCharts(visibleUpdates);
      showToast(`已筛选：${visibleUpdates.length} 条`, 'success');
    }

    async function checkUpdate() {
      try {
        const res = await api('/updates/check');
        const data = await res.json();
        const card = $('#checkResultCard');
        const result = $('#checkResult');
        card.style.display = 'block';
        if (data.has_update) {
          result.innerHTML = `<span style="color: #0ea5e9; font-weight: 700;">🔔 发现新版本：${data.latest_version}</span><br><span style="color: #64748b;">建议尽快更新以获取最新功能与安全修复。</span>`;
        } else {
          result.innerHTML = `<span style="color: #10b981; font-weight: 700;">✅ 当前已是最新版本：${data.latest_version || '-'}</span>`;
        }
      } catch (e) {
        showToast(e.message || '检查失败', 'error');
      }
    }

    async function addUpdate() {
      const version = (prompt('版本号（如 V1.2.0）', '') || '').trim();
      if (!version) return;
      const description = (prompt('版本描述', '') || '').trim();
      if (!description) return;
      const status = (prompt('状态（released/pending/installed）', 'released') || '').trim();
      if (!status) return;

      try {
        const res = await api('/updates/add', {
          method: 'POST',
          body: { Version: version, Description: description, Status: status }
        });
        const data = await res.json();
        if (data.ok) {
          showToast('新增成功', 'success');
          await loadUpdates();
        } else {
          showToast(data.error || '新增失败', 'error');
        }
      } catch (e) {
        showToast(e.message || '新增失败', 'error');
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadUpdates();
    });
  </script>
</body>
</html>
