<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>并发监控</title>
  <link rel="stylesheet" href="/app/modules/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .module-title::before { content: "\2699\FE0F"; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
      padding: 20px; text-align: center; transition: box-shadow 0.2s;
    }
    .stat-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    .stat-card .stat-value {
      font-size: 28px; font-weight: 700; color: #0ea5e9; line-height: 1.2;
    }
    .stat-card .stat-label {
      font-size: 12px; color: #94a3b8; margin-top: 6px; text-transform: uppercase;
      letter-spacing: 0.5px; font-weight: 500;
    }
    .stat-card.success .stat-value { color: #10b981; }
    .stat-card.warning .stat-value { color: #f59e0b; }
    .stat-card.danger .stat-value { color: #ef4444; }
    .stat-card.info .stat-value { color: #6366f1; }

    .section-title {
      font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title .badge {
      font-size: 11px; background: #0ea5e9; color: #fff; padding: 2px 8px;
      border-radius: 8px; font-weight: 600;
    }

    .pool-bars { margin-bottom: 24px; }
    .pool-bar-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 13px;
    }
    .pool-bar-label { width: 100px; color: #64748b; font-weight: 500; text-align: right; flex-shrink: 0; }
    .pool-bar-track {
      flex: 1; height: 22px; background: #f1f5f9; border-radius: 6px; overflow: hidden;
      position: relative;
    }
    .pool-bar-fill {
      height: 100%; border-radius: 6px; transition: width 0.5s ease;
      display: flex; align-items: center; justify-content: flex-end; padding-right: 8px;
      font-size: 11px; color: #fff; font-weight: 600; min-width: 0;
    }
    .pool-bar-fill.io { background: linear-gradient(90deg, #0ea5e9, #6366f1); }
    .pool-bar-fill.cpu { background: linear-gradient(90deg, #f59e0b, #ef4444); }
    .pool-bar-fill.queue { background: linear-gradient(90deg, #10b981, #059669); }
    .pool-bar-num { width: 60px; text-align: left; font-weight: 600; color: #334155; }

    .group-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
    .group-table th {
      background: #f8fafc; padding: 10px 14px; text-align: left; font-size: 12px;
      color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 2px solid #e2e8f0;
    }
    .group-table td {
      padding: 10px 14px; border-bottom: 1px solid #f1f5f9; font-size: 13px; color: #334155;
    }
    .group-table tr:hover td { background: #f8fafc; }
    .group-name {
      font-weight: 600; color: #0f172a;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .group-icon {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }

    .charts-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;
    }
    .chart-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px;
    }
    .chart-card h4 {
      font-size: 14px; font-weight: 600; color: #1e293b; margin: 0 0 12px 0; text-align: center;
    }

    .refresh-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; font-size: 13px; color: #94a3b8;
    }
    .refresh-bar .auto-label { display: flex; align-items: center; gap: 6px; }
    .refresh-bar select {
      padding: 4px 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 12px;
    }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="module-header">
    <div class="module-title">并发任务监控</div>
  </div>

  <div class="refresh-bar">
    <span id="lastRefresh">加载中...</span>
    <div class="auto-label">
      自动刷新:
      <select id="refreshInterval" onchange="setRefreshInterval()">
        <option value="2000">2秒</option>
        <option value="5000" selected>5秒</option>
        <option value="10000">10秒</option>
        <option value="0">关闭</option>
      </select>
      <button class="btn btn-primary" style="padding:4px 12px;font-size:12px;" onclick="loadMetrics()">立即刷新</button>
    </div>
  </div>

  <!-- Summary cards -->
  <div class="stats-grid" id="statsCards">
    <div class="stat-card"><div class="stat-value" id="vSubmitted">-</div><div class="stat-label">已提交任务</div></div>
    <div class="stat-card success"><div class="stat-value" id="vCompleted">-</div><div class="stat-label">已完成</div></div>
    <div class="stat-card danger"><div class="stat-value" id="vFailed">-</div><div class="stat-label">失败</div></div>
    <div class="stat-card warning"><div class="stat-value" id="vPending">-</div><div class="stat-label">排队中</div></div>
    <div class="stat-card info"><div class="stat-value" id="vAvgMs">-</div><div class="stat-label">平均耗时(ms)</div></div>
    <div class="stat-card"><div class="stat-value" id="vRecovered">-</div><div class="stat-label">异常恢复</div></div>
  </div>

  <!-- Worker pool bars -->
  <div class="section-title">⚙️ Worker 池状态</div>
  <div class="pool-bars">
    <div class="pool-bar-row">
      <div class="pool-bar-label">IO Workers</div>
      <div class="pool-bar-track"><div class="pool-bar-fill io" id="barIO" style="width:0%"></div></div>
      <div class="pool-bar-num" id="numIO">0/0</div>
    </div>
    <div class="pool-bar-row">
      <div class="pool-bar-label">CPU Workers</div>
      <div class="pool-bar-track"><div class="pool-bar-fill cpu" id="barCPU" style="width:0%"></div></div>
      <div class="pool-bar-num" id="numCPU">0/0</div>
    </div>
    <div class="pool-bar-row">
      <div class="pool-bar-label">IO 队列</div>
      <div class="pool-bar-track"><div class="pool-bar-fill queue" id="barIOQ" style="width:0%"></div></div>
      <div class="pool-bar-num" id="numIOQ">0/0</div>
    </div>
    <div class="pool-bar-row">
      <div class="pool-bar-label">CPU 队列</div>
      <div class="pool-bar-track"><div class="pool-bar-fill queue" id="barCPUQ" style="width:0%"></div></div>
      <div class="pool-bar-num" id="numCPUQ">0/0</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="chart-card">
      <h4>任务完成 vs 失败趋势（最近30次采样）</h4>
      <div style="position:relative;height:220px;">
        <canvas id="trendChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h4>任务组分布</h4>
      <div style="position:relative;height:220px;">
        <canvas id="groupChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Group table -->
  <div class="section-title">📋 任务组详情 <span class="badge" id="groupCount">0</span></div>
  <table class="group-table">
    <thead>
      <tr>
        <th>任务组</th>
        <th>已提交</th>
        <th>已完成</th>
        <th>失败</th>
        <th>成功率</th>
        <th>平均耗时</th>
      </tr>
    </thead>
    <tbody id="groupTbody">
      <tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:30px;">加载中...</td></tr>
    </tbody>
  </table>

  <script src="/app/modules/common.js"></script>
  <script>
    // NOTE: $ is already provided by common.js — do NOT redeclare it here.

    const groupColors = {
      monitoring: '#0ea5e9',
      patrol: '#6366f1',
      simulation: '#f59e0b',
      route_planning: '#10b981',
      cot_analysis: '#ec4899',
      default: '#94a3b8',
    };

    const groupLabels = {
      monitoring: '系统监控',
      patrol: 'AI 巡检',
      simulation: '无人机模拟',
      route_planning: '航线规划',
      cot_analysis: 'CoT 分析',
      default: '其他',
    };

    let trendChart = null;
    let groupChart = null;
    let trendData = { completed: [], failed: [], labels: [] };
    const MAX_TREND = 30;
    let refreshTimer = null;
    // prevCompleted/prevFailed: -1 means "first load, skip delta" to avoid
    // the giant initial spike where all historical tasks appear as one burst.
    let prevCompleted = -1;
    let prevFailed = -1;
    let isFirstLoad = true;

    async function loadMetrics() {
      try {
        const res = await api('/taskpool/metrics');
        if (!res.ok) { throw new Error('HTTP ' + res.status); }
        const m = await res.json();
        renderMetrics(m);
        $('#lastRefresh').textContent = '上次刷新: ' + new Date().toLocaleTimeString('zh-CN');
      } catch (e) {
        $('#lastRefresh').textContent = '刷新失败: ' + e.message;
        console.error('[Concurrency] loadMetrics error:', e);
      }
    }

    function renderMetrics(m) {
      // Summary cards
      $('#vSubmitted').textContent = m.submitted || 0;
      $('#vCompleted').textContent = m.completed || 0;
      $('#vFailed').textContent = m.failed || 0;
      $('#vPending').textContent = m.pending || 0;
      $('#vAvgMs').textContent = (m.avg_duration_ms || 0).toFixed(1);
      $('#vRecovered').textContent = m.recovered || 0;

      // Worker bars
      const ioPct = m.io_workers > 0 ? Math.round((m.io_active / m.io_workers) * 100) : 0;
      const cpuPct = m.cpu_workers > 0 ? Math.round((m.cpu_active / m.cpu_workers) * 100) : 0;
      const ioQPct = m.io_queue_cap > 0 ? Math.round((m.io_queue_len / m.io_queue_cap) * 100) : 0;
      const cpuQPct = m.cpu_queue_cap > 0 ? Math.round((m.cpu_queue_len / m.cpu_queue_cap) * 100) : 0;

      $('#barIO').style.width = ioPct + '%';
      $('#numIO').textContent = (m.io_active || 0) + '/' + (m.io_workers || 0);
      $('#barCPU').style.width = cpuPct + '%';
      $('#numCPU').textContent = (m.cpu_active || 0) + '/' + (m.cpu_workers || 0);
      $('#barIOQ').style.width = ioQPct + '%';
      $('#numIOQ').textContent = (m.io_queue_len || 0) + '/' + (m.io_queue_cap || 0);
      $('#barCPUQ').style.width = cpuQPct + '%';
      $('#numCPUQ').textContent = (m.cpu_queue_len || 0) + '/' + (m.cpu_queue_cap || 0);

      // Trend chart: compute per-interval deltas
      const curCompleted = m.completed || 0;
      const curFailed = m.failed || 0;

      if (isFirstLoad) {
        // First load: just record baseline, don't push a data point
        prevCompleted = curCompleted;
        prevFailed = curFailed;
        isFirstLoad = false;
      } else {
        // Subsequent loads: compute delta since last poll
        const deltaCompleted = Math.max(0, curCompleted - prevCompleted);
        const deltaFailed = Math.max(0, curFailed - prevFailed);
        prevCompleted = curCompleted;
        prevFailed = curFailed;

        const now = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        trendData.labels.push(now);
        trendData.completed.push(deltaCompleted);
        trendData.failed.push(deltaFailed);

        // Fixed sliding window — never exceed MAX_TREND points
        while (trendData.labels.length > MAX_TREND) {
          trendData.labels.shift();
          trendData.completed.shift();
          trendData.failed.shift();
        }
      }
      renderTrendChart();

      // Groups
      const groups = m.groups || {};
      const keys = Object.keys(groups).sort();
      $('#groupCount').textContent = keys.length;

      if (keys.length === 0) {
        $('#groupTbody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:30px;">暂无任务组数据</td></tr>';
      } else {
        $('#groupTbody').innerHTML = keys.map(k => {
          const g = groups[k];
          const total = (g.completed || 0) + (g.failed || 0);
          const rate = total > 0 ? ((g.completed / total) * 100).toFixed(1) : '-';
          const color = groupColors[k] || groupColors.default;
          const label = groupLabels[k] || k;
          return `<tr>
            <td><span class="group-name"><span class="group-icon" style="background:${color}"></span>${label}</span></td>
            <td>${g.submitted || 0}</td>
            <td>${g.completed || 0}</td>
            <td style="color:${g.failed > 0 ? '#ef4444' : 'inherit'}">${g.failed || 0}</td>
            <td>${rate !== '-' ? rate + '%' : '-'}</td>
            <td>${(g.avg_ms || 0).toFixed(1)} ms</td>
          </tr>`;
        }).join('');
      }
      renderGroupChart(groups, keys);
    }

    function renderTrendChart() {
      const ctx = document.getElementById('trendChart');
      if (!trendChart) {
        trendChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: trendData.labels,
            datasets: [
              { label: '完成/次', data: trendData.completed, borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.3, pointRadius: 2, borderWidth: 2 },
              { label: '失败/次', data: trendData.failed, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.3, pointRadius: 2, borderWidth: 2 },
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            animation: false,
            plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } },
            scales: {
              x: { ticks: { maxTicksLimit: 8, font: { size: 10 } } },
              y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } } }
            }
          }
        });
      } else {
        trendChart.data.labels = trendData.labels;
        trendChart.data.datasets[0].data = trendData.completed;
        trendChart.data.datasets[1].data = trendData.failed;
        trendChart.update('none');
      }
    }

    function renderGroupChart(groups, keys) {
      const ctx = document.getElementById('groupChart');
      const labels = keys.map(k => groupLabels[k] || k);
      const data = keys.map(k => (groups[k].completed || 0) + (groups[k].failed || 0));
      const colors = keys.map(k => groupColors[k] || groupColors.default);

      if (!groupChart) {
        groupChart = new Chart(ctx, {
          type: 'doughnut',
          data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            animation: false,
            plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 12 } } },
            cutout: '55%',
          }
        });
      } else {
        groupChart.data.labels = labels;
        groupChart.data.datasets[0].data = data;
        groupChart.data.datasets[0].backgroundColor = colors;
        groupChart.update('none');
      }
    }

    function setRefreshInterval() {
      if (refreshTimer) clearInterval(refreshTimer);
      const ms = parseInt($('#refreshInterval').value);
      if (ms > 0) {
        refreshTimer = setInterval(loadMetrics, ms);
      }
    }

    // Init
    loadMetrics();
    setRefreshInterval();
  </script>
</body>
</html>
