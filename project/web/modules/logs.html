<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>维护操作日志</title>
  <link rel="stylesheet" href="/app/modules/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="module-header">
    <div class="module-title">维护操作日志</div>
    <div class="filter-row">
      <div class="filter-group">
        <label>操作时间</label>
        <select>
          <option>全部</option>
        </select>
      </div>
      <div class="filter-group">
        <label>操作人员</label>
        <input id="filterOperator" type="text" placeholder="请输入人员/组合选择" />
      </div>
      <div class="filter-group">
        <label>操作内容类型</label>
        <input id="filterKeyword" type="text" placeholder="关键字(内容/备注/级别)" />
      </div>
    </div>
    <div class="filter-row" style="grid-template-columns: repeat(3, 1fr);">
      <div class="filter-group">
        <label>操作结果</label>
        <select>
          <option>全部</option>
          <option>成功</option>
          <option>失败</option>
        </select>
      </div>
      <div class="filter-group">
        <label>日志级别</label>
        <select id="filterLevel">
          <option value="">全部</option>
          <option value="info">info</option>
          <option value="warn">warn</option>
          <option value="error">error</option>
        </select>
      </div>
      <div class="filter-group">
        <label>已读过滤</label>
        <label style="display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;">
          <input type="checkbox" />
          <span style="font-size: 14px; font-weight: normal; color: #0f172a;">启用</span>
        </label>
      </div>
    </div>
    <div class="action-buttons">
      <button class="btn btn-primary" onclick="search()">查询</button>
      <button class="btn btn-secondary" onclick="exportLogs()">📤 导出</button>
      <button class="btn btn-success" onclick="addLog()">➕ 新增日志</button>
    </div>
  </div>

  <div class="card">
    <table class="data-table">
      <thead>
        <tr>
          <th>操作时间</th>
          <th>操作人员</th>
          <th>内容</th>
          <th>备注</th>
          <th>ID</th>
          <th>日志级别</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="logsTbody"></tbody>
    </table>
  </div>

  <div class="hint-box">
    <div><strong>使用提示:</strong></div>
    <div>1. 不车做用户活动,便于追溯和审计操作行为</div>
    <div>2. 定期检查所安装日志,识别异常操作和潜在风险</div>
    <div>3. 操作日志自动记录,无法修改,确保信息准确可靠</div>
  </div>

  <div class="card">
    <div class="card-title">日志统计柱状图</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
      <div>
        <div style="font-weight: 600; margin-bottom: 12px; text-align: center;">操作类型分布</div>
        <canvas id="typeChart" width="300" height="300"></canvas>
      </div>
      <div>
        <div style="font-weight: 600; margin-bottom: 12px; text-align: center;">操作结果分布</div>
        <canvas id="resultChart" width="300" height="300"></canvas>
      </div>
    </div>
  </div>

  <script src="/app/modules/common.js"></script>
  <script>
    let allLogs = [];
    let visibleLogs = [];

    const typeChart = createChart($('#typeChart'), {
      type: 'doughnut',
      data: {
        labels: ['info', 'warn', 'error'],
        datasets: [{
          data: [0, 0, 0],
          backgroundColor: ['#0ea5e9', '#f59e0b', '#ef4444']
        }]
      }
    });

    const resultChart = createChart($('#resultChart'), {
      type: 'bar',
      data: {
        labels: ['info', 'warn', 'error'],
        datasets: [{
          label: '数量',
          data: [0, 0, 0],
          backgroundColor: ['#0ea5e9', '#f59e0b', '#ef4444']
        }]
      },
      options: {
        indexAxis: 'y',
        scales: { x: { beginAtZero: true } }
      }
    });

    function escapeText(v) {
      if (v === null || v === undefined) return '';
      return String(v);
    }

    function renderTable(items) {
      const tbody = $('#logsTbody');
      tbody.innerHTML = '';
      for (const it of items) {
        const tr = document.createElement('tr');

        const tdTime = document.createElement('td');
        tdTime.textContent = formatDate(it.created_at);

        const tdOp = document.createElement('td');
        tdOp.textContent = it.meta ? it.meta : '-';

        const tdMsg = document.createElement('td');
        tdMsg.textContent = escapeText(it.message);

        const tdMeta = document.createElement('td');
        tdMeta.textContent = it.meta ? it.meta : '-';

        const tdId = document.createElement('td');
        tdId.textContent = String(it.id);

        const tdLevel = document.createElement('td');
        tdLevel.textContent = escapeText(it.level);

        const tdActions = document.createElement('td');
        const viewBtn = document.createElement('button');
        viewBtn.className = 'btn btn-primary btn-action';
        viewBtn.textContent = '查看';
        viewBtn.onclick = () => {
          alert(`时间: ${formatDate(it.created_at)}\n级别: ${escapeText(it.level)}\n内容: ${escapeText(it.message)}\n备注: ${escapeText(it.meta || '')}`);
        };
        const delBtn = document.createElement('button');
        delBtn.className = 'btn btn-danger btn-action';
        delBtn.textContent = '删除';
        delBtn.onclick = () => {
          showToast('当前后端未提供删除接口', 'info');
        };
        tdActions.appendChild(viewBtn);
        tdActions.appendChild(delBtn);

        tr.appendChild(tdTime);
        tr.appendChild(tdOp);
        tr.appendChild(tdMsg);
        tr.appendChild(tdMeta);
        tr.appendChild(tdId);
        tr.appendChild(tdLevel);
        tr.appendChild(tdActions);
        tbody.appendChild(tr);
      }
    }

    function updateCharts(items) {
      const counts = { info: 0, warn: 0, error: 0 };
      for (const it of items) {
        const lv = (it.level || '').toLowerCase();
        if (lv === 'info' || lv === 'warn' || lv === 'error') counts[lv] += 1;
      }
      const data = [counts.info, counts.warn, counts.error];
      if (typeChart) {
        typeChart.data.datasets[0].data = data;
        typeChart.update();
      }
      if (resultChart) {
        resultChart.data.datasets[0].data = data;
        resultChart.update();
      }
    }

    async function loadLogs(page = 1, pageSize = 50) {
      const res = await api(`/logs/list?page=${page}&page_size=${pageSize}`);
      const data = await res.json();
      allLogs = Array.isArray(data.items) ? data.items : [];
      visibleLogs = allLogs.slice();
      renderTable(visibleLogs);
      updateCharts(visibleLogs);
    }

    function search() {
      const operator = ($('#filterOperator').value || '').trim().toLowerCase();
      const keyword = ($('#filterKeyword').value || '').trim().toLowerCase();
      const level = ($('#filterLevel').value || '').trim().toLowerCase();

      visibleLogs = allLogs.filter((it) => {
        const meta = (it.meta || '').toLowerCase();
        const msg = (it.message || '').toLowerCase();
        const lv = (it.level || '').toLowerCase();

        if (operator && !meta.includes(operator)) return false;
        if (level && lv !== level) return false;
        if (keyword && !(msg.includes(keyword) || meta.includes(keyword) || lv.includes(keyword))) return false;
        return true;
      });

      renderTable(visibleLogs);
      updateCharts(visibleLogs);
      showToast(`已筛选：${visibleLogs.length} 条`, 'success');
    }

    function exportLogs() {
      const rows = [
        ['id', 'created_at', 'level', 'message', 'meta'],
        ...visibleLogs.map((it) => [
          it.id,
          it.created_at,
          it.level,
          it.message,
          it.meta
        ])
      ];

      const csv = rows
        .map((r) => r.map((cell) => {
          const s = cell === null || cell === undefined ? '' : String(cell);
          const escaped = s.replace(/"/g, '""');
          return `"${escaped}"`;
        }).join(','))
        .join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `logs_${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function addLog() {
      const level = (prompt('日志级别（info/warn/error）', 'info') || '').trim();
      if (!level) return;
      const message = (prompt('日志内容', '') || '').trim();
      if (!message) return;
      const meta = (prompt('备注/操作人员（可选）', '') || '').trim();

      const res = await api('/logs/append', {
        method: 'POST',
        body: { level, message, meta }
      });
      const data = await res.json();
      if (!data || data.ok !== true) {
        showToast(data && data.error ? data.error : '新增失败', 'error');
        return;
      }
      showToast('新增成功', 'success');
      await loadLogs(1, 50);
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadLogs(1, 50).catch((e) => {
        showToast(e.message || '加载失败', 'error');
      });
    });
  </script>
</body>
</html>
