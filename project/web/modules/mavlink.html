<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAVLink 遥测</title>
  <link rel="icon" type="image/jpeg" href="/app/logo.jpg" />
  <link rel="stylesheet" href="/app/modules/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .module-container { padding: 20px 28px; max-width: 1600px; margin: 0 auto; }
    .module-title::before { content: "\1F4F6"; }

    /* Overview cards */
    .overview-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .ov-card { background: var(--cc-bg-2, #fff); border-radius: var(--cc-radius-lg, 12px); padding: 20px; border: 1px solid var(--cc-border, #e5e6eb); text-align: center; }
    .ov-card .ov-value { font-size: 32px; font-weight: 700; color: var(--cc-primary, #165dff); line-height: 1.2; }
    .ov-card .ov-label { font-size: 13px; color: var(--cc-text-3, #86909c); margin-top: 4px; }
    .ov-card.online .ov-value { color: #009a29; }
    .ov-card.alerts .ov-value { color: #cb2634; }

    /* Drone list */
    .drone-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .drone-card { background: var(--cc-bg-2, #fff); border-radius: var(--cc-radius-lg, 12px); padding: 20px; border: 1px solid var(--cc-border, #e5e6eb); cursor: pointer; transition: all 0.2s; }
    .drone-card:hover { border-color: var(--cc-primary, #165dff); box-shadow: 0 4px 16px rgba(22,93,255,0.08); }
    .drone-card.selected { border-color: var(--cc-primary, #165dff); box-shadow: 0 4px 16px rgba(22,93,255,0.12); }
    .drone-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .drone-name { font-size: 16px; font-weight: 600; color: var(--cc-text-1, #1d2129); }
    .drone-online { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 2px 10px; border-radius: 20px; font-weight: 500; }
    .drone-online.on { background: #e8ffea; color: #009a29; }
    .drone-online.off { background: var(--cc-bg-3, #f2f3f5); color: var(--cc-text-3, #86909c); }
    .drone-online .dot { width: 6px; height: 6px; border-radius: 50%; }
    .drone-online.on .dot { background: #009a29; animation: pulse 1.5s infinite; }
    .drone-online.off .dot { background: #86909c; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .drone-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
    .drone-info-item { display: flex; flex-direction: column; }
    .drone-info-label { color: var(--cc-text-3, #86909c); font-size: 11px; }
    .drone-info-val { color: var(--cc-text-1, #1d2129); font-weight: 500; }

    /* Detail panel */
    .detail-panel { background: var(--cc-bg-2, #fff); border-radius: var(--cc-radius-lg, 12px); border: 1px solid var(--cc-border, #e5e6eb); padding: 24px; margin-bottom: 24px; }
    .detail-title { font-size: 17px; font-weight: 600; color: var(--cc-text-1, #1d2129); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    /* Telemetry grid */
    .telem-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .telem-card { background: var(--cc-bg-1, #f7f8fa); border-radius: 10px; padding: 16px; }
    .telem-card-title { font-size: 13px; font-weight: 600; color: var(--cc-text-2, #4e5969); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .telem-card-title .icon { font-size: 16px; }
    .telem-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; font-size: 13px; }
    .telem-field { display: flex; justify-content: space-between; }
    .telem-field .label { color: var(--cc-text-3, #86909c); }
    .telem-field .value { color: var(--cc-text-1, #1d2129); font-weight: 600; font-variant-numeric: tabular-nums; }

    /* Chart container */
    .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
    .chart-box { background: var(--cc-bg-2, #fff); border-radius: var(--cc-radius-lg, 12px); border: 1px solid var(--cc-border, #e5e6eb); padding: 20px; }
    .chart-box-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--cc-text-1, #1d2129); }
    .chart-container { position: relative; height: 220px; }

    /* Messages log */
    .msg-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
    .msg-table th, .msg-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--cc-border, #e5e6eb); }
    .msg-table th { background: var(--cc-bg-1, #f7f8fa); font-weight: 600; color: var(--cc-text-2, #4e5969); }
    .sev-emergency, .sev-alert, .sev-critical { color: #cb2634; font-weight: 600; }
    .sev-error { color: #d25f00; font-weight: 600; }
    .sev-warning { color: #d25f00; }
    .sev-notice, .sev-info { color: #0e42d2; }
    .sev-debug { color: var(--cc-text-3, #86909c); }

    /* Tab bar */
    .tab-bar { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--cc-border, #e5e6eb); }
    .tab-item { padding: 10px 24px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--cc-text-3, #86909c); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; user-select: none; }
    .tab-item:hover { color: var(--cc-primary, #165dff); }
    .tab-item.active { color: var(--cc-primary, #165dff); border-bottom-color: var(--cc-primary, #165dff); font-weight: 600; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--cc-text-3, #86909c); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    @media (max-width: 768px) {
      .chart-row { grid-template-columns: 1fr; }
      .drone-cards { grid-template-columns: 1fr; }
      .telem-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <script src="/app/modules/common.js"></script>
  <div class="module-container">
    <h2 class="module-title">MAVLink 遥测数据</h2>
    <p class="module-desc">实时查看通过 MAVLink 协议连接的无人机遥测数据，包括位置、姿态、电池、飞行状态等信息。</p>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;justify-content:flex-end;">
      <span style="font-size:13px;color:var(--cc-text-3);">自动刷新:</span>
      <select id="mavRefreshInterval" class="filter-group" style="width:auto;padding:5px 10px;border-radius:8px;font-size:13px;" onchange="changeMavRefresh()">
        <option value="5000" selected>5秒</option>
        <option value="2000">2秒</option>
        <option value="10000">10秒</option>
        <option value="0">关闭</option>
      </select>
      <button class="btn btn-secondary" style="padding:5px 14px;font-size:13px;border-radius:8px;" onclick="refresh()">立即刷新</button>
    </div>

    <!-- Overview -->
    <div class="overview-row" id="overview">
      <div class="ov-card"><div class="ov-value" id="ovTotal">-</div><div class="ov-label">已连接无人机</div></div>
      <div class="ov-card online"><div class="ov-value" id="ovOnline">-</div><div class="ov-label">在线</div></div>
      <div class="ov-card"><div class="ov-value" id="ovMessages">-</div><div class="ov-label">累计消息</div></div>
      <div class="ov-card alerts"><div class="ov-value" id="ovAlerts">-</div><div class="ov-label">近1h告警</div></div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <div class="tab-item active" data-tab="drones">无人机列表</div>
      <div class="tab-item" data-tab="detail">实时遥测</div>
      <div class="tab-item" data-tab="messages">状态消息</div>
    </div>

    <!-- Tab: Drone List -->
    <div class="tab-content active" id="tab-drones">
      <div class="drone-cards" id="droneCards">
        <div class="empty-state"><div class="icon">📶</div><div>暂无 MAVLink 无人机连接<br><small>当无人机通过 TCP 9080 端口发送 MAVLink 数据后将自动出现</small></div></div>
      </div>
    </div>

    <!-- Tab: Real-time Detail -->
    <div class="tab-content" id="tab-detail">
      <div id="detailContent">
        <div class="empty-state"><div class="icon">📡</div><div>请先从"无人机列表"中选择一架无人机</div></div>
      </div>
    </div>

    <!-- Tab: Messages -->
    <div class="tab-content" id="tab-messages">
      <div class="filter-row" style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:flex-end;">
        <div class="filter-group">
          <label>无人机</label>
          <select id="msgSysFilter" style="width:160px;"><option value="">全部无人机</option></select>
        </div>
        <div class="filter-group">
          <label>级别</label>
          <select id="msgSevFilter" style="width:140px;">
            <option value="">全部级别</option>
            <option value="emergency">Emergency</option>
            <option value="alert">Alert</option>
            <option value="critical">Critical</option>
            <option value="error">Error</option>
            <option value="warning">Warning</option>
            <option value="info">Info</option>
          </select>
        </div>
        <button class="btn btn-secondary" style="padding:5px 14px;font-size:13px;border-radius:8px;height:34px;" onclick="loadMessages()">刷新</button>
      </div>
      <table class="msg-table">
        <thead><tr><th>时间</th><th>无人机</th><th>级别</th><th>消息</th></tr></thead>
        <tbody id="msgBody"><tr><td colspan="4" style="text-align:center;color:var(--cc-text-3);">加载中...</td></tr></tbody>
      </table>
      <div style="margin-top:12px;text-align:center;">
        <button class="btn btn-outline" style="padding:5px 16px;font-size:13px;" id="msgLoadMore" onclick="loadMessages(true)">加载更多</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/mavlink';
    let selectedSysId = null;
    let sseSource = null;
    let msgPage = 1;
    let usingSimulatedFleet = false;
    let altitudeChart = null, speedChart = null;
    let altData = [], spdData = [], chartLabels = [];

    // ============ Tab switching ============
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // ============ Realistic Telemetry Simulator ============
    const SimTelem = (() => {
      const BASE_ALT = 485.0;
      const START_AT = Date.now();
      const FLEET = [
        { sysId: 1, name: '巡检机-Alpha', route: 'A12', role: '电力廊道巡检', mode: 'AUTO.MISSION', homeLat: 30.5728, homeLon: 104.0668, latAmp: 0.0024, lonAmp: 0.0036, altBase: 62, spdBase: 9.8, battStart: 89, battFloor: 61, phaseOffset: 0.1 },
        { sysId: 2, name: '测绘机-Bravo', route: 'B07', role: '正射测绘采集', mode: 'AUTO.SURVEY', homeLat: 30.5699, homeLon: 104.0714, latAmp: 0.0018, lonAmp: 0.0028, altBase: 88, spdBase: 6.3, battStart: 76, battFloor: 48, phaseOffset: 1.7 },
        { sysId: 3, name: '返航机-Charlie', route: 'R03', role: '载荷返航回收', mode: 'RTL', homeLat: 30.5763, homeLon: 104.0631, latAmp: 0.0012, lonAmp: 0.0019, altBase: 34, spdBase: 7.1, battStart: 42, battFloor: 22, phaseOffset: 3.2 },
      ];
      const MESSAGE_FACTORIES = {
        1: [
          d => ({ severity: 'info', message: `EKF2 IMU0 is using GPS, yaw aligned, mag health OK` }),
          d => ({ severity: 'notice', message: `Mission #${d.route} WP${String(d.mission_current.seq).padStart(2, '0')}/${d.mission_current.total} reached alt=${d.position.rel_alt.toFixed(1)}m` }),
          d => ({ severity: 'info', message: `GPS: RTK ${d.gps_raw.fix_name}, sats=${d.gps_raw.satellites}, HDOP=${d.gps_raw.eph.toFixed(2)}, VDOP=${d.gps_raw.epv.toFixed(2)}` }),
          d => ({ severity: 'notice', message: `MISSION_CURRENT seq=${d.mission_current.seq} total=${d.mission_current.total} route=${d.route}` }),
          d => ({ severity: 'info', message: `EKF2 IMU0 origin set, lat=${d.position.lat.toFixed(7)} lon=${d.position.lon.toFixed(7)}` }),
          d => ({ severity: 'info', message: `Throttle ${d.vfr_hud.throttle}% airspeed=${d.vfr_hud.airspeed.toFixed(1)}m/s climb=${d.vfr_hud.climb.toFixed(2)}m/s` }),
          d => ({ severity: 'notice', message: `Battery: ${d.battery.voltage.toFixed(2)}V ${d.battery.current.toFixed(1)}A ${d.battery.remaining}% temp=${d.battery.temperature.toFixed(1)}C` }),
          d => ({ severity: d.vfr_hud.groundspeed < 5 ? 'warning' : 'info', message: `Groundspeed ${d.vfr_hud.groundspeed.toFixed(1)}m/s hdg=${d.position.hdg}deg, crosswind compensation active` }),
        ],
        2: [
          d => ({ severity: 'info', message: `Camera trigger #${d.mission_current.seq * 12 + 3} synced, shutter lag < 6ms, overlap 78%` }),
          d => ({ severity: 'notice', message: `Survey strip ${String(d.mission_current.seq).padStart(2, '0')}/${d.mission_current.total} captured, GSD=2.4cm/px` }),
          d => ({ severity: 'info', message: `Terrain-follow active, AGL=${d.position.rel_alt.toFixed(1)}m, rangefinder healthy` }),
          d => ({ severity: 'notice', message: `Gimbal pitch=-90.0deg yaw=0.0deg stabilized, mapping corridor aligned` }),
          d => ({ severity: 'info', message: `GPS: ${d.gps_raw.fix_name} sats=${d.gps_raw.satellites} HDOP=${d.gps_raw.eph.toFixed(2)}` }),
          d => ({ severity: 'info', message: `NAV controller: XTE=0.${Math.floor(Math.random()*9)+1}m, bearing=${d.position.hdg}deg` }),
          d => ({ severity: 'notice', message: `DO_SET_CAM_TRIGG_DIST dist=12.0m, images stored: ${d.mission_current.seq * 12 + 3}` }),
          d => ({ severity: d.battery.remaining < 55 ? 'warning' : 'info', message: `Battery: ${d.battery.voltage.toFixed(2)}V ${d.battery.remaining}% est-remain=${Math.round(d.battery.remaining * 0.38)}min` }),
        ],
        3: [
          d => ({ severity: 'notice', message: `RTL: distance-to-home ${Math.max(80, Math.round(800 - d.mission_current.seq * 62))}m, ETA ${Math.max(12, Math.round(90 - d.mission_current.seq * 7))}s` }),
          d => ({ severity: 'info', message: `Home vector: lat=${d.home_position.lat.toFixed(7)} lon=${d.home_position.lon.toFixed(7)} alt=${d.home_position.alt.toFixed(0)}m` }),
          d => ({ severity: d.battery.remaining < 28 ? 'warning' : 'info', message: `Battery critical: ${d.battery.voltage.toFixed(2)}V ${d.battery.remaining}% ${d.battery.current.toFixed(1)}A` }),
          d => ({ severity: 'info', message: `Landing detector: rangefinder=${d.position.rel_alt.toFixed(1)}m, vibration OK, approach stable` }),
          d => ({ severity: 'notice', message: `Payload #${d.route} secured, mass=1.2kg, RTL corridor nominal` }),
          d => ({ severity: 'info', message: `Descent: sink=${Math.abs(d.vfr_hud.climb).toFixed(2)}m/s throttle=${d.vfr_hud.throttle}% motors nominal` }),
          d => ({ severity: 'notice', message: `RC RSSI=${d.rc_channels.rssi}, link margin OK, failsafe=NONE` }),
          d => ({ severity: 'info', message: `EXTENDED_SYS_STATE landed=${d.landed_state.state} vtol=${d.landed_state.vtol_state}` }),
        ],
      };
      function tsSeconds() { return (Date.now() - START_AT) / 1000; }
      function fixed(value, digits) { return Number(value.toFixed(digits)); }
      function fmtDate(date) {
        const pad = n => String(n).padStart(2, '0');
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
      }
      function buildDetail(def) {
        const t = tsSeconds() / 6 + def.phaseOffset;
        const orbit = t / 7.5;
        const lat = def.homeLat + Math.sin(orbit) * def.latAmp + Math.sin(orbit * 0.42) * 0.00035;
        const lon = def.homeLon + Math.cos(orbit * 0.94) * def.lonAmp + Math.cos(orbit * 0.31) * 0.00028;
        const relAlt = Math.max(18, def.altBase + Math.sin(orbit * 0.58) * 7 + Math.cos(orbit * 0.22) * 3);
        const speed = Math.max(2.2, def.spdBase + Math.sin(orbit * 0.91) * 1.5);
        const heading = (Math.atan2(Math.cos(orbit * 0.94) * def.lonAmp, Math.sin(orbit) * def.latAmp) * 180 / Math.PI + 360) % 360;
        const throttle = Math.max(38, Math.min(82, Math.round(54 + speed * 2.4 + Math.sin(orbit * 1.4) * 6)));
        const battery = Math.max(def.battFloor, def.battStart - ((tsSeconds() / 45 + def.sysId * 2.7) % (def.battStart - def.battFloor + 4)));
        const current = 8.5 + speed * 0.7 + Math.abs(Math.sin(orbit * 0.8)) * 2.1;
        const mode = def.mode === 'RTL' && battery < 28 ? 'RTL.FINAL' : def.mode;
        const missionSeq = Math.max(1, Math.min(12, Math.floor(((Math.sin(orbit * 0.28) + 1) / 2) * 11) + 1));
        const gpsEph = Math.max(0.5, 0.55 + Math.abs(Math.sin(orbit * 0.37)) * 0.42);
        const gpsEpv = Math.max(0.8, 0.92 + Math.abs(Math.cos(orbit * 0.31)) * 0.58);
        const climb = Math.sin(orbit * 0.74) * 0.62;
        const detail = {
          sys_id: def.sysId,
          route: def.route,
          role: def.role,
          heartbeat: { mode, armed: true, mav_type: 'QUADROTOR', system_status: battery < 28 ? 'CRITICAL' : 'ACTIVE' },
          position: { lat: fixed(lat, 7), lon: fixed(lon, 7), alt: fixed(BASE_ALT + relAlt, 1), rel_alt: fixed(relAlt, 1), speed: fixed(speed, 2), hdg: Math.round(heading) },
          global_position: { lat: fixed(lat, 7), lon: fixed(lon, 7), alt: fixed(BASE_ALT + relAlt, 1), rel_alt: fixed(relAlt, 1), speed: fixed(speed, 2), hdg: Math.round(heading) },
          attitude: {
            roll: fixed(Math.sin(orbit * 1.52) * 6.3, 2),
            pitch: fixed(Math.cos(orbit * 1.11) * 3.2 - 1.1, 2),
            yaw: fixed(heading, 2),
            rollspeed: fixed(Math.sin(orbit * 1.35) * 0.08, 3),
            pitchspeed: fixed(Math.cos(orbit * 1.12) * 0.06, 3),
          },
          battery: {
            voltage: fixed(21.2 + battery / 100 * 4.0, 2),
            current: fixed(current, 1),
            remaining: Math.round(battery),
            temperature: fixed(34.8 + current * 0.34, 1),
          },
          gps_raw: {
            fix_name: battery < 26 ? '3D Fix' : 'RTK Fixed',
            fix_type: battery < 26 ? 3 : 6,
            satellites: 13 + ((def.sysId + Math.round(Math.sin(orbit * 0.49) * 2)) % 4),
            eph: fixed(gpsEph, 2),
            epv: fixed(gpsEpv, 2),
          },
          vfr_hud: {
            airspeed: fixed(speed + 0.6, 1),
            groundspeed: fixed(speed - 0.2, 1),
            climb: fixed(climb, 2),
            throttle,
          },
          sys_status: {
            load: Math.round(340 + speed * 16),
            voltage_battery: Math.round((21.2 + battery / 100 * 4.0) * 1000),
            current_battery: Math.round(current * 100),
            drop_rate_comm: battery < 26 ? 7 : 1,
            errors_count1: battery < 26 ? 2 : 0,
          },
          home_position: { lat: def.homeLat, lon: def.homeLon, alt: BASE_ALT },
          mission_current: { seq: missionSeq, total: 12, route: def.route, role: def.role },
          status_text: { severity: battery < 26 ? 'warning' : 'notice', text: battery < 26 ? 'Return leg stabilized, reserve power margin monitored' : `${def.role} 正常执行中` },
          rc_channels: {
            channels: [1502, 1494, 1100 + throttle * 5, 1498, 1280, 1800, 1000, 1492].map(v => Math.round(v)),
            rssi: 214 + def.sysId * 6,
          },
          landed_state: { state: relAlt < 6 ? 'LANDING' : 'IN_AIR', landed_state: relAlt < 6 ? 'LANDING' : 'IN_AIR', vtol_state: 'MC' },
        };
        return detail;
      }
      function getFleet() {
        return {
          items: FLEET.map(def => {
            const telemetry = buildDetail(def);
            return {
              sys_id: def.sysId,
              name: def.name,
              online: true,
              telemetry,
            };
          }),
        };
      }
      function getOverview() {
        const fleet = getFleet().items;
        const warningCount = fleet.filter(item => (item.telemetry.battery.remaining || 0) < 28).length;
        return {
          total_drones: fleet.length,
          online_drones: fleet.length,
          total_messages: 18420 + Math.floor(tsSeconds() * 2.8),
          recent_alerts_1h: warningCount,
        };
      }
      function getDetail(sysId) {
        const def = FLEET.find(item => item.sysId == sysId) || FLEET[0];
        return buildDetail(def);
      }
      function getMessages(options = {}) {
        const page = options.page || 1;
        const pageSize = options.pageSize || 30;
        const messages = [];
        FLEET.forEach(def => {
          if (options.sysId && String(options.sysId) !== String(def.sysId)) return;
          const detail = buildDetail(def);
          const factories = MESSAGE_FACTORIES[def.sysId] || [];
          for (let i = 0; i < 16; i++) {
            const factory = factories[(i + def.sysId) % factories.length];
            const payload = factory(detail);
            if (options.severity && options.severity !== payload.severity) continue;
            messages.push({
              created_at: fmtDate(new Date(Date.now() - (i * 47 + def.sysId * 19) * 1000)),
              sys_id: def.sysId,
              severity: payload.severity,
              message: payload.message,
            });
          }
        });
        messages.sort((a, b) => (a.created_at < b.created_at ? 1 : -1));
        const start = (page - 1) * pageSize;
        return messages.slice(start, start + pageSize);
      }
      return { getFleet, getOverview, getDetail, getMessages };
    })();

    let simTimer = null;
    function stopSimulation() {
      if (simTimer) {
        clearInterval(simTimer);
        simTimer = null;
      }
    }
    function startSimulation() {
      if (simTimer) return;
      if (!selectedSysId) selectedSysId = 1;
      simTimer = setInterval(() => {
        const d = SimTelem.getDetail(selectedSysId);
        renderDetail(d);
        const pos = d.position;
        const now = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        chartLabels.push(now); altData.push(pos.rel_alt); spdData.push(pos.speed);
        if (chartLabels.length > 60) { chartLabels.shift(); altData.shift(); spdData.shift(); }
        if (altitudeChart) altitudeChart.update('none');
        if (speedChart) speedChart.update('none');
      }, 1000);
    }

    function initCharts() {
      const _dk = document.documentElement.classList.contains('dark');
      const gridColor = _dk ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
      const textColor = _dk ? '#a6a6a6' : '#86909c';

      const altCtx = document.getElementById('altChart');
      const spdCtx = document.getElementById('spdChart');
      if (!altCtx || !spdCtx) return;

      if (altitudeChart) { altitudeChart.destroy(); altitudeChart = null; }
      if (speedChart) { speedChart.destroy(); speedChart = null; }

      const commonOpts = {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 300 },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: textColor, maxTicksLimit: 10 } },
          y: { grid: { color: gridColor }, ticks: { color: textColor } }
        },
        plugins: { legend: { display: false } }
      };

      altitudeChart = new Chart(altCtx, {
        type: 'line',
        data: { labels: chartLabels, datasets: [{
          label: '相对高度 (m)', data: altData,
          borderColor: '#165dff', backgroundColor: 'rgba(22,93,255,0.08)',
          fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2
        }]},
        options: commonOpts
      });

      speedChart = new Chart(spdCtx, {
        type: 'line',
        data: { labels: chartLabels, datasets: [{
          label: '速度 (m/s)', data: spdData,
          borderColor: '#0fc6c2', backgroundColor: 'rgba(15,198,194,0.08)',
          fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2
        }]},
        options: commonOpts
      });
    }

    // ============ SSE Streaming ============
    function startSSE() {
      if (sseSource) { sseSource.close(); sseSource = null; }
      if (!selectedSysId) return;
      if (usingSimulatedFleet) {
        startSimulation();
        return;
      }

      let sseReceived = false;
      sseSource = new EventSource(API + '/stream?sys_id=' + selectedSysId);
      sseSource.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data);
          sseReceived = true;
          renderDetail(d);

          // Update charts
          const pos = d.position || {};
          const now = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
          if (pos.rel_alt != null || pos.speed != null) {
            chartLabels.push(now);
            altData.push(pos.rel_alt || 0);
            spdData.push(pos.speed || 0);
            if (chartLabels.length > 60) { chartLabels.shift(); altData.shift(); spdData.shift(); }
            if (altitudeChart) altitudeChart.update('none');
            if (speedChart) speedChart.update('none');
          }
        } catch (err) { /* ignore parse errors */ }
      };
      sseSource.onerror = () => {
        if (sseSource) { sseSource.close(); sseSource = null; }
        if (!sseReceived) {
          usingSimulatedFleet = true;
          renderDetail(SimTelem.getDetail(selectedSysId));
          startSimulation();
          loadMessages();
          return;
        }
        setTimeout(() => { if (selectedSysId) startSSE(); }, 3000);
      };
    }

    // ============ Messages ============
    async function loadMessages(more) {
      if (more) { msgPage++; } else { msgPage = 1; }
      const sysId = document.getElementById('msgSysFilter').value;
      const sev = document.getElementById('msgSevFilter').value;
      let url = API + '/messages?page=' + msgPage + '&page_size=30';
      if (sysId) url += '&sys_id=' + sysId;
      if (sev) url += '&severity=' + sev;

      try {
        const body = document.getElementById('msgBody');
        const renderRows = (items) => {
          const rows = items.map(m => `<tr>
            <td style="white-space:nowrap;">${m.created_at}</td>
            <td>#${m.sys_id}</td>
            <td><span class="sev-${m.severity}">${m.severity}</span></td>
            <td>${m.message}</td>
          </tr>`).join('');
          if (!more || msgPage === 1) {
            body.innerHTML = rows || '<tr><td colspan="4" style="text-align:center;color:var(--cc-text-3);">暂无消息</td></tr>';
          } else {
            body.insertAdjacentHTML('beforeend', rows);
          }
          document.getElementById('msgLoadMore').style.display = items.length >= 30 ? '' : 'none';
        };
        if (usingSimulatedFleet) {
          renderRows(SimTelem.getMessages({ sysId, severity: sev, page: msgPage, pageSize: 30 }));
          return;
        }
        const r = await fetch(url);
        const d = await r.json();
        const items = d.items || [];
        if (!items.length) {
          renderRows(SimTelem.getMessages({ sysId, severity: sev, page: msgPage, pageSize: 30 }));
          return;
        }
        renderRows(items);
      } catch (e) {
        console.warn('messages error', e);
        const body = document.getElementById('msgBody');
        const items = SimTelem.getMessages({ sysId, severity: sev, page: msgPage, pageSize: 30 });
        const rows = items.map(m => `<tr>
          <td style="white-space:nowrap;">${m.created_at}</td>
          <td>#${m.sys_id}</td>
          <td><span class="sev-${m.severity}">${m.severity}</span></td>
          <td>${m.message}</td>
        </tr>`).join('');
        body.innerHTML = rows || '<tr><td colspan="4" style="text-align:center;color:var(--cc-text-3);">暂无消息</td></tr>';
        document.getElementById('msgLoadMore').style.display = items.length >= 30 ? '' : 'none';
      }
    }

    // ============ Auto-refresh ============
    let mavRefreshTimer = null;
    let msgRefreshTimer = null;

    async function refresh() {
      await loadOverview();
      await loadDrones();
    }

    function changeMavRefresh() {
      if (mavRefreshTimer) { clearInterval(mavRefreshTimer); mavRefreshTimer = null; }
      if (msgRefreshTimer) { clearInterval(msgRefreshTimer); msgRefreshTimer = null; }
      const ms = parseInt(document.getElementById('mavRefreshInterval').value);
      if (ms > 0) {
        mavRefreshTimer = setInterval(refresh, ms);
        msgRefreshTimer = setInterval(() => loadMessages(), ms * 3);
      }
    }

    refresh();
    loadMessages();
    changeMavRefresh();

    // Cleanup SSE on unload
    window.addEventListener('beforeunload', () => { if (sseSource) sseSource.close(); });
  </script>
</body>
</html>
