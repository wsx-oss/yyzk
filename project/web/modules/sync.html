<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据同步状态</title>
  <link rel="stylesheet" href="/app/modules/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="module-header">
    <div class="module-title">数据同步状态</div>
    <div class="action-buttons">
      <button class="btn btn-primary" onclick="loadSyncStatus()">🔄 刷新状态</button>
      <button class="btn btn-secondary" id="syncBtn" onclick="syncNow()">📤 执行/立即同步</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">当前同步状态</div>
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;">
      <div style="text-align: center; padding: 16px; background: #f8fafc; border-radius: 8px;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">同步状态</div>
        <div id="syncStatusBadge" style="font-size: 18px; font-weight: 700;">-</div>
      </div>
      <div style="text-align: center; padding: 16px; background: #f8fafc; border-radius: 8px;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">状态消息</div>
        <div id="syncMessage" style="font-size: 14px; font-weight: 600;">-</div>
      </div>
      <div style="text-align: center; padding: 16px; background: #f8fafc; border-radius: 8px;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">最后同步时间</div>
        <div id="syncLastTime" style="font-size: 14px; font-weight: 600;">-</div>
      </div>
      <div style="text-align: center; padding: 16px; background: #f8fafc; border-radius: 8px;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">更新时间</div>
        <div id="syncUpdatedAt" style="font-size: 14px; font-weight: 600;">-</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">实时同步进度</div>
    <div class="progress-bar" style="height: 24px; margin-bottom: 8px;">
      <div id="progressFill" class="progress-fill" style="width: 0%; background: #0ea5e9; transition: width 0.5s;">
        <span id="progressText" style="color: #fff; font-size: 13px; padding-left: 10px;"></span>
      </div>
    </div>
    <div id="progressDetail" style="font-size: 13px; color: #64748b;">等待同步...</div>
  </div>

  <div class="card">
    <div class="card-title">同步历史记录</div>
    <table class="data-table">
      <thead>
        <tr>
          <th>时间</th>
          <th>状态</th>
          <th>消息</th>
        </tr>
      </thead>
      <tbody id="syncHistoryTbody"></tbody>
    </table>
  </div>

  <div class="hint-box">
    <div><strong>使用提示:</strong></div>
    <div>1. 通过配置同步任务实现多服务器之间的数据一致性</div>
    <div>2. 定期检查同步状态,确保数据准确无误</div>
    <div>3. 同步失败时请检查网络连接和目标端状态</div>
  </div>

  <div class="card">
    <div class="card-title">同步状态统计</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
      <div>
        <div style="font-weight: 600; margin-bottom: 12px; text-align: center;">同步状态分布</div>
        <canvas id="statusChart" width="300" height="300"></canvas>
      </div>
      <div>
        <div style="font-weight: 600; margin-bottom: 12px; text-align: center;">同步操作时间线</div>
        <canvas id="timelineChart" width="300" height="300"></canvas>
      </div>
    </div>
  </div>

  <script src="/app/modules/common.js"></script>
  <script>
    let syncHistory = [];
    let isSyncing = false;

    const statusColorMap = {
      success: '#10b981',
      syncing: '#0ea5e9',
      failed: '#ef4444',
      idle: '#94a3b8'
    };
    const statusLabelMap = {
      success: '✅ 已完成',
      syncing: '🔄 同步中',
      failed: '❌ 失败',
      idle: '⏸ 空闲',
      '': '⏸ 空闲'
    };

    const statusChart = createChart($('#statusChart'), {
      type: 'doughnut',
      data: {
        labels: ['已完成', '失败', '同步中', '空闲'],
        datasets: [{
          data: [0, 0, 0, 1],
          backgroundColor: ['#10b981', '#ef4444', '#0ea5e9', '#94a3b8']
        }]
      }
    });

    const timelineChart = createChart($('#timelineChart'), {
      type: 'bar',
      data: {
        labels: [],
        datasets: [{
          label: '同步操作',
          data: [],
          backgroundColor: []
        }]
      },
      options: {
        indexAxis: 'y',
        scales: { x: { beginAtZero: true, max: 1, display: false } },
        plugins: { legend: { display: false } }
      }
    });

    function updateStatusDisplay(data) {
      const status = data.status || 'idle';
      $('#syncStatusBadge').textContent = statusLabelMap[status] || status;
      $('#syncStatusBadge').style.color = statusColorMap[status] || '#64748b';
      $('#syncMessage').textContent = data.message || '-';
      $('#syncLastTime').textContent = data.last_synced_at ? formatDate(data.last_synced_at) : '-';
      $('#syncUpdatedAt').textContent = data.updated_at ? formatDate(data.updated_at) : '-';

      if (status === 'syncing') {
        isSyncing = true;
        $('#syncBtn').disabled = true;
        $('#syncBtn').textContent = '⏳ 同步中...';
      } else {
        isSyncing = false;
        $('#syncBtn').disabled = false;
        $('#syncBtn').textContent = '📤 执行/立即同步';
      }
    }

    function updateCharts() {
      const counts = { success: 0, failed: 0, syncing: 0, idle: 0 };
      for (const h of syncHistory) {
        const s = (h.status || 'idle').toLowerCase();
        if (counts.hasOwnProperty(s)) counts[s]++;
        else counts.idle++;
      }
      if (syncHistory.length === 0) counts.idle = 1;

      if (statusChart) {
        statusChart.data.datasets[0].data = [counts.success, counts.failed, counts.syncing, counts.idle];
        statusChart.update();
      }

      if (timelineChart) {
        const recent = syncHistory.slice(-8);
        timelineChart.data.labels = recent.map(h => formatDate(h.time));
        timelineChart.data.datasets[0].data = recent.map(() => 1);
        timelineChart.data.datasets[0].backgroundColor = recent.map(h => statusColorMap[h.status] || '#94a3b8');
        timelineChart.update();
      }
    }

    function addHistoryRow(time, status, message) {
      syncHistory.push({ time, status, message });
      const tbody = $('#syncHistoryTbody');
      const tr = document.createElement('tr');

      const tdTime = document.createElement('td');
      tdTime.textContent = formatDate(time);

      const tdStatus = document.createElement('td');
      const badge = document.createElement('span');
      badge.className = 'status-badge ' + (status === 'success' ? 'status-online' : status === 'failed' ? 'status-offline' : 'status-warning');
      badge.textContent = statusLabelMap[status] || status;
      tdStatus.appendChild(badge);

      const tdMsg = document.createElement('td');
      tdMsg.textContent = message || '-';

      tr.appendChild(tdTime);
      tr.appendChild(tdStatus);
      tr.appendChild(tdMsg);
      tbody.insertBefore(tr, tbody.firstChild);
      updateCharts();
    }

    async function loadSyncStatus() {
      try {
        const res = await api('/sync/status');
        const data = await res.json();
        updateStatusDisplay(data);
        if (data.last_synced_at) {
          addHistoryRow(data.last_synced_at, data.status || 'success', data.message || '');
        }
        showToast('状态已刷新', 'success');
      } catch (e) {
        showToast(e.message || '加载失败', 'error');
      }
    }

    async function syncNow() {
      if (isSyncing) return;
      try {
        const res = await api('/sync/status', {
          method: 'POST',
          body: { Status: 'syncing', Message: '手动触发同步' }
        });
        const data = await res.json();
        if (!data.ok) {
          showToast(data.error || '触发失败', 'error');
          return;
        }

        isSyncing = true;
        $('#syncBtn').disabled = true;
        $('#syncBtn').textContent = '⏳ 同步中...';
        $('#syncStatusBadge').textContent = statusLabelMap.syncing;
        $('#syncStatusBadge').style.color = statusColorMap.syncing;
        $('#syncMessage').textContent = '手动触发同步';
        addHistoryRow(new Date().toISOString(), 'syncing', '手动触发同步');

        let progress = 0;
        const interval = setInterval(() => {
          progress += Math.random() * 15 + 5;
          if (progress > 100) progress = 100;
          $('#progressFill').style.width = progress.toFixed(0) + '%';
          $('#progressText').textContent = '已完成 ' + progress.toFixed(0) + '%';
          $('#progressDetail').textContent = `已同步数据量: ${(progress * 10).toFixed(0)}MB / 1000MB`;

          if (progress >= 100) {
            clearInterval(interval);
            completeSyncTask();
          }
        }, 500);

      } catch (e) {
        showToast(e.message || '触发失败', 'error');
      }
    }

    async function completeSyncTask() {
      try {
        await api('/sync/status', {
          method: 'POST',
          body: { Status: 'success', Message: '同步完成' }
        });
        updateStatusDisplay({ status: 'success', message: '同步完成', last_synced_at: new Date().toISOString(), updated_at: new Date().toISOString() });
        addHistoryRow(new Date().toISOString(), 'success', '同步完成');
        showToast('同步完成', 'success');
      } catch (e) {
        showToast(e.message || '完成状态写入失败', 'error');
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadSyncStatus();
    });
  </script>
</body>
</html>
