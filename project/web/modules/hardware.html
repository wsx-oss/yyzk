<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>硬件状态检测</title>
  <link rel="stylesheet" href="/app/modules/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .module-title::before {
      content: '🔧';
    }

    .hw-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .hw-header .action-buttons {
      margin-top: 0;
      flex-shrink: 0;
    }

    /* Filter area */
    .filter-section {
      margin-bottom: 0;
    }

    .filter-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .filter-row-3 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      align-items: end;
    }

    .filter-group label {
      font-size: 12px;
      color: var(--cc-text-3, #86909c);
      font-weight: 500;
      margin-bottom: 4px;
      display: block;
    }

    .filter-group input,
    .filter-group select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--cc-border, #e5e6eb);
      border-radius: 8px;
      font-size: 13px;
      background: var(--cc-bg-2, #fff);
      transition: all 0.2s;
    }

    .filter-group input:focus,
    .filter-group select:focus {
      outline: none;
      border-color: var(--cc-primary, #165dff);
      box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.1);
    }

    .range-input {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .range-input input {
      width: 50%;
    }

    .range-input span {
      color: #94a3b8;
      font-size: 12px;
    }

    .btn-search-row {
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
    }

    /* Table */
    .data-table {
      font-size: 13px;
    }

    .data-table th {
      white-space: nowrap;
      font-size: 12px;
      padding: 10px 8px;
    }

    .data-table td {
      padding: 10px 8px;
      white-space: nowrap;
    }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status-dot.online {
      background: #00b42a;
    }

    .status-dot.offline {
      background: #f53f3f;
    }

    .status-dot.warning {
      background: #ff7d00;
    }

    .btn-detail {
      padding: 4px 12px;
      font-size: 12px;
      background: var(--cc-primary, #165dff);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-detail:hover {
      background: #0e42d2;
      box-shadow: 0 2px 8px rgba(22, 93, 255, 0.35);
    }

    .btn-del {
      padding: 4px 12px;
      font-size: 12px;
      background: var(--cc-danger, #f53f3f);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 4px;
      transition: all 0.2s;
    }

    .btn-del:hover {
      background: #cb2634;
      box-shadow: 0 2px 8px rgba(245, 63, 63, 0.35);
    }

    .btn-refresh-one {
      padding: 4px 12px;
      font-size: 12px;
      background: var(--cc-success, #00b42a);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 4px;
      transition: all 0.2s;
    }

    .btn-refresh-one:hover {
      background: #009a29;
      box-shadow: 0 2px 8px rgba(0, 180, 42, 0.35);
    }

    .auto-refresh-wrap {
      display: inline-flex;
      align-items: center;
      margin-left: 10px;
      background: var(--cc-bg-3, #f2f3f5);
      border-radius: 10px;
      padding: 4px 10px;
      gap: 6px;
    }

    .auto-refresh-wrap label {
      font-size: 12px;
      color: #475569;
    }

    .auto-refresh-wrap select {
      font-size: 12px;
      padding: 2px 6px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      color: #334155;
      cursor: pointer;
      outline: none;
    }

    .auto-refresh-wrap select:focus {
      border-color: var(--cc-primary, #165dff);
    }

    .auto-refresh-wrap .refresh-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cc-success, #00b42a);
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--cc-bg-2, #fff);
      border-radius: var(--cc-radius-lg, 12px);
      padding: 0;
      width: 480px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      animation: modalSlideIn 0.25s ease-out;
    }

    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(-16px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #e2e8f0;
      font-size: 16px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #94a3b8;
      padding: 4px 8px;
    }

    .modal-close:hover {
      color: #0f172a;
    }

    .modal-body {
      padding: 20px;
    }

    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #334155;
      margin-bottom: 5px;
    }

    .form-group label .required {
      color: #ef4444;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 13px;
      background: #fff;
      font-family: inherit;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 70px;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--cc-primary, #165dff);
      box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.1);
    }

    /* Detail modal */
    .detail-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px 12px;
      font-size: 13px;
    }

    .detail-label {
      color: #64748b;
      font-weight: 500;
    }

    .detail-value {
      color: #0f172a;
    }

    /* Charts */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 680px;
      margin: 0 auto;
    }

    .chart-box {
      text-align: center;
      padding: 4px;
    }

    .chart-box h4 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #334155;
    }

    .chart-canvas-wrap {
      height: 180px;
      position: relative;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #94a3b8;
      font-size: 14px;
    }

    /* AI Analysis */
    .btn-ai { padding:4px 10px; font-size:11px; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; border:none; border-radius: 8px; cursor:pointer; margin-left:4px; }
    .btn-ai:hover { background:linear-gradient(135deg,#4f46e5,#7c3aed); }
    .ai-modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center; }
    .ai-modal-overlay.active { display:flex; }
    .ai-modal { background:#fff; border-radius:12px; width:560px; max-width:95vw; max-height:85vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.25); }
    .ai-modal-header { padding:16px 20px; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; }
    .ai-modal-header h3 { margin:0; font-size:16px; color:#1e293b; }
    .ai-modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:#94a3b8; }
    .ai-modal-close:hover { color:#ef4444; }
    .ai-modal-body { padding:20px; }
    .ai-loading { text-align:center; padding:40px; color:#6366f1; }
    .ai-loading .spinner { display:inline-block; width:20px; height:20px; border:3px solid #e2e8f0; border-top-color:#6366f1; border-radius:50%; animation:spin 0.8s linear infinite; margin-right:8px; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .ai-step { border-left:3px solid #6366f1; background:#f8fafc; padding:10px 14px; margin-bottom:8px; border-radius:0 8px 8px 0; }
    .ai-step-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
    .ai-step-num { background:#6366f1; color:#fff; width:20px; height:20px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; margin-right:5px; }
    .ai-step-type { font-size:10px; font-weight:500; color:#6366f1; text-transform:uppercase; }
    .ai-step-q { font-weight:600; color:#0f172a; margin-bottom:3px; font-size:12px; }
    .ai-step-thought { color:#475569; font-size:12px; line-height:1.5; margin-bottom:3px; }
    .ai-step-answer { background:#e0e7ff; padding:5px 8px; border-radius:5px; color:#3730a3; font-size:12px; font-weight:500; }
    .ai-final { background:linear-gradient(135deg,#f0f9ff,#ede9fe); border:2px solid #6366f1; padding:14px; border-radius:10px; margin-top:10px; }
    .ai-final-title { font-size:13px; font-weight:600; color:#3730a3; margin-bottom:6px; }
    .ai-final-content { color:#0f172a; line-height:1.6; font-size:12px; white-space:pre-wrap; }
  </style>
</head>

<body>
  <!-- Header -->
  <div class="module-header">
    <div class="hw-header">
      <div class="module-title">硬件状态检测</div>
      <div class="action-buttons" style="margin-top:0;">
        <button class="btn btn-primary" onclick="refreshData()">刷新数据</button>
        <button class="btn btn-secondary" onclick="exportData()">导出数据</button>
        <button class="btn btn-success" onclick="openAddModal()">添加硬件</button>
        <span class="auto-refresh-wrap">
          <span class="refresh-dot"></span>
          <label>自动刷新</label>
          <select id="refreshInterval" onchange="changeRefreshInterval()">
            <option value="0">关闭</option>
            <option value="1000">1秒</option>
            <option value="2000">2秒</option>
            <option value="5000" selected>5秒</option>
            <option value="10000">10秒</option>
            <option value="30000">30秒</option>
            <option value="60000">1分钟</option>
          </select>
        </span>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-section" style="margin-top: 16px;">
      <div class="filter-row">
        <div class="filter-group">
          <label>硬件名称</label>
          <input type="text" id="filterName" placeholder="请输入硬件名称" />
        </div>
        <div class="filter-group">
          <label>硬件类型</label>
          <select id="filterType">
            <option value="全部">全部</option>
            <option value="无人机">无人机</option>
            <option value="服务器">服务器</option>
            <option value="路由器">路由器</option>
            <option value="交换机">交换机</option>
            <option value="存储设备">存储设备</option>
          </select>
        </div>
        <div class="filter-group">
          <label>硬件IP地址</label>
          <input type="text" id="filterIP" placeholder="请输入硬件IP地址" />
        </div>
        <div class="filter-group">
          <label>检测时间范围</label>
          <div style="display:flex; gap:4px;">
            <input type="date" id="filterDateFrom" style="width:50%;" />
            <input type="date" id="filterDateTo" style="width:50%;" />
          </div>
        </div>
      </div>
      <div class="filter-row-3">
        <div class="filter-group">
          <label>状态筛选</label>
          <select id="filterStatus">
            <option value="全部">全部</option>
            <option value="在线">在线</option>
            <option value="离线">离线</option>
            <option value="警告">警告</option>
          </select>
        </div>
        <div class="filter-group">
          <label>温度范围</label>
          <div class="range-input">
            <input type="number" id="filterTempMin" placeholder="如: 20" />
            <span>~</span>
            <input type="number" id="filterTempMax" placeholder="如: 50" />
            <span>℃</span>
          </div>
        </div>
        <div class="filter-group">
          <label>CPU使用率范围</label>
          <div class="range-input">
            <input type="number" id="filterCpuMin" placeholder="如: 10" />
            <span>~</span>
            <input type="number" id="filterCpuMax" placeholder="如: 80" />
            <span>%</span>
          </div>
        </div>
        <div class="btn-search-row">
          <button class="btn btn-primary" onclick="loadList()" style="width:100%;">搜索</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Data Table -->
  <div class="card" style="overflow-x:auto;">
    <table class="data-table" id="hwTable">
      <thead>
        <tr>
          <th>硬件名称</th>
          <th>硬件类型</th>
          <th>硬件IP地址</th>
          <th>状态</th>
          <th>温度</th>
          <th>CPU使用率</th>
          <th>内存使用率</th>
          <th>网络带宽</th>
          <th>检测时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="hwTbody">
        <tr>
          <td colspan="10" class="empty-state">加载中...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Usage Tips -->
  <div class="hint-box" style="margin-bottom: 20px;">
    <div><strong>使用提示:</strong></div>
    <div>1. 硬件状态检测用于实时监控硬件设备的运行状态，请定期刷新数据。</div>
    <div>2. 若硬件状态显示为警告，请及时检查硬件设备。</div>
    <div>3. 删除硬件信息后不可恢复，请谨慎操作。</div>
  </div>

  <!-- Statistics Charts -->
  <div class="card">
    <div class="card-title">硬件状态统计</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center;">
      <div style="height:280px;display:flex;flex-direction:column;align-items:center;">
        <div style="font-weight:600;margin-bottom:8px;text-align:center;">硬件状态分布</div>
        <canvas id="statusChart" style="max-height:240px;"></canvas>
      </div>
      <div style="height:280px;display:flex;flex-direction:column;align-items:center;">
        <div style="font-weight:600;margin-bottom:8px;text-align:center;">硬件类型分布</div>
        <canvas id="typeChart" style="max-height:240px;"></canvas>
      </div>
    </div>
  </div>

  <!-- Add Hardware Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-header">
        <span>添加硬件</span>
        <button class="modal-close" onclick="closeAddModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>硬件名称 <span class="required">*</span></label>
          <input type="text" id="addName" placeholder="请输入硬件名称" />
        </div>
        <div class="form-group">
          <label>硬件类型 <span class="required">*</span></label>
          <select id="addType">
            <option value="无人机">无人机</option>
            <option value="服务器">服务器</option>
            <option value="路由器">路由器</option>
            <option value="交换机">交换机</option>
            <option value="存储设备">存储设备</option>
          </select>
        </div>
        <div class="form-group">
          <label>硬件IP地址 <span class="required">*</span></label>
          <input type="text" id="addIP" placeholder="请输入硬件IP地址" />
        </div>
        <div class="form-group">
          <label>初始状态 <span class="required">*</span></label>
          <select id="addStatus">
            <option value="在线">在线</option>
            <option value="离线">离线</option>
            <option value="警告">警告</option>
          </select>
        </div>
        <div class="form-group">
          <label>描述信息</label>
          <textarea id="addDesc" placeholder="请输入硬件描述信息"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeAddModal()">取消</button>
        <button class="btn btn-primary" onclick="submitAdd()">确认添加</button>
      </div>
    </div>
  </div>

  <!-- AI Analysis Modal -->
  <div class="ai-modal-overlay" id="aiModal">
    <div class="ai-modal">
      <div class="ai-modal-header">
        <h3>🧠 AI硬件诊断</h3>
        <button class="ai-modal-close" onclick="closeAIModal()">&times;</button>
      </div>
      <div class="ai-modal-body" id="aiModalBody">
        <div class="ai-loading"><span class="spinner"></span> AI正在分析中...</div>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <div class="modal-header">
        <span>硬件详情</span>
        <button class="modal-close" onclick="closeDetailModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="detail-grid" id="detailContent"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeDetailModal()">关闭</button>
      </div>
    </div>
  </div>

  <script src="/app/modules/common.js"></script>
  <script>
    let allItems = [];
    let statusChartInstance = null;
    let typeChartInstance = null;

    // ========== Data Loading ==========
    async function loadList() {
      try {
        const params = new URLSearchParams();
        const name = document.getElementById('filterName').value.trim();
        const type = document.getElementById('filterType').value;
        const ip = document.getElementById('filterIP').value.trim();
        const status = document.getElementById('filterStatus').value;
        const dateFrom = document.getElementById('filterDateFrom').value;
        const dateTo = document.getElementById('filterDateTo').value;
        const tempMin = document.getElementById('filterTempMin').value;
        const tempMax = document.getElementById('filterTempMax').value;
        const cpuMin = document.getElementById('filterCpuMin').value;
        const cpuMax = document.getElementById('filterCpuMax').value;

        if (name) params.set('name', name);
        if (type && type !== '全部') params.set('type', type);
        if (ip) params.set('ip', ip);
        if (status && status !== '全部') params.set('status', status);
        if (dateFrom) params.set('date_from', dateFrom);
        if (dateTo) params.set('date_to', dateTo + 'T23:59:59');
        if (tempMin) params.set('temp_min', tempMin);
        if (tempMax) params.set('temp_max', tempMax);
        if (cpuMin) params.set('cpu_min', cpuMin);
        if (cpuMax) params.set('cpu_max', cpuMax);
        params.set('page_size', '200');

        const res = await api('/hardware/items?' + params.toString());
        const data = await res.json();
        allItems = data.items || [];
        renderTable(allItems);
      } catch (e) {
        showToast('加载硬件列表失败: ' + (e.message || ''), 'error');
      }
    }

    async function loadStats() {
      try {
        const res = await api('/hardware/items/stats');
        const data = await res.json();
        renderCharts(data);
      } catch (e) {
        // silent
      }
    }

    function renderTable(items) {
      const tbody = document.getElementById('hwTbody');
      if (!items || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="empty-state">暂无硬件数据，请点击"添加硬件"按钮添加</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(item => {
        const statusClass = item.status === '在线' ? 'online' : item.status === '离线' ? 'offline' : 'warning';
        return `<tr>
          <td>${esc(item.name)}</td>
          <td>${esc(item.type)}</td>
          <td>${esc(item.ip)}</td>
          <td><span class="status-dot ${statusClass}"></span>${esc(item.status)}</td>
          <td>${item.temperature}℃</td>
          <td>${item.cpu_usage}%</td>
          <td>${item.mem_usage}%</td>
          <td>${esc(item.network_bandwidth)}</td>
          <td>${formatDetectedAt(item.detected_at)}</td>
          <td>
            <button class="btn-detail" onclick="viewDetail(${item.id})">查看详情</button>
            <button class="btn-ai" onclick="triggerHardwareAI(${item.id})">AI诊断</button>
            <button class="btn-refresh-one" onclick="refreshOne(${item.id})">刷新</button>
            <button class="btn-del" onclick="deleteItem(${item.id}, '${esc(item.name)}')">删除</button>
          </td>
        </tr>`;
      }).join('');
    }

    function esc(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDetectedAt(dateStr) {
      if (!dateStr) return '-';
      try {
        const d = new Date(dateStr.replace(' ', 'T') + 'Z');
        if (isNaN(d.getTime())) return dateStr;
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const h = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${y}-${mo}-${day} ${h}:${mi}`;
      } catch (e) {
        return dateStr;
      }
    }

    // ========== Charts ==========
    function renderCharts(stats) {
      // Status distribution - Doughnut
      const statusDist = stats.status_distribution || {};
      const statusLabels = ['在线', '离线', '警告'];
      const statusColors = ['#10b981', '#ef4444', '#f59e0b'];
      const statusData = statusLabels.map(l => statusDist[l] || 0);

      if (statusChartInstance) statusChartInstance.destroy();
      const ctx1 = document.getElementById('statusChart').getContext('2d');
      statusChartInstance = new Chart(ctx1, {
        type: 'doughnut',
        data: {
          labels: statusLabels,
          datasets: [{ data: statusData, backgroundColor: statusColors, borderWidth: 2, borderColor: '#fff' }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'right', labels: { padding: 12, usePointStyle: true, pointStyle: 'rectRounded', font: { size: 12 } } }
          }
        }
      });

      // Type distribution - Horizontal Bar
      const typeDist = stats.type_distribution || {};
      const typeLabels = ['无人机', '服务器', '路由器', '交换机', '存储设备'];
      const typeColors = ['#3b82f6', '#165dff', '#10b981', '#f59e0b', '#a855f7'];
      const typeData = typeLabels.map(l => typeDist[l] || 0);

      if (typeChartInstance) typeChartInstance.destroy();
      const ctx2 = document.getElementById('typeChart').getContext('2d');
      typeChartInstance = new Chart(ctx2, {
        type: 'bar',
        data: {
          labels: typeLabels,
          datasets: [{
            label: '数量',
            data: typeData,
            backgroundColor: typeColors,
            borderRadius: 4,
            barThickness: 28
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: { beginAtZero: true, ticks: { stepSize: 1, precision: 0 }, grid: { color: '#f1f5f9' } },
            y: { grid: { display: false } }
          },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: function (ctx) { return ctx.parsed.x + ' 台'; } } }
          }
        }
      });
    }

    // ========== Refresh ==========
    async function refreshData() {
      try {
        const res = await api('/hardware/items/refresh', { method: 'POST' });
        const data = await res.json();
        await Promise.all([loadList(), loadStats()]);
        showToast('刷新完成: ' + (data.online || 0) + ' 台在线, ' + (data.offline || 0) + ' 台离线', 'success');
      } catch (e) {
        showToast('刷新失败: ' + (e.message || ''), 'error');
      }
    }

    async function refreshOne(id) {
      try {
        const res = await api('/hardware/items/' + id + '/refresh', { method: 'POST' });
        const data = await res.json();
        await Promise.all([loadList(), loadStats()]);
        if (data.ok) {
          showToast('设备在线，数据已更新', 'success');
        } else {
          showToast(data.message || 'Agent不可达，设备标记为离线', 'error');
        }
      } catch (e) {
        showToast('刷新失败: ' + (e.message || ''), 'error');
      }
    }

    // ========== Export ==========
    function exportData() {
      if (!allItems || allItems.length === 0) {
        showToast('没有可导出的数据', 'error');
        return;
      }
      const header = ['硬件名称', '硬件类型', 'IP地址', '状态', '温度(℃)', 'CPU使用率(%)', '内存使用率(%)', '网络带宽', '检测时间', '描述'];
      const rows = allItems.map(item => [
        item.name, item.type, item.ip, item.status,
        item.temperature, item.cpu_usage, item.mem_usage,
        item.network_bandwidth, formatDetectedAt(item.detected_at), item.description || ''
      ]);
      const bom = '\uFEFF';
      const csv = bom + [header, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `硬件状态检测_${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('数据导出成功', 'success');
    }

    // ========== Add Hardware ==========
    function openAddModal() {
      document.getElementById('addName').value = '';
      document.getElementById('addType').value = '服务器';
      document.getElementById('addIP').value = '';
      document.getElementById('addStatus').value = '在线';
      document.getElementById('addDesc').value = '';
      document.getElementById('addModal').classList.add('active');
    }

    function closeAddModal() {
      document.getElementById('addModal').classList.remove('active');
    }

    async function submitAdd() {
      const name = document.getElementById('addName').value.trim();
      const type = document.getElementById('addType').value;
      const ip = document.getElementById('addIP').value.trim();
      const status = document.getElementById('addStatus').value;
      const desc = document.getElementById('addDesc').value.trim();

      if (!name) { showToast('请输入硬件名称', 'error'); return; }
      if (!ip) { showToast('请输入硬件IP地址', 'error'); return; }

      // Basic IP format validation
      if (!/^(\d{1,3}\.){3}\d{1,3}$/.test(ip)) {
        showToast('请输入正确的IP地址格式', 'error');
        return;
      }

      // Pre-check: verify agent is reachable and returns valid data
      try {
        showToast('正在检测目标设备Agent...', 'info');
        const checkRes = await api('/hardware/items/check-agent', { method: 'POST', body: { ip } });
        const checkData = await checkRes.json();
        if (!checkData.ok) {
          showToast(checkData.message || '该IP地址无效，无法连接到Agent', 'error');
          return;
        }
      } catch (e) {
        showToast('Agent检测失败: ' + (e.message || '网络错误'), 'error');
        return;
      }

      try {
        const res = await api('/hardware/items', {
          method: 'POST',
          body: { name, type, ip, status, description: desc, temperature: 0, cpu_usage: 0, mem_usage: 0, network_bandwidth: '0Mbps' }
        });
        const data = await res.json();
        if (data.ok) {
          showToast('硬件添加成功，Agent已连接，数据已采集', 'success');
          closeAddModal();
          await Promise.all([loadList(), loadStats()]);
        } else {
          showToast(data.error || '添加失败', 'error');
        }
      } catch (e) {
        showToast('添加失败: ' + (e.message || ''), 'error');
      }
    }

    // ========== View Detail ==========
    async function viewDetail(id) {
      try {
        const res = await api('/hardware/items/' + id);
        const item = await res.json();
        if (item.error) { showToast(item.error, 'error'); return; }

        const statusClass = item.status === '在线' ? 'online' : item.status === '离线' ? 'offline' : 'warning';
        const fields = [
          ['硬件名称', item.name],
          ['硬件类型', item.type],
          ['IP地址', item.ip],
          ['状态', `<span class="status-dot ${statusClass}"></span>${esc(item.status)}`],
          ['温度', item.temperature + '℃'],
          ['CPU使用率', item.cpu_usage + '%'],
          ['内存使用率', item.mem_usage + '%'],
          ['网络带宽', item.network_bandwidth],
          ['描述', item.description || '-'],
          ['检测时间', formatDetectedAt(item.detected_at)],
          ['创建时间', formatDetectedAt(item.created_at)],
          ['更新时间', formatDetectedAt(item.updated_at)],
        ];

        document.getElementById('detailContent').innerHTML = fields.map(([label, val]) =>
          `<div class="detail-label">${label}</div><div class="detail-value">${val}</div>`
        ).join('') + `<div class="detail-label"></div><div class="detail-value" style="margin-top:6px;"><button class="btn-ai" onclick="closeDetailModal();triggerHardwareAI(${item.id})" style="font-size:12px;padding:6px 14px;">🧠 AI智能诊断</button></div>`;
        document.getElementById('detailModal').classList.add('active');
      } catch (e) {
        showToast('获取详情失败', 'error');
      }
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('active');
    }

    // ========== Delete ==========
    async function deleteItem(id, name) {
      if (!confirm(`确定要删除硬件"${name}"吗？此操作不可恢复！`)) return;
      try {
        const res = await api('/hardware/items/' + id, { method: 'DELETE' });
        const data = await res.json();
        if (data.ok) {
          showToast('删除成功', 'success');
          await Promise.all([loadList(), loadStats()]);
        } else {
          showToast(data.error || '删除失败', 'error');
        }
      } catch (e) {
        showToast('删除失败: ' + (e.message || ''), 'error');
      }
    }

    // ========== Auto Refresh ==========
    let autoRefreshTimer = null;
    let isRefreshing = false;

    // Render live data directly into the table (bypasses DB for minimal latency)
    function renderLiveData(items) {
      const tbody = document.getElementById('hwTbody');
      if (!items || items.length === 0) return;
      tbody.innerHTML = items.map(item => {
        const statusClass = item.status === '在线' ? 'online' : item.status === '离线' ? 'offline' : 'warning';
        return `<tr>
          <td>${esc(item.name)}</td>
          <td>${esc(item.type)}</td>
          <td>${esc(item.ip)}</td>
          <td><span class="status-dot ${statusClass}"></span>${esc(item.status)}</td>
          <td>${item.temperature}℃</td>
          <td>${item.cpu_usage}%</td>
          <td>${item.mem_usage}%</td>
          <td>${esc(item.network_bandwidth || '0B/s')}</td>
          <td>${formatDetectedAt(item.detected_at)}</td>
          <td>
            <button class="btn-detail" onclick="viewDetail(${item.id})">查看详情</button>
            <button class="btn-ai" onclick="triggerHardwareAI(${item.id})">AI诊断</button>
            <button class="btn-refresh-one" onclick="refreshOne(${item.id})">刷新</button>
            <button class="btn-del" onclick="deleteItem(${item.id}, '${esc(item.name)}')">删除</button>
          </td>
        </tr>`;
      }).join('');
    }

    function changeRefreshInterval() {
      if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
      const ms = parseInt(document.getElementById('refreshInterval').value);
      const dot = document.querySelector('.refresh-dot');
      if (ms <= 0) {
        if (dot) dot.style.background = '#94a3b8';
        return;
      }
      if (dot) dot.style.background = '#10b981';
      autoRefreshTimer = setInterval(async () => {
        if (isRefreshing) return;
        isRefreshing = true;
        try {
          // Use /live endpoint: fetches from agents directly, no DB round-trip
          const res = await api('/hardware/items/live');
          const data = await res.json();
          if (data.items) {
            renderLiveData(data.items);
          }
          // Update stats less frequently (every 5th tick or slow intervals)
          if (ms > 2000) {
            loadStats();
          }
        } catch (e) { /* silent */ }
        isRefreshing = false;
      }, ms);
    }

    // ========== AI Hardware Diagnosis ==========
    async function triggerHardwareAI(itemId) {
      var item = allItems.find(function(i) { return i.id === itemId; });
      if (!item) { showToast('未找到硬件数据', 'error'); return; }
      document.getElementById('aiModalBody').innerHTML = '<div class="ai-loading"><span class="spinner"></span> AI正在分析硬件状态...</div>';
      document.getElementById('aiModal').classList.add('active');
      try {
        var res = await api('/cot/analyze', {
          method: 'POST',
          body: {
            scenario: 'fault_diagnosis',
            task_id: 'hardware_' + item.id,
            context: { name: item.name, type: item.type, ip: item.ip, status: item.status, temperature: item.temperature, cpu_usage: item.cpu_usage, mem_usage: item.mem_usage, network_bandwidth: item.network_bandwidth, detected_at: item.detected_at },
            description: '硬件设备「' + item.name + '」状态诊断 - 状态:' + item.status + ', CPU:' + item.cpu_usage + '%, 内存:' + item.mem_usage + '%, 温度:' + item.temperature + '℃'
          }
        });
        var data = await res.json();
        if (!data.ok) { document.getElementById('aiModalBody').innerHTML = '<div style="color:#ef4444;padding:16px;text-align:center;">分析失败: ' + esc(data.error || '未知错误') + '</div>'; return; }
        renderAIResult(data.chain);
      } catch(e) {
        document.getElementById('aiModalBody').innerHTML = '<div style="color:#ef4444;padding:16px;text-align:center;">请求失败: ' + esc(e.message) + '</div>';
      }
    }

    function renderAIResult(chain) {
      var html = '';
      if (chain.steps && chain.steps.length) {
        chain.steps.forEach(function(step, idx) {
          html += '<div class="ai-step"><div class="ai-step-head">';
          html += '<div><span class="ai-step-num">' + (step.step || idx + 1) + '</span><span class="ai-step-type">' + esc(step.type || 'analysis') + '</span></div>';
          html += '<div style="font-size:10px;color:#64748b;">置信度: ' + ((step.confidence || 0) * 100).toFixed(0) + '%</div></div>';
          if (step.context) html += '<div style="font-size:11px;color:#94a3b8;margin-bottom:3px;">' + esc(step.context) + '</div>';
          html += '<div class="ai-step-q">' + esc(step.question || '') + '</div>';
          if (step.thought) html += '<div class="ai-step-thought">' + esc(step.thought) + '</div>';
          html += '<div class="ai-step-answer">' + esc(step.answer || '') + '</div></div>';
        });
      }
      html += '<div class="ai-final"><div class="ai-final-title">🎯 诊断结论与建议</div>';
      html += '<div class="ai-final-content">' + esc(chain.final_decision || '') + '</div></div>';
      document.getElementById('aiModalBody').innerHTML = html;
    }

    function closeAIModal() {
      document.getElementById('aiModal').classList.remove('active');
    }

    // ========== Init ==========
    window.addEventListener('DOMContentLoaded', () => {
      loadList();
      loadStats();
      changeRefreshInterval();
    });

    // Close modals on overlay click
    document.getElementById('addModal').addEventListener('click', function (e) {
      if (e.target === this) closeAddModal();
    });
    document.getElementById('detailModal').addEventListener('click', function (e) {
      if (e.target === this) closeDetailModal();
    });
    document.getElementById('aiModal').addEventListener('click', function (e) {
      if (e.target === this) closeAIModal();
    });
  </script>
</body>

</html>
