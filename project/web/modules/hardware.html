<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>硬件状态检测</title>
  <link rel="stylesheet" href="/app/modules/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="module-header">
    <div class="module-title">硬件状态检测</div>
    <div class="action-buttons">
      <button class="btn btn-primary" onclick="loadAll()">🔄 刷新数据</button>
      <button class="btn btn-secondary" onclick="exportData()">📤 导出详情</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">硬件基本信息</div>
    <table class="data-table">
      <thead>
        <tr>
          <th>项目</th>
          <th>值</th>
        </tr>
      </thead>
      <tbody id="hwInfoTbody">
        <tr><td colspan="2" style="text-align:center; color:#94a3b8;">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-title">实时资源使用 <span id="refreshTimer" style="font-size:12px; color:#94a3b8; font-weight:normal;">(每5秒自动刷新)</span></div>
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 16px;">
      <div style="text-align: center; padding: 20px; background: #f0f9ff; border-radius: 8px;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">CPU 使用率</div>
        <div id="cpuVal" style="font-size: 28px; font-weight: 700; color: #0ea5e9;">-</div>
      </div>
      <div style="text-align: center; padding: 20px; background: #f0fdf4; border-radius: 8px;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">内存使用率</div>
        <div id="memVal" style="font-size: 28px; font-weight: 700; color: #10b981;">-</div>
      </div>
      <div style="text-align: center; padding: 20px; background: #fffbeb; border-radius: 8px;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">磁盘使用率</div>
        <div id="diskVal" style="font-size: 28px; font-weight: 700; color: #f59e0b;">-</div>
      </div>
      <div style="text-align: center; padding: 20px; background: #faf5ff; border-radius: 8px;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">系统运行时间</div>
        <div id="uptimeVal" style="font-size: 28px; font-weight: 700; color: #a855f7;">-</div>
      </div>
    </div>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
      <div>
        <div style="font-size: 13px; color: #64748b; margin-bottom: 4px;">CPU</div>
        <div class="progress-bar"><div id="cpuBar" class="progress-fill" style="width: 0%;"></div></div>
      </div>
      <div>
        <div style="font-size: 13px; color: #64748b; margin-bottom: 4px;">内存</div>
        <div class="progress-bar"><div id="memBar" class="progress-fill" style="width: 0%; background: #10b981;"></div></div>
      </div>
      <div>
        <div style="font-size: 13px; color: #64748b; margin-bottom: 4px;">磁盘</div>
        <div class="progress-bar"><div id="diskBar" class="progress-fill" style="width: 0%; background: #f59e0b;"></div></div>
      </div>
    </div>
  </div>

  <div class="hint-box">
    <div><strong>使用提示:</strong></div>
    <div>1. 硬件状态检测可监控温度、CPU、内存等关键指标,预防故障</div>
    <div>2. 当硬件指标超出安全范围时,系统会自动告警</div>
    <div>3. 定期检查和维护硬件状态,确保系统稳定运行</div>
  </div>

  <div class="card">
    <div class="card-title">资源使用统计</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
      <div>
        <div style="font-weight: 600; margin-bottom: 12px; text-align: center;">资源使用分布</div>
        <canvas id="statusChart" width="300" height="300"></canvas>
      </div>
      <div>
        <div style="font-weight: 600; margin-bottom: 12px; text-align: center;">网络流量</div>
        <canvas id="netChart" width="300" height="300"></canvas>
      </div>
    </div>
  </div>

  <script src="/app/modules/common.js"></script>
  <script>
    let refreshInterval = null;

    const statusChart = createChart($('#statusChart'), {
      type: 'doughnut',
      data: {
        labels: ['CPU', '内存', '磁盘', '空闲'],
        datasets: [{
          data: [0, 0, 0, 100],
          backgroundColor: ['#0ea5e9', '#10b981', '#f59e0b', '#e2e8f0']
        }]
      }
    });

    const netChart = createChart($('#netChart'), {
      type: 'bar',
      data: {
        labels: ['发送', '接收'],
        datasets: [{
          label: '流量',
          data: [0, 0],
          backgroundColor: ['#0ea5e9', '#10b981']
        }]
      },
      options: {
        scales: { y: { beginAtZero: true } }
      }
    });

    function formatUptime(seconds) {
      const d = Math.floor(seconds / 86400);
      const h = Math.floor((seconds % 86400) / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      if (d > 0) return `${d}天${h}时`;
      if (h > 0) return `${h}时${m}分`;
      return `${m}分`;
    }

    async function loadHardwareInfo() {
      try {
        const res = await api('/hardware/snapshot');
        const data = await res.json();
        const tbody = $('#hwInfoTbody');
        tbody.innerHTML = '';
        const fields = [
          ['主机名', data.hostname],
          ['操作系统', data.os],
          ['平台', data.platform + ' ' + (data.platform_version || '')],
          ['内核版本', data.kernel],
          ['CPU 型号', data.cpu_model],
          ['CPU 核心数', data.cpu_cores],
          ['总内存', formatBytes(data.mem_total || 0)]
        ];
        for (const [label, val] of fields) {
          const tr = document.createElement('tr');
          const td1 = document.createElement('td');
          td1.textContent = label;
          td1.style.fontWeight = '600';
          const td2 = document.createElement('td');
          td2.textContent = val || '-';
          tr.appendChild(td1);
          tr.appendChild(td2);
          tbody.appendChild(tr);
        }
      } catch (e) {
        showToast(e.message || '硬件信息加载失败', 'error');
      }
    }

    async function loadMetrics() {
      try {
        const res = await api('/metrics/snapshot');
        const m = await res.json();

        const cpu = (m.cpu_percent || 0).toFixed(1);
        const mem = (m.mem_percent || 0).toFixed(1);
        const disk = (m.disk_used_percent || 0).toFixed(1);

        $('#cpuVal').textContent = cpu + '%';
        $('#memVal').textContent = mem + '%';
        $('#diskVal').textContent = disk + '%';
        $('#uptimeVal').textContent = formatUptime(m.uptime || 0);

        $('#cpuBar').style.width = cpu + '%';
        $('#memBar').style.width = mem + '%';
        $('#diskBar').style.width = disk + '%';

        if (parseFloat(cpu) > 80) $('#cpuVal').style.color = '#ef4444';
        else $('#cpuVal').style.color = '#0ea5e9';
        if (parseFloat(mem) > 80) $('#memVal').style.color = '#ef4444';
        else $('#memVal').style.color = '#10b981';

        if (statusChart) {
          const free = Math.max(0, 100 - parseFloat(cpu) - parseFloat(mem) - parseFloat(disk));
          statusChart.data.datasets[0].data = [parseFloat(cpu), parseFloat(mem), parseFloat(disk), free > 0 ? free : 0];
          statusChart.update();
        }

        if (netChart) {
          const sent = ((m.net_bytes_sent || 0) / 1024 / 1024).toFixed(1);
          const recv = ((m.net_bytes_recv || 0) / 1024 / 1024).toFixed(1);
          netChart.data.datasets[0].data = [parseFloat(sent), parseFloat(recv)];
          netChart.data.datasets[0].label = '流量 (MB)';
          netChart.update();
        }
      } catch (e) {
        // silent retry on next interval
      }
    }

    function exportData() {
      const rows = [];
      const tbody = $('#hwInfoTbody');
      for (const tr of tbody.querySelectorAll('tr')) {
        const cells = tr.querySelectorAll('td');
        if (cells.length >= 2) {
          rows.push([cells[0].textContent, cells[1].textContent]);
        }
      }
      rows.push(['CPU使用率', $('#cpuVal').textContent]);
      rows.push(['内存使用率', $('#memVal').textContent]);
      rows.push(['磁盘使用率', $('#diskVal').textContent]);
      rows.push(['运行时间', $('#uptimeVal').textContent]);

      const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `hardware_${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function loadAll() {
      await Promise.all([loadHardwareInfo(), loadMetrics()]);
      showToast('数据已刷新', 'success');
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadAll();
      refreshInterval = setInterval(loadMetrics, 5000);
    });
  </script>
</body>
</html>
