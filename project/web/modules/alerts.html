<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>异常报警</title>
  <link rel="stylesheet" href="/app/modules/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="module-header">
    <div class="module-title">异常报警记录</div>
    <div class="filter-row">
      <div class="filter-group">
        <label>报警类型</label>
        <select id="filterCategory">
          <option value="">全部</option>
          <option value="system">系统警报</option>
          <option value="device">设备异常</option>
          <option value="network">网络异常</option>
        </select>
      </div>
      <div class="filter-group">
        <label>报警等级</label>
        <select id="filterSeverity">
          <option value="">全部</option>
          <option value="critical">严重</option>
          <option value="warning">警告</option>
          <option value="info">信息</option>
        </select>
      </div>
      <div class="filter-group">
        <label>报警状态</label>
        <select id="filterAck">
          <option value="">全部</option>
          <option value="0">未确认</option>
          <option value="1">已确认</option>
        </select>
      </div>
      <div class="filter-group">
        <label>关键词查找</label>
        <input id="filterKeyword" type="text" placeholder="请输入关键词" />
      </div>
    </div>
    <div class="action-buttons">
      <button class="btn btn-primary" onclick="search()">查询</button>
      <button class="btn btn-secondary" onclick="exportAlerts()">📤 导出报警</button>
      <button class="btn btn-success" onclick="createAlert()">➕ 新增报警记录</button>
    </div>
  </div>

  <div class="card">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>时间</th>
          <th>报警类型</th>
          <th>报警等级</th>
          <th>报警描述</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="alertsTbody"></tbody>
    </table>
  </div>

  <div class="hint-box">
    <div><strong>使用提示:</strong></div>
    <div>1. 定期查看异常报警,及时发现和处理问题</div>
    <div>2. 不同等级的报警需采取相应的处理措施</div>
    <div>3. 建议关闭已处理的报警,保持界面整洁</div>
  </div>

  <div class="card">
    <div class="card-title">报警统计</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
      <div>
        <div style="font-weight: 600; margin-bottom: 12px; text-align: center;">报警类型分布</div>
        <canvas id="typeChart" width="300" height="300"></canvas>
      </div>
      <div>
        <div style="font-weight: 600; margin-bottom: 12px; text-align: center;">报警等级分布</div>
        <canvas id="priorityChart" width="300" height="300"></canvas>
      </div>
    </div>
  </div>

  <script src="/app/modules/common.js"></script>
  <script>
    let allAlerts = [];
    let visibleAlerts = [];

    const severityMap = { critical: '🔴 严重', warning: '🟡 警告', info: '🟢 信息' };
    const categoryMap = { system: '系统警报', device: '设备异常', network: '网络异常' };

    const typeChart = createChart($('#typeChart'), {
      type: 'doughnut',
      data: {
        labels: ['系统警报', '设备异常', '网络异常', '其他'],
        datasets: [{
          data: [0, 0, 0, 0],
          backgroundColor: ['#ef4444', '#f59e0b', '#0ea5e9', '#a855f7']
        }]
      }
    });

    const priorityChart = createChart($('#priorityChart'), {
      type: 'bar',
      data: {
        labels: ['严重', '警告', '信息'],
        datasets: [{
          label: '报警数量',
          data: [0, 0, 0],
          backgroundColor: ['#ef4444', '#f59e0b', '#10b981']
        }]
      },
      options: {
        scales: { y: { beginAtZero: true } }
      }
    });

    function renderTable(items) {
      const tbody = $('#alertsTbody');
      tbody.innerHTML = '';
      for (const it of items) {
        const tr = document.createElement('tr');

        const tdId = document.createElement('td');
        tdId.textContent = it.id;

        const tdTime = document.createElement('td');
        tdTime.textContent = formatDate(it.created_at);

        const tdCat = document.createElement('td');
        tdCat.textContent = categoryMap[it.category] || it.category || '-';

        const tdSev = document.createElement('td');
        tdSev.textContent = severityMap[it.severity] || it.severity || '-';

        const tdMsg = document.createElement('td');
        tdMsg.textContent = it.message || '';

        const tdAck = document.createElement('td');
        if (it.acknowledged) {
          const badge = document.createElement('span');
          badge.className = 'status-badge status-online';
          badge.textContent = '已确认';
          tdAck.appendChild(badge);
        } else {
          const badge = document.createElement('span');
          badge.className = 'status-badge status-offline';
          badge.textContent = '未确认';
          tdAck.appendChild(badge);
        }

        const tdActions = document.createElement('td');
        if (!it.acknowledged) {
          const ackBtn = document.createElement('button');
          ackBtn.className = 'btn btn-success btn-action';
          ackBtn.textContent = '确认';
          ackBtn.onclick = () => ackAlert(it.id);
          tdActions.appendChild(ackBtn);
        }
        const viewBtn = document.createElement('button');
        viewBtn.className = 'btn btn-primary btn-action';
        viewBtn.textContent = '查看';
        viewBtn.onclick = () => {
          alert(`ID: ${it.id}\n时间: ${formatDate(it.created_at)}\n类型: ${categoryMap[it.category] || it.category}\n等级: ${severityMap[it.severity] || it.severity}\n内容: ${it.message}\n状态: ${it.acknowledged ? '已确认' : '未确认'}`);
        };
        tdActions.appendChild(viewBtn);

        tr.appendChild(tdId);
        tr.appendChild(tdTime);
        tr.appendChild(tdCat);
        tr.appendChild(tdSev);
        tr.appendChild(tdMsg);
        tr.appendChild(tdAck);
        tr.appendChild(tdActions);
        tbody.appendChild(tr);
      }
    }

    function updateCharts(items) {
      const catCounts = { system: 0, device: 0, network: 0, other: 0 };
      const sevCounts = { critical: 0, warning: 0, info: 0 };
      for (const it of items) {
        const cat = (it.category || '').toLowerCase();
        if (catCounts.hasOwnProperty(cat)) catCounts[cat]++;
        else catCounts.other++;
        const sev = (it.severity || '').toLowerCase();
        if (sevCounts.hasOwnProperty(sev)) sevCounts[sev]++;
      }
      if (typeChart) {
        typeChart.data.datasets[0].data = [catCounts.system, catCounts.device, catCounts.network, catCounts.other];
        typeChart.update();
      }
      if (priorityChart) {
        priorityChart.data.datasets[0].data = [sevCounts.critical, sevCounts.warning, sevCounts.info];
        priorityChart.update();
      }
    }

    async function loadAlerts(page = 1, pageSize = 50) {
      try {
        const res = await api(`/alerts/list?page=${page}&page_size=${pageSize}`);
        const data = await res.json();
        allAlerts = Array.isArray(data.items) ? data.items : [];
        visibleAlerts = allAlerts.slice();
        renderTable(visibleAlerts);
        updateCharts(visibleAlerts);
      } catch (e) {
        showToast(e.message || '加载失败', 'error');
      }
    }

    function search() {
      const category = ($('#filterCategory').value || '').trim().toLowerCase();
      const severity = ($('#filterSeverity').value || '').trim().toLowerCase();
      const ackFilter = ($('#filterAck').value || '').trim();
      const keyword = ($('#filterKeyword').value || '').trim().toLowerCase();

      visibleAlerts = allAlerts.filter((it) => {
        if (category && (it.category || '').toLowerCase() !== category) return false;
        if (severity && (it.severity || '').toLowerCase() !== severity) return false;
        if (ackFilter !== '') {
          const wantAck = ackFilter === '1';
          if (it.acknowledged !== wantAck) return false;
        }
        if (keyword) {
          const msg = (it.message || '').toLowerCase();
          const cat = (it.category || '').toLowerCase();
          if (!msg.includes(keyword) && !cat.includes(keyword)) return false;
        }
        return true;
      });

      renderTable(visibleAlerts);
      updateCharts(visibleAlerts);
      showToast(`已筛选：${visibleAlerts.length} 条`, 'success');
    }

    function exportAlerts() {
      const rows = [
        ['id', 'created_at', 'category', 'severity', 'message', 'acknowledged'],
        ...visibleAlerts.map((it) => [
          it.id, it.created_at, it.category, it.severity, it.message, it.acknowledged ? '是' : '否'
        ])
      ];
      const csv = rows.map((r) => r.map((cell) => {
        const s = cell === null || cell === undefined ? '' : String(cell);
        return `"${s.replace(/"/g, '""')}"`;
      }).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `alerts_${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function ackAlert(id) {
      try {
        const res = await api('/alerts/ack/' + id, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          showToast('已确认', 'success');
          await loadAlerts();
        } else {
          showToast(data.error || '操作失败', 'error');
        }
      } catch (e) {
        showToast(e.message || '操作失败', 'error');
      }
    }

    async function createAlert() {
      const category = (prompt('报警类型（system/device/network）', 'system') || '').trim();
      if (!category) return;
      const severity = (prompt('报警等级（critical/warning/info）', 'warning') || '').trim();
      if (!severity) return;
      const message = (prompt('报警描述', '') || '').trim();
      if (!message) return;

      try {
        const res = await api('/alerts/new', {
          method: 'POST',
          body: { Category: category, Severity: severity, Message: message }
        });
        const data = await res.json();
        if (data.ok) {
          showToast('新增成功', 'success');
          await loadAlerts();
        } else {
          showToast(data.error || '新增失败', 'error');
        }
      } catch (e) {
        showToast(e.message || '新增失败', 'error');
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadAlerts(1, 50);
    });
  </script>
</body>
</html>
