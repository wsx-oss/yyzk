<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>性能分析报告</title>
  <link rel="stylesheet" href="/app/modules/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .module-title::before { content: "\1F4CA"; }
    .perf-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .perf-header .module-title { margin-bottom: 0; }
    .perf-header-btns { display: flex; gap: 8px; }
    .filter-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .filter-row-2 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .filter-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 0; }
    .hint-box { margin-top: 20px; margin-bottom: 20px; }
    .chart-section-title { font-weight: 600; margin-bottom: 12px; text-align: center; font-size: 14px; color: #0f172a; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: #fff; border-radius: 12px; padding: 24px; width: 520px; max-width: 95vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 20px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    .detail-grid { display: grid; grid-template-columns: 100px 1fr; gap: 10px 16px; font-size: 14px; }
    .detail-label { color: #64748b; font-weight: 500; text-align: right; }
    .detail-value { color: #0f172a; }
    .pagination-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; font-size: 13px; color: #64748b; }
    .pagination-bar button { padding: 4px 12px; border: 1px solid #cbd5e1; background: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .pagination-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
    .pagination-bar button:hover:not(:disabled) { background: #f1f5f9; }
  </style>
</head>
<body>
  <!-- Query Section -->
  <div class="module-header">
    <div class="perf-header">
      <div class="module-title">性能分析查询</div>
      <div class="perf-header-btns">
        <button class="btn" style="background:#10b981;color:#fff;" onclick="autoCollect()">自动采集</button>
        <button class="btn btn-primary" onclick="openAddModal()">新增记录</button>
        <button class="btn btn-secondary" onclick="importRecords()">导入</button>
        <button class="btn btn-secondary" onclick="exportReport()">导出</button>
        <button class="btn btn-primary" onclick="search()">查询</button>
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <label>分析时间段</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <input id="filterDateFrom" type="date" style="flex:1;" />
          <span style="color:#94a3b8;">-</span>
          <input id="filterDateTo" type="date" style="flex:1;" />
        </div>
      </div>
      <div class="filter-group">
        <label>分析类型</label>
        <select id="filterAnalysisType">
          <option value="">整体性能</option>
          <option value="整体性能">整体性能</option>
          <option value="模块性能">模块性能</option>
          <option value="用户性能">用户性能</option>
        </select>
      </div>
      <div class="filter-group" style="visibility:hidden;"></div>
    </div>
    <div class="filter-row-2">
      <div class="filter-group">
        <label>模块名称</label>
        <input id="filterModule" type="text" placeholder="请输入模块名称" />
      </div>
      <div class="filter-group">
        <label>用户ID</label>
        <input id="filterUserId" type="text" placeholder="请输入用户ID" />
      </div>
      <div class="filter-group">
        <label>数据筛选</label>
        <select id="filterDataFilter">
          <option value="">全部数据</option>
          <option value="前10条数据">前10条数据</option>
          <option value="后10条数据">后10条数据</option>
        </select>
      </div>
    </div>
    <div class="filter-row-3">
      <div class="filter-group">
        <label>性能指标</label>
        <select id="filterSortBy">
          <option value="">响应时间</option>
          <option value="response_time">响应时间</option>
          <option value="throughput">吞吐量</option>
          <option value="error_rate">错误率</option>
        </select>
      </div>
      <div class="filter-group">
        <label>排序方式</label>
        <select id="filterSortOrder">
          <option value="asc">升序</option>
          <option value="desc">降序</option>
        </select>
      </div>
      <div class="filter-group" style="display:flex;flex-direction:column;justify-content:flex-end;">
        <button class="btn btn-primary" onclick="advancedQuery()" style="width:100%;">高级查询</button>
      </div>
    </div>
  </div>

  <!-- Results Table -->
  <div class="card">
    <table class="data-table">
      <thead>
        <tr>
          <th>分析时间</th>
          <th>模块名称</th>
          <th>用户ID</th>
          <th>响应时间</th>
          <th>吞吐量</th>
          <th>错误率</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="perfTbody"></tbody>
    </table>
    <div class="pagination-bar">
      <span id="paginationInfo">共 0 条</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <button id="btnPrev" onclick="changePage(-1)" disabled>&lt; 上一页</button>
        <span id="pageIndicator">1/1</span>
        <button id="btnNext" onclick="changePage(1)" disabled>下一页 &gt;</button>
      </div>
    </div>
  </div>

  <!-- Usage Tips -->
  <div class="hint-box">
    <div><strong>使用提示</strong></div>
    <div>1. 请确保选择的开始日期早于结束日期。</div>
    <div>2. 不同的分析类型和性能指标会影响查询结果。</div>
    <div>3. 导出报告功能可将当前查询结果保存为文件。</div>
  </div>

  <!-- Charts Section -->
  <div class="card">
    <div class="card-title">性能分析图表</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center;margin-bottom:24px;">
      <div style="height:280px;display:flex;flex-direction:column;align-items:center;">
        <div style="font-weight:600;margin-bottom:8px;text-align:center;">响应时间变化趋势</div>
        <canvas id="responseChart" style="max-height:240px;"></canvas>
      </div>
      <div style="height:280px;display:flex;flex-direction:column;align-items:center;">
        <div style="font-weight:600;margin-bottom:8px;text-align:center;">吞吐量分布</div>
        <canvas id="throughputChart" style="max-height:240px;"></canvas>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center;">
      <div style="height:280px;display:flex;flex-direction:column;align-items:center;">
        <div style="font-weight:600;margin-bottom:8px;text-align:center;">错误率分布</div>
        <canvas id="errorChart" style="max-height:240px;"></canvas>
      </div>
      <div style="height:280px;display:flex;flex-direction:column;align-items:center;">
        <div style="font-weight:600;margin-bottom:8px;text-align:center;">模块性能综合评估</div>
        <canvas id="radarChart" style="max-height:240px;"></canvas>
      </div>
    </div>
  </div>

  <!-- Add Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal-box">
      <div class="modal-title">新增性能分析记录</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div>
          <label style="font-size:13px;color:#64748b;font-weight:500;display:block;margin-bottom:4px;">模块名称 <span style="color:#ef4444;">*</span></label>
          <input id="addModule" type="text" placeholder="请输入模块名称" style="width:100%;padding:8px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;" />
        </div>
        <div>
          <label style="font-size:13px;color:#64748b;font-weight:500;display:block;margin-bottom:4px;">用户ID</label>
          <input id="addUserId" type="text" placeholder="请输入用户ID" style="width:100%;padding:8px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;" />
        </div>
        <div>
          <label style="font-size:13px;color:#64748b;font-weight:500;display:block;margin-bottom:4px;">响应时间</label>
          <input id="addRespTime" type="text" placeholder="如: 120ms" style="width:100%;padding:8px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;" />
        </div>
        <div>
          <label style="font-size:13px;color:#64748b;font-weight:500;display:block;margin-bottom:4px;">吞吐量</label>
          <input id="addThroughput" type="text" placeholder="如: 500 req/s" style="width:100%;padding:8px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;" />
        </div>
        <div>
          <label style="font-size:13px;color:#64748b;font-weight:500;display:block;margin-bottom:4px;">错误率</label>
          <input id="addErrorRate" type="text" placeholder="如: 0.5%" style="width:100%;padding:8px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;" />
        </div>
        <div>
          <label style="font-size:13px;color:#64748b;font-weight:500;display:block;margin-bottom:4px;">分析类型</label>
          <select id="addAnalysisType" style="width:100%;padding:8px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;">
            <option value="整体性能">整体性能</option>
            <option value="模块性能">模块性能</option>
            <option value="用户性能">用户性能</option>
          </select>
        </div>
        <div style="grid-column:1/-1;">
          <label style="font-size:13px;color:#64748b;font-weight:500;display:block;margin-bottom:4px;">描述信息</label>
          <textarea id="addDesc" placeholder="请输入描述信息" style="width:100%;padding:8px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;resize:vertical;min-height:60px;"></textarea>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeAddModal()">取消</button>
        <button class="btn btn-primary" onclick="submitAdd()">确认添加</button>
      </div>
    </div>
  </div>

  <!-- Import file input (hidden) -->
  <input type="file" id="importFile" accept=".json" style="display:none;" onchange="handleImportFile(event)" />

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal-box">
      <div class="modal-title">性能分析详情</div>
      <div class="detail-grid" id="detailContent"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeDetailModal()">关闭</button>
      </div>
    </div>
  </div>

  <script src="/app/modules/common.js"></script>
  <script>
    let currentPage = 1;
    const pageSize = 20;
    let totalItems = 0;
    let currentItems = [];
    let responseChart = null, throughputChart = null, errorChart = null, radarChart = null;

    // ========== Init Charts ==========
    function initCharts() {
      responseChart = createChart($('#responseChart'), {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label: '响应时间(ms)',
            data: [],
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 4,
            pointBackgroundColor: '#3b82f6'
          }]
        },
        options: {
          maintainAspectRatio: false,
          scales: { y: { beginAtZero: true, title: { display: false } }, x: { title: { display: false } } },
          plugins: { legend: { display: false } }
        }
      });

      throughputChart = createChart($('#throughputChart'), {
        type: 'bar',
        data: {
          labels: [],
          datasets: [{
            label: '吞吐量',
            data: [],
            backgroundColor: '#10b981',
            borderRadius: 4,
            barThickness: 40
          }]
        },
        options: {
          maintainAspectRatio: false,
          scales: { y: { beginAtZero: true }, x: { grid: { display: false } } },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: (ctx) => ctx.parsed.y + ' req/s' } }
          }
        }
      });

      errorChart = createChart($('#errorChart'), {
        type: 'doughnut',
        data: {
          labels: [],
          datasets: [{
            data: [],
            backgroundColor: ['#ef4444', '#f59e0b', '#fb923c', '#3b82f6', '#10b981', '#a855f7']
          }]
        },
        options: {
          maintainAspectRatio: false,
          plugins: { legend: { position: 'right', labels: { font: { size: 12 }, padding: 10 } } }
        }
      });

      radarChart = createChart($('#radarChart'), {
        type: 'radar',
        data: {
          labels: ['响应时间', '吞吐量', '错误率', '稳定性', '兼容性'],
          datasets: []
        },
        options: {
          maintainAspectRatio: false,
          scales: { r: { beginAtZero: true, max: 100, ticks: { stepSize: 20 } } },
          plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }
        }
      });
    }

    // ========== Load Data ==========
    async function loadData() {
      try {
        const params = buildFilterParams();
        params.append('page', currentPage);
        params.append('page_size', pageSize);
        const res = await api('/report/perf-list?' + params.toString());
        const data = await res.json();
        currentItems = Array.isArray(data.items) ? data.items : [];
        totalItems = data.total || 0;
        renderTable(currentItems);
        updatePagination();
        updateCharts(currentItems);
      } catch (e) {
        showToast(e.message || '加载失败', 'error');
      }
    }

    function buildFilterParams() {
      const p = new URLSearchParams();
      const dateFrom = $('#filterDateFrom').value;
      const dateTo = $('#filterDateTo').value;
      const analysisType = $('#filterAnalysisType').value;
      const moduleName = $('#filterModule').value.trim();
      const userId = $('#filterUserId').value.trim();
      const dataFilter = $('#filterDataFilter').value;
      const sortBy = $('#filterSortBy').value;
      const sortOrder = $('#filterSortOrder').value;
      if (dateFrom) p.append('date_from', dateFrom);
      if (dateTo) p.append('date_to', dateTo);
      if (analysisType) p.append('analysis_type', analysisType);
      if (moduleName) p.append('module_name', moduleName);
      if (userId) p.append('user_id', userId);
      if (dataFilter) p.append('data_filter', dataFilter);
      if (sortBy) p.append('sort_by', sortBy);
      if (sortOrder) p.append('sort_order', sortOrder);
      return p;
    }

    function search() { currentPage = 1; loadData(); }
    function advancedQuery() { search(); showToast('已执行高级查询', 'success'); }
    function changePage(delta) { currentPage += delta; loadData(); }

    function updatePagination() {
      const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
      $('#paginationInfo').textContent = `共 ${totalItems} 条`;
      $('#pageIndicator').textContent = `${currentPage}/${totalPages}`;
      $('#btnPrev').disabled = currentPage <= 1;
      $('#btnNext').disabled = currentPage >= totalPages;
    }

    // ========== Render Table ==========
    function renderTable(items) {
      const tbody = $('#perfTbody');
      tbody.innerHTML = '';
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:32px;">暂无数据</td></tr>';
        return;
      }
      for (const it of items) {
        const tr = document.createElement('tr');
        const fields = [it.analysis_time, it.module_name, it.user_id, it.response_time, it.throughput, it.error_rate];
        for (const f of fields) {
          const td = document.createElement('td');
          td.textContent = f || '-';
          tr.appendChild(td);
        }
        const tdAct = document.createElement('td');
        tdAct.style.whiteSpace = 'nowrap';
        const btn = document.createElement('button');
        btn.className = 'btn btn-primary btn-action';
        btn.textContent = '详情';
        btn.onclick = () => showDetail(it);
        tdAct.appendChild(btn);
        const delBtn = document.createElement('button');
        delBtn.className = 'btn btn-action';
        delBtn.style.cssText = 'background:#ef4444;color:#fff;margin-left:6px;';
        delBtn.textContent = '删除';
        delBtn.onclick = () => deleteRecord(it.id);
        tdAct.appendChild(delBtn);
        tr.appendChild(tdAct);
        tbody.appendChild(tr);
      }
    }

    // ========== Detail Modal ==========
    function showDetail(it) {
      const fields = [
        ['分析时间', it.analysis_time || '-'],
        ['模块名称', it.module_name || '-'],
        ['用户ID', it.user_id || '-'],
        ['响应时间', it.response_time || '-'],
        ['吞吐量', it.throughput || '-'],
        ['错误率', it.error_rate || '-'],
        ['分析类型', it.analysis_type || '-'],
        ['详细描述', it.description || '-']
      ];
      $('#detailContent').innerHTML = fields.map(([l, v]) =>
        `<div class="detail-label">${l}</div><div class="detail-value">${v}</div>`
      ).join('');
      $('#detailModal').classList.add('active');
    }
    function closeDetailModal() { $('#detailModal').classList.remove('active'); }

    // ========== Charts ==========
    function parseNum(s) {
      if (!s) return 0;
      const n = parseFloat(s.replace(/[^0-9.]/g, ''));
      return isNaN(n) ? 0 : n;
    }

    function updateCharts(items) {
      if (!items.length) return;

      // Response time line chart
      if (responseChart) {
        const labels = items.map(it => {
          const t = it.analysis_time || '';
          return t.length > 10 ? t.substring(11, 16) : t;
        });
        const data = items.map(it => parseNum(it.response_time));
        responseChart.data.labels = labels;
        responseChart.data.datasets[0].data = data;
        responseChart.update();
      }

      // Throughput bar chart - group by module
      if (throughputChart) {
        const moduleMap = {};
        for (const it of items) {
          const mod = it.module_name || '未知';
          const val = parseNum(it.throughput);
          if (!moduleMap[mod]) moduleMap[mod] = [];
          moduleMap[mod].push(val);
        }
        const labels = Object.keys(moduleMap);
        const data = labels.map(k => {
          const arr = moduleMap[k];
          return Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);
        });
        throughputChart.data.labels = labels;
        throughputChart.data.datasets[0].data = data;
        throughputChart.update();
      }

      // Error rate doughnut - group by module
      if (errorChart) {
        const moduleErr = {};
        for (const it of items) {
          const mod = it.module_name || '未知';
          const val = parseNum(it.error_rate);
          if (!moduleErr[mod]) moduleErr[mod] = [];
          moduleErr[mod].push(val);
        }
        const labels = Object.keys(moduleErr);
        const data = labels.map(k => {
          const arr = moduleErr[k];
          return +(arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(2);
        });
        const colors = ['#ef4444', '#f59e0b', '#fb923c', '#3b82f6', '#10b981', '#a855f7'];
        errorChart.data.labels = labels;
        errorChart.data.datasets[0].data = data;
        errorChart.data.datasets[0].backgroundColor = colors.slice(0, labels.length);
        errorChart.update();
      }

      // Radar chart - module comprehensive evaluation
      if (radarChart) {
        const moduleData = {};
        for (const it of items) {
          const mod = it.module_name || '未知';
          if (!moduleData[mod]) moduleData[mod] = { resp: [], tp: [], err: [] };
          moduleData[mod].resp.push(parseNum(it.response_time));
          moduleData[mod].tp.push(parseNum(it.throughput));
          moduleData[mod].err.push(parseNum(it.error_rate));
        }
        const radarColors = [
          { bg: 'rgba(59,130,246,0.2)', border: '#3b82f6' },
          { bg: 'rgba(16,185,129,0.2)', border: '#10b981' },
          { bg: 'rgba(245,158,11,0.2)', border: '#f59e0b' },
          { bg: 'rgba(168,85,247,0.2)', border: '#a855f7' }
        ];
        const datasets = [];
        let ci = 0;
        for (const [mod, d] of Object.entries(moduleData)) {
          const avgResp = d.resp.reduce((a, b) => a + b, 0) / d.resp.length;
          const avgTp = d.tp.reduce((a, b) => a + b, 0) / d.tp.length;
          const avgErr = d.err.reduce((a, b) => a + b, 0) / d.err.length;
          const respScore = Math.max(0, 100 - avgResp / 5);
          const tpScore = Math.min(100, avgTp / 10);
          const errScore = Math.max(0, 100 - avgErr * 100);
          const stability = Math.max(0, 100 - (avgErr * 50 + avgResp / 10));
          const compat = Math.min(100, 60 + avgTp / 20);
          const color = radarColors[ci % radarColors.length];
          datasets.push({
            label: mod,
            data: [respScore, tpScore, errScore, stability, compat],
            backgroundColor: color.bg,
            borderColor: color.border,
            pointBackgroundColor: color.border
          });
          ci++;
        }
        radarChart.data.datasets = datasets;
        radarChart.update();
      }
    }

    // ========== Export ==========
    function exportReport() {
      if (!currentItems.length) { showToast('暂无数据可导出', 'info'); return; }
      const rows = [
        ['分析时间', '模块名称', '用户ID', '响应时间', '吞吐量', '错误率', '描述'],
        ...currentItems.map(it => [
          it.analysis_time, it.module_name, it.user_id, it.response_time, it.throughput, it.error_rate, it.description
        ])
      ];
      const csv = '\uFEFF' + rows.map(r => r.map(cell => {
        const s = cell === null || cell === undefined ? '' : String(cell);
        return `"${s.replace(/"/g, '""')}"`;
      }).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `perf_report_${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast(`已导出 ${currentItems.length} 条记录`, 'success');
    }

    // ========== Add Record ==========
    function openAddModal() {
      $('#addModule').value = '';
      $('#addUserId').value = '';
      $('#addRespTime').value = '';
      $('#addThroughput').value = '';
      $('#addErrorRate').value = '';
      $('#addAnalysisType').value = '整体性能';
      $('#addDesc').value = '';
      $('#addModal').classList.add('active');
    }
    function closeAddModal() { $('#addModal').classList.remove('active'); }

    async function submitAdd() {
      const moduleName = $('#addModule').value.trim();
      if (!moduleName) { showToast('请输入模块名称', 'error'); return; }
      const body = {
        module_name: moduleName,
        user_id: $('#addUserId').value.trim(),
        response_time: $('#addRespTime').value.trim(),
        throughput: $('#addThroughput').value.trim(),
        error_rate: $('#addErrorRate').value.trim(),
        analysis_type: $('#addAnalysisType').value,
        description: $('#addDesc').value.trim()
      };
      try {
        const res = await api('/report/perf-add', { method: 'POST', body });
        const data = await res.json();
        if (data.ok) {
          showToast('添加成功', 'success');
          closeAddModal();
          loadData();
        } else {
          showToast(data.error || '添加失败', 'error');
        }
      } catch (e) {
        showToast('添加失败: ' + (e.message || ''), 'error');
      }
    }

    // ========== Delete ==========
    async function deleteRecord(id) {
      if (!confirm('确定要删除该记录吗？此操作不可恢复！')) return;
      try {
        const res = await api('/report/perf-delete/' + id, { method: 'DELETE' });
        const data = await res.json();
        if (data.ok) {
          showToast('删除成功', 'success');
          loadData();
        } else {
          showToast(data.error || '删除失败', 'error');
        }
      } catch (e) {
        showToast('删除失败: ' + (e.message || ''), 'error');
      }
    }

    // ========== Import ==========
    function importRecords() { $('#importFile').click(); }
    function handleImportFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async function(e) {
        try {
          const items = JSON.parse(e.target.result);
          if (!Array.isArray(items)) { showToast('JSON文件格式错误，需要数组格式', 'error'); return; }
          const res = await api('/report/perf-import', { method: 'POST', body: items });
          const data = await res.json();
          if (data.ok) {
            showToast('成功导入 ' + data.imported + ' 条记录', 'success');
            loadData();
          } else {
            showToast(data.error || '导入失败', 'error');
          }
        } catch (err) {
          showToast('导入失败: JSON格式解析错误', 'error');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // ========== Auto Collect ==========
    async function autoCollect() {
      showToast('正在自动采集各模块性能数据，请稍候...', 'info');
      try {
        const res = await api('/report/perf-collect', { method: 'POST', body: { user_id: localStorage.getItem('username') || 'system' } });
        const data = await res.json();
        if (data.ok) {
          showToast('采集完成，已录入 ' + data.collected + ' 个模块的性能数据', 'success');
          loadData();
        } else {
          showToast(data.error || '采集失败', 'error');
        }
      } catch (e) {
        showToast('采集失败: ' + (e.message || ''), 'error');
      }
    }

    // ========== Init ==========
    window.addEventListener('DOMContentLoaded', async () => {
      initCharts();
      // Check if data exists; if empty, auto-collect first
      try {
        const res = await api('/report/perf-list?page=1&page_size=1');
        const data = await res.json();
        if (!data.items || data.items.length === 0) {
          await autoCollect();
        } else {
          loadData();
        }
      } catch (e) {
        loadData();
      }
    });

    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('active');
    });
  </script>
</body>
</html>
