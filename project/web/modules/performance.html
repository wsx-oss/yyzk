<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>性能分析报告</title>
  <link rel="stylesheet" href="/app/modules/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="module-header">
    <div class="module-title">性能分析报告</div>
    <div class="action-buttons">
      <button class="btn btn-primary" onclick="loadReport()">🔄 刷新报告</button>
      <button class="btn btn-secondary" onclick="exportReport()">📤 导出报告</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">报告摘要 <span id="reportTime" style="font-size: 12px; color: #94a3b8; font-weight: normal;"></span></div>
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;">
      <div style="text-align: center; padding: 20px; background: #f0f9ff; border-radius: 8px;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">CPU 使用率</div>
        <div id="cpuVal" style="font-size: 28px; font-weight: 700; color: #0ea5e9;">-</div>
      </div>
      <div style="text-align: center; padding: 20px; background: #f0fdf4; border-radius: 8px;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">内存使用率</div>
        <div id="memVal" style="font-size: 28px; font-weight: 700; color: #10b981;">-</div>
      </div>
      <div style="text-align: center; padding: 20px; background: #fffbeb; border-radius: 8px;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">磁盘使用率</div>
        <div id="diskVal" style="font-size: 28px; font-weight: 700; color: #f59e0b;">-</div>
      </div>
      <div style="text-align: center; padding: 20px; background: #faf5ff; border-radius: 8px;">
        <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">系统负载</div>
        <div id="loadVal" style="font-size: 28px; font-weight: 700; color: #a855f7;">-</div>
      </div>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px;">
    <div class="card" style="text-align: center;">
      <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">日志总数</div>
      <div id="logsCount" style="font-size: 32px; font-weight: 700; color: #0ea5e9;">-</div>
    </div>
    <div class="card" style="text-align: center;">
      <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">告警总数</div>
      <div id="alertsCount" style="font-size: 32px; font-weight: 700; color: #f59e0b;">-</div>
    </div>
    <div class="card" style="text-align: center;">
      <div style="font-size: 13px; color: #64748b; margin-bottom: 6px;">系统运行时间</div>
      <div id="uptimeVal" style="font-size: 32px; font-weight: 700; color: #10b981;">-</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">性能指标明细</div>
    <table class="data-table">
      <thead>
        <tr>
          <th>指标</th>
          <th>当前值</th>
          <th>状态</th>
        </tr>
      </thead>
      <tbody id="metricsTbody"></tbody>
    </table>
  </div>

  <div class="hint-box">
    <div><strong>使用提示:</strong></div>
    <div>1. 性能分析报告可从多维度展示系统运行状态和性能指标</div>
    <div>2. 定期查看性能报告,优化系统配置和资源分配</div>
    <div>3. 导出报告可用于存档和离线分析</div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px;">
    <div class="card">
      <div class="card-title">资源使用占比</div>
      <canvas id="usageChart" width="400" height="200"></canvas>
    </div>
    <div class="card">
      <div class="card-title">告警分布</div>
      <canvas id="alertChart" width="400" height="200"></canvas>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px;">
    <div class="card">
      <div class="card-title">网络流量</div>
      <canvas id="netChart" width="400" height="200"></canvas>
    </div>
    <div class="card">
      <div class="card-title">综合评估</div>
      <canvas id="radarChart" width="400" height="200"></canvas>
    </div>
  </div>

  <div class="card" id="notesCard" style="display: none;">
    <div class="card-title">报告备注</div>
    <div id="reportNotes" style="font-size: 14px; color: #64748b; padding: 8px;"></div>
  </div>

  <script src="/app/modules/common.js"></script>
  <script>
    let reportData = null;

    const usageChart = createChart($('#usageChart'), {
      type: 'doughnut',
      data: {
        labels: ['CPU', '内存', '磁盘', '空闲'],
        datasets: [{
          data: [0, 0, 0, 100],
          backgroundColor: ['#0ea5e9', '#10b981', '#f59e0b', '#e2e8f0']
        }]
      }
    });

    const alertChart = createChart($('#alertChart'), {
      type: 'bar',
      data: {
        labels: ['严重', '警告', '其他'],
        datasets: [{
          label: '告警数',
          data: [0, 0, 0],
          backgroundColor: ['#ef4444', '#f59e0b', '#94a3b8']
        }]
      },
      options: {
        scales: { y: { beginAtZero: true } }
      }
    });

    const netChart = createChart($('#netChart'), {
      type: 'bar',
      data: {
        labels: ['发送 (MB)', '接收 (MB)'],
        datasets: [{
          label: '流量',
          data: [0, 0],
          backgroundColor: ['#0ea5e9', '#10b981']
        }]
      },
      options: {
        scales: { y: { beginAtZero: true } }
      }
    });

    const radarChart = createChart($('#radarChart'), {
      type: 'radar',
      data: {
        labels: ['CPU余量', '内存余量', '磁盘余量', '日志健康', '告警健康'],
        datasets: [{
          label: '当前评分',
          data: [0, 0, 0, 0, 0],
          backgroundColor: 'rgba(14, 165, 233, 0.2)',
          borderColor: '#0ea5e9',
          pointBackgroundColor: '#0ea5e9'
        }]
      },
      options: {
        scales: { r: { beginAtZero: true, max: 100 } }
      }
    });

    function formatUptime(seconds) {
      const d = Math.floor(seconds / 86400);
      const h = Math.floor((seconds % 86400) / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      if (d > 0) return `${d}天${h}时`;
      if (h > 0) return `${h}时${m}分`;
      return `${m}分`;
    }

    function getStatus(val, warnThreshold, critThreshold) {
      if (val >= critThreshold) return { text: '异常', cls: 'status-offline' };
      if (val >= warnThreshold) return { text: '警告', cls: 'status-warning' };
      return { text: '正常', cls: 'status-online' };
    }

    function renderMetricsTable(m) {
      const tbody = $('#metricsTbody');
      tbody.innerHTML = '';
      const rows = [
        ['CPU 使用率', (m.cpu_percent || 0).toFixed(1) + '%', getStatus(m.cpu_percent || 0, 70, 90)],
        ['内存使用率', (m.mem_percent || 0).toFixed(1) + '%', getStatus(m.mem_percent || 0, 70, 90)],
        ['磁盘使用率', (m.disk_used_percent || 0).toFixed(1) + '%', getStatus(m.disk_used_percent || 0, 80, 95)],
        ['系统负载', (m.load1 || 0).toFixed(2), getStatus(m.load1 || 0, 2, 5)],
        ['网络发送', formatBytes(m.net_bytes_sent || 0), { text: '正常', cls: 'status-online' }],
        ['网络接收', formatBytes(m.net_bytes_recv || 0), { text: '正常', cls: 'status-online' }],
        ['运行时间', formatUptime(m.uptime || 0), { text: '正常', cls: 'status-online' }]
      ];
      for (const [label, val, status] of rows) {
        const tr = document.createElement('tr');
        const td1 = document.createElement('td');
        td1.textContent = label;
        td1.style.fontWeight = '600';
        const td2 = document.createElement('td');
        td2.textContent = val;
        const td3 = document.createElement('td');
        const badge = document.createElement('span');
        badge.className = 'status-badge ' + status.cls;
        badge.textContent = status.text;
        td3.appendChild(badge);
        tr.appendChild(td1);
        tr.appendChild(td2);
        tr.appendChild(td3);
        tbody.appendChild(tr);
      }
    }

    async function loadReport() {
      try {
        const res = await api('/report/perf');
        reportData = await res.json();
        const m = reportData.metrics || {};

        $('#reportTime').textContent = '生成时间: ' + formatDate(reportData.timestamp);
        $('#cpuVal').textContent = (m.cpu_percent || 0).toFixed(1) + '%';
        $('#memVal').textContent = (m.mem_percent || 0).toFixed(1) + '%';
        $('#diskVal').textContent = (m.disk_used_percent || 0).toFixed(1) + '%';
        $('#loadVal').textContent = (m.load1 || 0).toFixed(2);
        $('#logsCount').textContent = reportData.logs_count || 0;
        $('#alertsCount').textContent = reportData.alerts_count || 0;
        $('#uptimeVal').textContent = formatUptime(m.uptime || 0);

        renderMetricsTable(m);

        const cpu = m.cpu_percent || 0;
        const mem = m.mem_percent || 0;
        const disk = m.disk_used_percent || 0;
        const free = Math.max(0, 100 - cpu - mem - disk);
        if (usageChart) {
          usageChart.data.datasets[0].data = [cpu, mem, disk, free > 0 ? free : 0];
          usageChart.update();
        }

        const ab = reportData.alerts_breakdown || {};
        if (alertChart) {
          const other = Math.max(0, (reportData.alerts_count || 0) - (ab.critical || 0) - (ab.warning || 0));
          alertChart.data.datasets[0].data = [ab.critical || 0, ab.warning || 0, other];
          alertChart.update();
        }

        if (netChart) {
          netChart.data.datasets[0].data = [
            ((m.net_bytes_sent || 0) / 1048576).toFixed(1),
            ((m.net_bytes_recv || 0) / 1048576).toFixed(1)
          ];
          netChart.update();
        }

        if (radarChart) {
          const cpuScore = Math.max(0, 100 - cpu);
          const memScore = Math.max(0, 100 - mem);
          const diskScore = Math.max(0, 100 - disk);
          const logScore = (reportData.logs_count || 0) > 1000 ? 50 : 90;
          const alertScore = (reportData.alerts_count || 0) > 50 ? 40 : (reportData.alerts_count || 0) > 10 ? 70 : 95;
          radarChart.data.datasets[0].data = [cpuScore, memScore, diskScore, logScore, alertScore];
          radarChart.update();
        }

        if (reportData.notes) {
          $('#notesCard').style.display = 'block';
          $('#reportNotes').textContent = reportData.notes;
        }

        showToast('报告已刷新', 'success');
      } catch (e) {
        showToast(e.message || '加载失败', 'error');
      }
    }

    function exportReport() {
      if (!reportData) {
        showToast('请先加载报告', 'info');
        return;
      }
      const json = JSON.stringify(reportData, null, 2);
      const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `perf_report_${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('报告已导出', 'success');
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadReport();
    });
  </script>
</body>
</html>
