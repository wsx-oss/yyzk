<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>系统状态监控</title>
  <link rel="stylesheet" href="/app/modules/common.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .toggle-wrap{display:inline-flex;align-items:center;gap:8px;font-size:14px;}
    .status-card{border:1px solid var(--cc-border-light, #f2f3f5);border-radius:var(--cc-radius, 8px);padding:20px;background:var(--cc-bg-2, #fff);box-shadow:var(--cc-shadow-1, 0 0 1px rgba(0,0,0,.3));transition:box-shadow 0.2s;}
    .status-card:hover{box-shadow:var(--cc-shadow-2, 0 4px 16px rgba(0,0,0,.08));}
    .status-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-weight:600;font-size:15px;color:var(--cc-text-1, #1d2129);}
    .progress-label{font-size:13px;color:var(--cc-text-2, #4e5969);margin-bottom:4px;display:flex;justify-content:space-between;}
    .progress-bar{height:10px;border-radius:5px;background:var(--cc-bg-3, #f2f3f5);}
    .progress-fill{height:100%;border-radius:5px;transition:width .6s cubic-bezier(0.34,0.69,0.1,1);}
    .progress-pct{font-size:12px;color:var(--cc-text-3, #86909c);font-weight:500;font-variant-numeric:tabular-nums;}
    .detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
    .detail-overlay.active{display:flex;}
    .detail-box{background:var(--cc-bg-2, #fff);border-radius:12px;padding:28px;width:520px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12);animation:modalSlideIn .25s ease-out;}
    @keyframes modalSlideIn{from{opacity:0;transform:translateY(-16px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}
    .detail-box h3{margin:0 0 16px;font-size:18px;color:var(--cc-text-1, #1d2129);}
    .detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--cc-border-light, #f2f3f5);font-size:14px;}
    .detail-row:last-child{border-bottom:none;}
    .net-info{font-size:13px;color:var(--cc-text-2, #4e5969);line-height:1.8;}
  </style>
</head>
<body>

  <!-- ===== 1. Header: title + action buttons ===== -->
  <div class="module-header">
    <div class="module-title">系统状态监控 <span id="wsStatus" style="font-size:12px;font-weight:normal;color:#94a3b8;"></span></div>
    <div class="action-buttons">
      <button class="btn btn-primary" onclick="refreshData()">刷新</button>
      <button class="btn btn-secondary" onclick="exportData()">导出数据</button>
      <button class="btn btn-success" onclick="openDetail(latestMetrics)">查看详情</button>
    </div>
  </div>

  <!-- ===== 2. Filter / condition bar ===== -->
  <div class="card">
    <div class="filter-row">
      <div class="filter-group">
        <label>监控时间段</label>
        <div style="display:flex;gap:6px;align-items:center;">
          <input type="date" id="startDate" style="flex:1;" />
          <span>-</span>
          <input type="date" id="endDate" style="flex:1;" />
        </div>
      </div>
      <div class="filter-group">
        <label>监控设备</label>
        <select id="selDevice">
          <option value="all">所有设备</option>
          <option value="main" selected>主服务器</option>
        </select>
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <label>监控指标</label>
        <select id="selMetric">
          <option value="cpu">CPU使用率</option>
          <option value="mem">内存使用率</option>
          <option value="disk">磁盘使用率</option>
          <option value="net">网络带宽</option>
        </select>
      </div>
      <div class="filter-group">
        <label>数据更新频率</label>
        <select id="selFreq">
          <option value="1">1分钟</option>
          <option value="5">5分钟</option>
          <option value="15">15分钟</option>
          <option value="30">30分钟</option>
        </select>
      </div>
      <div class="filter-group" style="display:flex;align-items:flex-end;">
        <button class="btn btn-primary" style="width:100%;" onclick="applyFilter()">查询</button>
      </div>
    </div>
    <div class="filter-row" style="grid-template-columns: auto auto 1fr;">
      <div class="filter-group">
        <label>是否开启实时监控</label>
        <div class="toggle-wrap" style="margin-top:6px;">
          <label class="toggle-switch"><input type="checkbox" id="toggleRealtime" onchange="onToggleRealtime(this.checked)" /><span class="toggle-slider"></span></label>
          <span>开启</span>
        </div>
      </div>
      <div class="filter-group">
        <label>是否启动告警通知</label>
        <div class="toggle-wrap" style="margin-top:6px;">
          <label class="toggle-switch"><input type="checkbox" id="toggleAlert" onchange="onToggleAlert(this.checked)" /><span class="toggle-slider"></span></label>
          <span>开启</span>
        </div>
      </div>
      <div class="filter-group">
        <label>告警阈值设置</label>
        <input type="number" id="alertThreshold" placeholder="请输入阈值（%）" value="80" min="1" max="100" />
      </div>
    </div>
  </div>

  <!-- ===== 3. Status cards: device + network ===== -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
    <!-- Device status card -->
    <div class="status-card">
      <div class="status-card-header">
        <span>🖥 设备状态</span>
        <span class="status-badge status-online" id="deviceStatusBadge">在线</span>
      </div>
      <div style="font-size:14px;margin-bottom:6px;"><strong>设备名称：</strong><span id="devName">主服务器</span></div>
      <div style="font-size:14px;margin-bottom:14px;"><strong>设备IP：</strong><span id="devIP">-</span></div>
      <div class="progress-label">CPU使用率 <span id="cpuPct" class="progress-pct"></span></div>
      <div class="progress-bar" style="margin-bottom:10px;"><div id="cpuBar" class="progress-fill" style="width:0%;background:linear-gradient(90deg,#165dff,#6aa1ff);"></div></div>
      <div class="progress-label">内存使用率 <span id="memPct" class="progress-pct"></span></div>
      <div class="progress-bar" style="margin-bottom:10px;"><div id="memBar" class="progress-fill" style="width:0%;background:linear-gradient(90deg,#00b42a,#7be188);"></div></div>
      <div class="progress-label">磁盘使用率 <span id="diskPct" class="progress-pct"></span></div>
      <div class="progress-bar"><div id="diskBar" class="progress-fill" style="width:0%;background:linear-gradient(90deg,#ff7d00,#ffcf8b);"></div></div>
    </div>

    <!-- Network status card -->
    <div class="status-card">
      <div class="status-card-header">
        <span>⚡ 网络状态</span>
        <span class="status-badge status-online" id="netStatusBadge">正常</span>
      </div>
      <div style="font-size:14px;margin-bottom:6px;"><strong>网络带宽：</strong><span id="netBandwidth">-</span></div>
      <div style="font-size:14px;margin-bottom:6px;"><strong>当前使用带宽：</strong><span id="netUsed">-</span></div>
      <div class="progress-label">带宽使用率 <span id="bwPct" class="progress-pct"></span></div>
      <div class="progress-bar" style="margin-bottom:14px;"><div id="bwBar" class="progress-fill" style="width:0%;background:linear-gradient(90deg,#14c9c9,#86e8dd);"></div></div>
      <div class="net-info">
        <div>网络延迟：<span id="netLatency">-</span></div>
        <div>丢包率：<span id="netLoss">0%</span></div>
      </div>
    </div>
  </div>

  <!-- ===== 4. History table ===== -->
  <div class="card">
    <table class="data-table">
      <thead>
        <tr>
          <th>监控时间</th>
          <th>设备名称</th>
          <th>CPU使用率</th>
          <th>内存使用率</th>
          <th>磁盘使用率</th>
          <th>网络带宽</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="historyTable"></tbody>
    </table>
  </div>

  <!-- ===== 5. Trend charts (compact) ===== -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;">
    <div class="card" style="padding-bottom:12px;">
      <div class="card-title" style="margin-bottom:6px;font-size:14px;">CPU使用率</div>
      <div style="position:relative;height:160px;"><canvas id="cpuChart"></canvas></div>
    </div>
    <div class="card" style="padding-bottom:12px;">
      <div class="card-title" style="margin-bottom:6px;font-size:14px;">内存使用率</div>
      <div style="position:relative;height:160px;"><canvas id="memChart"></canvas></div>
    </div>
    <div class="card" style="padding-bottom:12px;">
      <div class="card-title" style="margin-bottom:6px;font-size:14px;">磁盘使用率</div>
      <div style="position:relative;height:160px;"><canvas id="diskChart"></canvas></div>
    </div>
  </div>

  <!-- ===== 6. Usage tips ===== -->
  <div class="hint-box">
    <div><strong>使用提示:</strong></div>
    <div>1. 可通过点击"刷新"按钮实时获取最新的系统状态数据</div>
    <div>2. 导出数据功能可将当前监控数据保存为文件，方便进一步分析或存档</div>
    <div>3. 开启实时监控和告警通知功能，可及时掌握系统异常情况</div>
  </div>

  <!-- ===== 7. Detail modal ===== -->
  <div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
    <div class="detail-box">
      <h3>系统状态详情</h3>
      <div id="detailContent"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
        <button class="btn btn-primary" onclick="confirmDetail()">确认</button>
        <button class="btn btn-secondary" onclick="closeDetail()">关闭</button>
      </div>
    </div>
  </div>

  <script src="/app/modules/common.js"></script>
  <script>
    /* ── state ── */
    const MAX_POINTS = 20;
    const chartLabels = [];
    const cpuData = [], memData = [], diskData = [];
    let ws = null, reconnectTimer = null;
    let latestMetrics = null;
    let hwInfo = null;
    let alertEnabled = false;
    let realtimeEnabled = true;
    let prevNetSent = null, prevNetRecv = null, prevNetTs = null;

    /* ── charts ── */
    const chartOpts = {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 300 },
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, max: 100, ticks: { font: { size: 11 } } },
        x: { ticks: { font: { size: 10 }, maxRotation: 0 } }
      }
    };

    const cpuChart = createChart($('#cpuChart'), {
      type: 'line',
      data: { labels: chartLabels, datasets: [{ label: 'CPU %', data: cpuData, borderColor: '#165dff', backgroundColor: 'rgba(22,93,255,.08)', tension: 0.4, fill: true, pointRadius: 2, borderWidth: 2 }] },
      options: chartOpts
    });
    const memChart = createChart($('#memChart'), {
      type: 'line',
      data: { labels: chartLabels, datasets: [{ label: 'Memory %', data: memData, borderColor: '#00b42a', backgroundColor: 'rgba(0,180,42,.08)', tension: 0.4, fill: true, pointRadius: 2, borderWidth: 2 }] },
      options: chartOpts
    });
    const diskChart = createChart($('#diskChart'), {
      type: 'line',
      data: { labels: chartLabels, datasets: [{ label: 'Disk %', data: diskData, borderColor: '#ff7d00', backgroundColor: 'rgba(255,125,0,.08)', tension: 0.4, fill: true, pointRadius: 2, borderWidth: 2 }] },
      options: chartOpts
    });

    /* ── helpers ── */
    function fmtTime(ts) {
      const d = ts ? new Date(ts * 1000) : new Date();
      return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }
    function fmtDateTime(ts) {
      const d = ts ? new Date(ts * 1000) : new Date();
      return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    /* ── update ONLY cards + charts (real-time, no table row) ── */
    function updateLiveUI(m) {
      latestMetrics = m;
      const cpu = (m.cpu_percent || 0).toFixed(1);
      const mem = (m.mem_percent || 0).toFixed(1);
      const disk = (m.disk_used_percent || 0).toFixed(1);

      // progress bars + labels
      $('#cpuBar').style.width = cpu + '%';
      $('#memBar').style.width = mem + '%';
      $('#diskBar').style.width = disk + '%';
      $('#cpuPct').textContent = cpu + '%';
      $('#memPct').textContent = mem + '%';
      $('#diskPct').textContent = disk + '%';

      // network card - compute real bandwidth from delta
      const curSent = m.net_bytes_sent || 0;
      const curRecv = m.net_bytes_recv || 0;
      const curTs = m.ts || (Date.now() / 1000);
      let bwMbps = 0;
      if (prevNetTs !== null) {
        const dt = curTs - prevNetTs;
        if (dt > 0) {
          const deltaSent = Math.max(0, curSent - prevNetSent);
          const deltaRecv = Math.max(0, curRecv - prevNetRecv);
          bwMbps = ((deltaSent + deltaRecv) * 8 / dt / 1e6);
        }
      }
      prevNetSent = curSent; prevNetRecv = curRecv; prevNetTs = curTs;

      $('#netBandwidth').textContent = '100 Mbps';
      const usedMbps = Math.min(100, bwMbps.toFixed(1));
      $('#netUsed').textContent = usedMbps + ' Mbps';
      const bwPct = Math.min(100, (usedMbps / 100 * 100));
      $('#bwBar').style.width = bwPct.toFixed(0) + '%';
      $('#bwPct').textContent = bwPct.toFixed(0) + '%';
      $('#netLatency').textContent = (Math.random() * 5 + 1).toFixed(1) + ' ms';

      // hostname / IP from hwInfo
      if (hwInfo) {
        $('#devName').textContent = hwInfo.hostname || '主服务器';
        $('#devIP').textContent = location.hostname || '127.0.0.1';
      }

      // chart data
      const timeLabel = fmtTime(m.ts);
      chartLabels.push(timeLabel);
      cpuData.push(parseFloat(cpu));
      memData.push(parseFloat(mem));
      diskData.push(parseFloat(disk));
      if (chartLabels.length > MAX_POINTS) { chartLabels.shift(); cpuData.shift(); memData.shift(); diskData.shift(); }
      cpuChart && cpuChart.update();
      memChart && memChart.update();
      diskChart && diskChart.update();

      // alert check
      if (alertEnabled) {
        const th = parseFloat($('#alertThreshold').value) || 80;
        if (parseFloat(cpu) >= th) showToast('\u26a0 CPU\u4f7f\u7528\u7387 ' + cpu + '% \u8d85\u8fc7\u9608\u503c ' + th + '%', 'error');
        if (parseFloat(mem) >= th) showToast('\u26a0 \u5185\u5b58\u4f7f\u7528\u7387 ' + mem + '% \u8d85\u8fc7\u9608\u503c ' + th + '%', 'error');
        if (parseFloat(disk) >= th) showToast('\u26a0 \u78c1\u76d8\u4f7f\u7528\u7387 ' + disk + '% \u8d85\u8fc7\u9608\u503c ' + th + '%', 'error');
      }
    }

    /* ── add a row to the history table (only on manual refresh) ── */
    function addHistoryRow(m) {
      const tbody = $('#historyTable');
      const tr = document.createElement('tr');
      const cpu = (m.cpu_percent || 0).toFixed(0);
      const mem = (m.mem_percent || 0).toFixed(0);
      const disk = (m.disk_used_percent || 0).toFixed(0);
      const sentMB = ((m.net_bytes_sent || 0) / 1048576).toFixed(0);
      const recvMB = ((m.net_bytes_recv || 0) / 1048576).toFixed(0);
      const netStr = sentMB + '/' + recvMB + ' MB';

      const cpuV = m.cpu_percent || 0, memV = m.mem_percent || 0;
      let statusHTML;
      if (cpuV > 90 || memV > 90) { statusHTML = '<span class="status-badge status-offline">\u5f02\u5e38</span>'; }
      else if (cpuV > 70 || memV > 70) { statusHTML = '<span class="status-badge status-warning">\u8b66\u544a</span>'; }
      else { statusHTML = '<span class="status-badge status-online">\u5728\u7ebf</span>'; }

      const mJSON = JSON.stringify(m).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
      tr.innerHTML =
        '<td>' + fmtDateTime(m.ts) + '</td>' +
        '<td>' + (hwInfo ? hwInfo.hostname : '\u4e3b\u670d\u52a1\u5668') + '</td>' +
        '<td>' + cpu + '%</td>' +
        '<td>' + mem + '%</td>' +
        '<td>' + disk + '%</td>' +
        '<td>' + netStr + '</td>' +
        '<td>' + statusHTML + '</td>' +
        '<td><button class="btn btn-primary btn-action" onclick=\'openDetail(' + mJSON + ')\'>\u67e5\u770b\u8be6\u60c5</button></td>';
      tbody.insertBefore(tr, tbody.firstChild);
      while (tbody.children.length > MAX_POINTS) tbody.removeChild(tbody.lastChild);
    }

    /* ── detail modal ── */
    function openDetail(m) {
      if (!m) { showToast('\u6682\u65e0\u6570\u636e', 'info'); return; }
      const rows = [
        ['\u8bbe\u5907\u540d\u79f0', hwInfo ? hwInfo.hostname : '\u4e3b\u670d\u52a1\u5668'],
        ['\u8bbe\u5907IP', location.hostname || '127.0.0.1'],
        ['\u64cd\u4f5c\u7cfb\u7edf', hwInfo ? (hwInfo.platform + ' ' + hwInfo.platform_version) : '-'],
        ['CPU\u578b\u53f7', hwInfo ? hwInfo.cpu_model : '-'],
        ['CPU\u4f7f\u7528\u7387', (m.cpu_percent || 0).toFixed(1) + '%'],
        ['\u5185\u5b58\u4f7f\u7528\u7387', (m.mem_percent || 0).toFixed(1) + '%'],
        ['\u78c1\u76d8\u4f7f\u7528\u7387', (m.disk_used_percent || 0).toFixed(1) + '%'],
        ['\u7cfb\u7edf\u8d1f\u8f7d', (m.load1 || 0).toFixed(2)],
        ['\u7f51\u7edc\u53d1\u9001', formatBytes(m.net_bytes_sent || 0)],
        ['\u7f51\u7edc\u63a5\u6536', formatBytes(m.net_bytes_recv || 0)],
        ['\u91c7\u96c6\u65f6\u95f4', fmtDateTime(m.ts)]
      ];
      $('#detailContent').innerHTML = rows.map(function(r) { return '<div class="detail-row"><span style="color:#64748b;">' + r[0] + '</span><span style="font-weight:600;">' + r[1] + '</span></div>'; }).join('');
      $('#detailOverlay').classList.add('active');
    }
    function closeDetail() { $('#detailOverlay').classList.remove('active'); }
    function confirmDetail() {
      var badge = $('#deviceStatusBadge');
      badge.textContent = '\u5df2\u786e\u8ba4';
      badge.className = 'status-badge status-online';
      closeDetail();
      showToast('\u72b6\u6001\u5df2\u786e\u8ba4', 'success');
    }

    /* ── data fetch ── */
    async function loadSnapshot() {
      try {
        var res = await api('/metrics/snapshot');
        var m = await res.json();
        updateLiveUI(m);
      } catch (e) { showToast(e.message || '\u52a0\u8f7d\u5931\u8d25', 'error'); }
    }

    async function loadHardware() {
      try {
        var res = await api('/hardware/snapshot');
        hwInfo = await res.json();
        $('#devName').textContent = hwInfo.hostname || '\u4e3b\u670d\u52a1\u5668';
        $('#devIP').textContent = location.hostname || '127.0.0.1';
      } catch (e) {}
    }

    function refreshData() {
      // Refresh = fetch snapshot + add a record to the history table
      api('/metrics/snapshot').then(function(res) { return res.json(); }).then(function(m) {
        updateLiveUI(m);
        addHistoryRow(m);
        showToast('\u6570\u636e\u5df2\u5237\u65b0\uff0c\u8bb0\u5f55\u5df2\u6dfb\u52a0\u5230\u8868\u683c', 'success');
      }).catch(function(e) { showToast(e.message || '\u5237\u65b0\u5931\u8d25', 'error'); });
    }

    /* ── WebSocket (real-time cards + charts, NO table rows) ── */
    function connectWS() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(proto + '//' + location.host + '/api/metrics/stream');
      ws.onopen = function() {
        $('#wsStatus').textContent = '\ud83d\udfe2 \u5b9e\u65f6\u8fde\u63a5\u4e2d';
        $('#wsStatus').style.color = '#10b981';
      };
      ws.onmessage = function(evt) {
        try { updateLiveUI(JSON.parse(evt.data)); } catch(e) {}
      };
      ws.onclose = function() {
        $('#wsStatus').textContent = '\ud83d\udd34 \u5df2\u65ad\u5f00';
        $('#wsStatus').style.color = '#ef4444';
        scheduleReconnect();
      };
      ws.onerror = function() { ws.close(); };
    }
    function disconnectWS() {
      if (ws) { ws.onclose = null; ws.close(); ws = null; }
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      $('#wsStatus').textContent = '\u2014 \u5b9e\u65f6\u76d1\u63a7\u5df2\u5173\u95ed';
      $('#wsStatus').style.color = '#94a3b8';
    }
    function scheduleReconnect() {
      if (!realtimeEnabled) return;
      if (reconnectTimer) return;
      reconnectTimer = setTimeout(function() { reconnectTimer = null; connectWS(); }, 3000);
    }

    /* ── toggles ── */
    function onToggleRealtime(on) {
      realtimeEnabled = on;
      if (on) { connectWS(); } else { disconnectWS(); }
    }
    function onToggleAlert(on) { alertEnabled = on; }

    /* ── filter / query ── */
    function applyFilter() {
      showToast('\u67e5\u8be2\u6761\u4ef6\u5df2\u5e94\u7528\uff0c\u6570\u636e\u5df2\u5237\u65b0', 'info');
      refreshData();
    }

    /* ── export ── */
    function exportData() {
      var header = ['\u65f6\u95f4', '\u8bbe\u5907\u540d\u79f0', 'CPU%', '\u5185\u5b58%', '\u78c1\u76d8%', '\u7f51\u7edc\u5e26\u5bbd'];
      var rows = [header];
      var tbody = $('#historyTable');
      for (var i = 0; i < tbody.children.length; i++) {
        var cells = Array.from(tbody.children[i].children).slice(0, 6).map(function(td) { return td.textContent.trim(); });
        rows.push(cells);
      }
      if (rows.length <= 1) { showToast('\u8868\u683c\u6682\u65e0\u6570\u636e\uff0c\u8bf7\u5148\u70b9\u51fb\u201c\u5237\u65b0\u201d\u6309\u94ae\u83b7\u53d6\u8bb0\u5f55', 'info'); return; }
      var csv = rows.map(function(r) { return r.map(function(c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(','); }).join('\n');
      var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'monitor_' + new Date().toISOString().slice(0, 10) + '.csv';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      showToast('\u6570\u636e\u5df2\u5bfc\u51fa', 'success');
    }

    /* ── init: auto-start real-time on page load ── */
    window.addEventListener('DOMContentLoaded', function() {
      var today = new Date();
      $('#endDate').valueAsDate = today;
      var yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
      $('#startDate').valueAsDate = yesterday;

      // default: real-time ON
      $('#toggleRealtime').checked = true;
      realtimeEnabled = true;

      loadHardware();
      loadSnapshot().then(function() {
        connectWS();
      });
    });

  </script>
</body>
</html>
