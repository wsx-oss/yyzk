<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 云翼智控</title>
  <link rel="icon" type="image/jpeg" href="/app/logo.jpg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Source Han Sans SC", "Source Han Sans CN", "Source Han Sans", "思源黑体", sans-serif;
      background:
        linear-gradient(135deg, rgba(8, 15, 28, 0.92) 0%, rgba(10, 18, 34, 0.88) 100%),
        url("/app/login-bg.png") center center / cover no-repeat fixed;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    /* 登录卡片 */
    .login-shell {
      position: relative;
      z-index: 10;
      width: min(1100px, 100%);
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 420px);
      align-items: center;
      gap: clamp(24px, 5vw, 64px);
      padding: 40px 48px 56px;
    }
    .hero-panel {
      color: #e2e8f0;
      max-width: 560px;
      padding-right: 24px;
    }
    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      color: rgba(226,232,240,0.80);
      font-size: 13px;
      letter-spacing: 0.06em;
      margin-bottom: 18px;
    }
    .hero-title {
      font-size: clamp(32px, 4vw, 52px);
      line-height: 1.12;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }
    .hero-title strong {
      color: #7dd3fc;
      font-weight: 700;
    }
    .hero-copy {
      font-size: 15px;
      line-height: 1.8;
      color: rgba(226,232,240,0.65);
      max-width: 480px;
      margin-bottom: 24px;
    }
    .hero-highlights {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .hero-chip {
      padding: 10px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .hero-chip-title {
      font-size: 11px;
      color: rgba(148,163,184,0.80);
      margin-bottom: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .hero-chip-value {
      font-size: 15px;
      color: #f8fafc;
      font-weight: 600;
    }
    .login-card {
      background: rgba(12, 20, 36, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 197, 255, 0.12);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      padding: 40px 34px;
      width: min(420px, 100%);
      justify-self: end;
      position: relative;
    }
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .login-logo img {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      object-fit: cover;
    }
    .login-card h1 {
      font-size: 21px;
      color: #e2e8f0;
      text-align: center;
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .login-subtitle {
      text-align: center;
      font-size: 13px;
      color: rgba(176, 197, 228, 0.60);
      margin-bottom: 28px;
      line-height: 1.8;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(148, 197, 255, 0.14);
      border-radius: 10px;
      font-size: 14px;
      background: rgba(8, 16, 30, 0.5);
      color: #e2e8f0;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input::placeholder { color: rgba(132, 157, 194, 0.45); }
    .form-group input:focus {
      outline: none;
      border-color: #165dff;
      box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.12);
      background: rgba(8, 16, 30, 0.7);
    }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: #165dff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }
    .btn-login:hover { background: #1e6fff; box-shadow: 0 4px 16px rgba(22, 93, 255, 0.35); }
    .btn-login:active { background: #0e42d2; }
    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: rgba(176, 197, 228, 0.55);
    }
    .register-link a {
      color: #6aa1ff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .register-link a:hover { color: #94bfff; text-decoration: underline; }
    .error-msg {
      background: rgba(239, 68, 68, 0.12);
      color: #f87171;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      border: 1px solid rgba(248, 113, 113, 0.18);
    }
    .footer {
      position: absolute;
      bottom: 20px;
      text-align: center;
      width: 100%;
      font-size: 12px;
      color: rgba(176, 197, 228, 0.50);
      z-index: 10;
      letter-spacing: 0.5px;
    }
    @media (max-width: 960px) {
      .login-shell {
        grid-template-columns: 1fr;
        gap: 28px;
        padding: 32px 20px 64px;
      }
      .hero-panel { max-width: none; padding-right: 0; }
      .login-card { justify-self: stretch; width: 100%; }
    }
    @media (max-width: 640px) {
      .hero-title { font-size: 28px; }
      .login-card { padding: 32px 22px; }
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <section class="hero-panel">
      <div class="hero-kicker">云翼智控 · Unified Drone Ops Console</div>
      <h2 class="hero-title">让飞行、遥测与<strong>决策闭环</strong>在同一控制台完成。</h2>
      <p class="hero-copy">从多机协同、MAVLink 遥测到任务回放与数据备份，你现在进入的是整套无人机管控链路的统一入口。登录后即可查看实时状态、任务进度与系统健康概况。</p>
      <div class="hero-highlights">
        <div class="hero-chip">
          <div class="hero-chip-title">Flight Ops</div>
          <div class="hero-chip-value">多机协同调度</div>
        </div>
        <div class="hero-chip">
          <div class="hero-chip-title">Telemetry</div>
          <div class="hero-chip-value">MAVLink 实时链路</div>
        </div>
        <div class="hero-chip">
          <div class="hero-chip-title">Mission Loop</div>
          <div class="hero-chip-value">任务闭环与回放</div>
        </div>
      </div>
    </section>

    <div class="login-card">
      <div class="login-logo">
        <img src="/app/logo.jpg" alt="项目Logo" />
      </div>
      <h1>云翼智控</h1>
      <div class="login-subtitle">欢迎回到统一管控台<br>登录后继续查看飞行、遥测与系统运行状态</div>
      <div class="error-msg" id="errorMsg"></div>
      <form id="loginForm" method="post" action="/api/auth/login" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" name="username" required autocomplete="username" placeholder="请输入用户名" />
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码" />
        </div>
        <button type="submit" class="btn-login">登 录</button>
      </form>
      <div class="register-link" id="registerLink">
        还没有账号？<a href="/app/register.html">立即注册</a>
      </div>
    </div>
  </div>

  <div class="footer">云翼智控 &copy; 2025 — 智能工具人机交互与协同管控系统</div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        
        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', username);
          window.location.href = '/app/dashboard.html';
        } else {
          errorMsg.textContent = data.error || '登录失败，请检查用户名和密码';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = '网络错误，请稍后重试';
        errorMsg.style.display = 'block';
      }
    });
    
    // Bug 27: ensure Enter key triggers login from any input
    document.getElementById('username').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); form.requestSubmit(); }
    });
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); form.requestSubmit(); }
    });

    // 如果已登录，直接跳转
    if (localStorage.getItem('token')) {
      window.location.href = '/app/dashboard.html';
    }

    // 根据后端配置决定是否显示注册入口
    (async function() {
      try {
        const res = await fetch('/api/config');
        const cfg = await res.json();
        if (cfg.enable_register === false) {
          const el = document.getElementById('registerLink');
          if (el) el.style.display = 'none';
        }
      } catch(e) {}
    })();
  </script>
</body>
</html>
