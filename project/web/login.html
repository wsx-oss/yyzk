<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 云翼智控</title>
  <link rel="icon" type="image/jpeg" href="/app/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Noto Sans SC", "Source Han Sans SC", "Source Han Sans CN", "Source Han Sans", "思源黑体", sans-serif;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background: #060a14;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Full-screen background image ---- */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url("/app/login-bg.png") center center / cover no-repeat;
    }
    /* Thin gradient veil — keeps text readable without hiding the image */
    .bg-layer::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(105deg, rgba(4, 10, 22, 0.72) 0%, rgba(4, 10, 22, 0.38) 50%, rgba(4, 10, 22, 0.18) 100%);
    }

    /* ---- Main layout ---- */
    .login-shell {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1340px;
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr minmax(380px, 440px);
      align-items: end;
      gap: clamp(32px, 6vw, 80px);
      padding: 40px 56px 56px;
    }

    /* ---- Left hero panel ---- */
    .hero-panel {
      color: #e2e8f0;
      max-width: 420px;
      align-self: end;
      padding-bottom: 48px;
      justify-self: start;
    }
    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(226,232,240,0.85);
      font-size: 13px;
      letter-spacing: 0.06em;
      margin-bottom: 22px;
    }
    .hero-title {
      font-size: clamp(30px, 3.6vw, 48px);
      line-height: 1.18;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 18px;
      text-shadow: 0 2px 24px rgba(0,0,0,0.5);
    }
    .hero-title strong {
      background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 50%, #6ee7b7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }
    .hero-copy {
      font-size: 15px;
      line-height: 1.85;
      color: rgba(226,232,240,0.62);
      max-width: 420px;
      margin-bottom: 28px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.4);
    }
    .hero-highlights {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .hero-chip {
      padding: 12px 18px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.10);
      transition: transform 0.2s, border-color 0.2s;
    }
    .hero-chip:hover {
      transform: translateY(-2px);
      border-color: rgba(125,211,252,0.3);
    }
    .hero-chip-title {
      font-size: 11px;
      color: rgba(148,163,184,0.78);
      margin-bottom: 5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .hero-chip-value {
      font-size: 15px;
      color: #f1f5f9;
      font-weight: 600;
    }

    /* ---- Right: Glass login card ---- */
    .login-card {
      background: rgba(10, 18, 34, 0.42);
      backdrop-filter: blur(32px) saturate(140%);
      -webkit-backdrop-filter: blur(32px) saturate(140%);
      border: 1px solid rgba(148, 197, 255, 0.16);
      border-radius: 24px;
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255,255,255,0.06);
      padding: 44px 36px 38px;
      margin-bottom: 36px;
      width: 100%;
      max-width: 440px;
      justify-self: end;
      position: relative;
      overflow: hidden;
    }
    /* Subtle top-edge glow */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(125,211,252,0.5), transparent);
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .login-logo img {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .login-card h1 {
      font-size: 22px;
      color: #f1f5f9;
      text-align: center;
      margin-bottom: 4px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .login-subtitle {
      text-align: center;
      font-size: 13px;
      color: rgba(176, 197, 228, 0.55);
      margin-bottom: 30px;
      line-height: 1.8;
    }

    /* ---- Form ---- */
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: rgba(176, 197, 228, 0.72);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid rgba(148, 197, 255, 0.14);
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      background: rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .form-group input::placeholder { color: rgba(132, 157, 194, 0.38); }
    .form-group input:focus {
      outline: none;
      border-color: rgba(78, 159, 255, 0.6);
      box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.15), 0 0 20px rgba(22, 93, 255, 0.08);
      background: rgba(255, 255, 255, 0.14);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #165dff 0%, #1e80ff 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 10px;
      letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(22, 93, 255, 0.25);
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #1e6fff 0%, #3b8bff 100%);
      box-shadow: 0 6px 28px rgba(22, 93, 255, 0.4);
      transform: translateY(-1px);
    }
    .btn-login:active {
      background: #0e42d2;
      transform: translateY(0);
    }

    .register-link {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: rgba(176, 197, 228, 0.50);
    }
    .register-link a {
      color: #6aa1ff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .register-link a:hover { color: #94bfff; text-decoration: underline; }

    .error-msg {
      background: rgba(239, 68, 68, 0.12);
      color: #f87171;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      border: 1px solid rgba(248, 113, 113, 0.18);
      backdrop-filter: blur(8px);
    }

    .footer {
      position: fixed;
      bottom: 18px;
      left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      color: rgba(176, 197, 228, 0.40);
      z-index: 10;
      letter-spacing: 0.5px;
    }

    /* ---- Responsive ---- */
    @media (max-width: 960px) {
      .login-shell {
        grid-template-columns: 1fr;
        gap: 28px;
        padding: 32px 20px 72px;
      }
      .hero-panel { max-width: none; }
      .login-card { justify-self: center; max-width: 480px; }
    }
    @media (max-width: 640px) {
      .login-shell { padding: 24px 16px 72px; }
      .hero-title { font-size: 26px; }
      .login-card { padding: 32px 22px 28px; border-radius: 20px; }
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>

  <div class="login-shell">
    <section class="hero-panel">
      <div class="hero-kicker">云翼智控 · Unified Drone Ops Console</div>
      <h2 class="hero-title">让飞行、遥测与<strong>决策闭环</strong>在同一控制台完成。</h2>
      <p class="hero-copy">从多机协同、MAVLink 遥测到任务回放与数据备份，你现在进入的是整套无人机管控链路的统一入口。登录后即可查看实时状态、任务进度与系统健康概况。</p>
      <div class="hero-highlights">
        <div class="hero-chip">
          <div class="hero-chip-title">Flight Ops</div>
          <div class="hero-chip-value">多机协同调度</div>
        </div>
        <div class="hero-chip">
          <div class="hero-chip-title">Telemetry</div>
          <div class="hero-chip-value">MAVLink 实时链路</div>
        </div>
        <div class="hero-chip">
          <div class="hero-chip-title">Mission Loop</div>
          <div class="hero-chip-value">任务闭环与回放</div>
        </div>
      </div>
    </section>

    <div class="login-card">
      <div class="login-logo">
        <img src="/app/logo.jpg" alt="云翼智控" />
      </div>
      <h1>云翼智控</h1>
      <div class="login-subtitle">欢迎回到统一管控台<br>登录后继续查看飞行、遥测与系统运行状态</div>
      <div class="error-msg" id="errorMsg"></div>
      <form id="loginForm" method="post" action="/api/auth/login" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" name="username" required autocomplete="username" placeholder="请输入用户名" />
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码" />
        </div>
        <button type="submit" class="btn-login">登 录</button>
      </form>
      <div class="register-link" id="registerLink">
        还没有账号？<a href="/app/register.html">立即注册</a>
      </div>
    </div>
  </div>

  <div class="footer">云翼智控 &copy; 2026 — 智能工具人机交互与协同管控系统</div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        
        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', username);
          window.location.href = '/app/dashboard.html';
        } else {
          errorMsg.textContent = data.error || '登录失败，请检查用户名和密码';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = '网络错误，请稍后重试';
        errorMsg.style.display = 'block';
      }
    });
    
    // Bug 27: ensure Enter key triggers login from any input
    document.getElementById('username').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); form.requestSubmit(); }
    });
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); form.requestSubmit(); }
    });

    // 如果已登录，直接跳转
    if (localStorage.getItem('token')) {
      window.location.href = '/app/dashboard.html';
    }

    // 根据后端配置决定是否显示注册入口
    (async function() {
      try {
        const res = await fetch('/api/config');
        const cfg = await res.json();
        if (cfg.enable_register === false) {
          const el = document.getElementById('registerLink');
          if (el) el.style.display = 'none';
        }
      } catch(e) {}
    })();
  </script>
</body>
</html>
