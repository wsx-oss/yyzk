<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 - 云翼智控</title>
  <link rel="icon" type="image/jpeg" href="/app/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Noto Sans SC", "Source Han Sans SC", "Source Han Sans CN", "Source Han Sans", "思源黑体", sans-serif;
      background: linear-gradient(135deg, rgba(8, 15, 28, 0.94) 0%, rgba(10, 18, 34, 0.90) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .register-card {
      background: rgba(12, 20, 36, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 197, 255, 0.12);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      padding: 40px 34px;
      width: 420px;
      max-width: 90%;
      position: relative;
      z-index: 10;
    }
    .register-logo {
      display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px;
    }
    .register-logo img {
      width: 40px; height: 40px; border-radius: 10px; object-fit: cover;
    }
    .register-card h1 {
      font-size: 21px; color: #e2e8f0; text-align: center; margin-bottom: 6px; font-weight: 700; letter-spacing: 0.5px;
    }
    .register-subtitle {
      text-align: center; font-size: 13px; color: rgba(176, 197, 228, 0.60); margin-bottom: 28px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 8px; font-weight: 500; }
    .form-group input {
      width: 100%; padding: 12px 16px; border: 1px solid rgba(148, 197, 255, 0.14); border-radius: 10px;
      font-size: 14px; background: rgba(8, 16, 30, 0.5); color: #e2e8f0; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input::placeholder { color: rgba(132, 157, 194, 0.45); }
    .form-group input:focus {
      outline: none; border-color: #165dff;
      box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.12); background: rgba(8, 16, 30, 0.7);
    }
    .btn-register {
      width: 100%; padding: 13px; background: #165dff;
      color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s; margin-top: 8px; letter-spacing: 0.5px;
    }
    .btn-register:hover { background: #1e6fff; box-shadow: 0 4px 16px rgba(22, 93, 255, 0.35); }
    .btn-register:active { background: #0e42d2; }
    .login-link { text-align: center; margin-top: 20px; font-size: 13px; color: rgba(176, 197, 228, 0.55); }
    .login-link a { color: #6aa1ff; text-decoration: none; font-weight: 500; transition: color 0.2s; }
    .login-link a:hover { color: #94bfff; text-decoration: underline; }
    .error-msg, .success-msg { padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; display: none; }
    .error-msg { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.18); }
    .success-msg { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.18); }
    .footer { position: absolute; bottom: 20px; text-align: center; width: 100%; font-size: 12px; color: rgba(176, 197, 228, 0.50); z-index: 10; }
  </style>
</head>
<body>
  <div class="register-card">
    <div class="register-logo">
      <img src="/app/logo.jpg" alt="项目Logo" />
    </div>
    <h1>创建账号</h1>
    <div class="register-subtitle">加入 云翼智控 智能无人机管控平台</div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
    <form id="registerForm">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" required autocomplete="username" minlength="3" placeholder="至少3个字符" />
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6" placeholder="至少6个字符" />
      </div>
      <div class="form-group">
        <label for="password2">确认密码</label>
        <input type="password" id="password2" name="password2" required autocomplete="new-password" minlength="6" placeholder="再次输入密码" />
      </div>
      <button type="submit" class="btn-register">注 册</button>
    </form>
    <div class="login-link">
      已有账号？<a href="/app/login.html">立即登录</a>
    </div>
  </div>

  <div class="footer">云翼智控 &copy; 2025 — 智能工具人机交互与远程控制系统</div>

  <script>
    const form = document.getElementById('registerForm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      
      if (password !== password2) {
        errorMsg.textContent = '两次密码输入不一致';
        errorMsg.style.display = 'block';
        return;
      }
      
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        
        if (res.ok) {
          successMsg.textContent = '注册成功！正在跳转到登录页...';
          successMsg.style.display = 'block';
          setTimeout(() => {
            window.location.href = '/app/login.html';
          }, 1500);
        } else {
          errorMsg.textContent = data.error || '注册失败';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = '网络错误，请稍后重试';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
