<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VNC 远程桌面 - 简化版</title>
  <link rel="icon" type="image/jpeg" href="/app/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Noto Sans SC", "Source Han Sans SC", "Source Han Sans CN", "Source Han Sans", "思源黑体", sans-serif; background: #0f172a; color: #fff; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { background: #1e293b; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .header h1 { font-size: 24px; margin-bottom: 16px; }
    .controls { display: flex; gap: 12px; align-items: center; }
    .controls input { flex: 1; padding: 10px 14px; border: 1px solid #334155; background: #0f172a; color: #fff; border-radius: 6px; font-size: 14px; }
    .controls button:hover { background: #0e42d2; }
    .controls button.disconnect { background: #64748b; }
    .status {
      background: rgba(8, 16, 30, 0.62);
      border: 1px solid rgba(120,170,255,0.18);
      border-radius: 18px;
      box-shadow: 0 20px 48px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      padding: 12px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
    }
    .status-indicator { width: 12px; height: 12px; border-radius: 50%; background: #475569; }
    .status-indicator.connecting { background: #f59e0b; animation: pulse 1.5s infinite; }
    .status-indicator.connected { background: #10b981; }
    .status-indicator.error { background: #ef4444; }
    .status-text { font-size: 14px; }
    .error-box {
      border-radius: 12px;
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      background: #7f1d1d; border-left: 4px solid #ef4444; padding: 12px 16px; margin-bottom: 20px; display: none;
    }
    .canvas-container {
      background: rgba(8, 16, 30, 0.62);
      border: 1px solid rgba(120,170,255,0.18);
      border-radius: 18px;
      box-shadow: 0 20px 48px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      background: #000; border-radius: 8px; overflow: hidden; position: relative;
    }
    #vncCanvas { display: block; width: 100%; height: auto; cursor: crosshair; }
    .placeholder { padding: 100px 20px; text-align: center; color: #64748b; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    body {
      background:
        radial-gradient(circle at 12% 16%, rgba(78,159,255,0.16), transparent 24%),
        radial-gradient(circle at 88% 20%, rgba(20,201,201,0.10), transparent 18%),
        linear-gradient(180deg, #050913 0%, #091121 48%, #060b14 100%);
      background-attachment: fixed;
    }
    .header,
    .canvas-container {
      background: rgba(8, 16, 30, 0.62);
      border: 1px solid rgba(120,170,255,0.18);
      border-radius: 18px;
      box-shadow: 0 20px 48px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
    }
    .controls input {
      background: rgba(8, 16, 30, 0.46);
      border-color: rgba(120,170,255,0.18);
      border-radius: 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .controls button {
      padding: 10px 24px;
      background: #165dff;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 10px 24px rgba(22,93,255,0.18);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🖥️ VNC 远程桌面控制</h1>
      <div class="controls">
        <input id="targetInput" type="text" placeholder="目标地址 (例: 192.168.1.100:5900)" value="172.28.112.1:5900" />
        <button id="connectBtn" onclick="connect()">连接</button>
        <button id="disconnectBtn" class="disconnect" onclick="disconnect()" style="display:none;">断开</button>
      </div>
    </div>

    <div class="status">
      <div class="status-indicator" id="statusIndicator"></div>
      <div class="status-text" id="statusText">未连接 - 请输入目标地址并点击连接</div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="canvas-container">
      <canvas id="vncCanvas"></canvas>
      <div class="placeholder" id="placeholder">
        <p style="font-size: 18px; margin-bottom: 8px;">准备就绪</p>
        <p style="font-size: 14px;">请输入目标VNC服务器地址并点击连接</p>
      </div>
    </div>
  </div>

<script>
// WebSocket VNC 客户端（简化版 - 使用原始RFB协议）
let ws = null;
let canvas = null;
let ctx = null;
let isConnected = false;

const $ = (id) => document.getElementById(id);
const statusIndicator = $('statusIndicator');
const statusText = $('statusText');
const errorBox = $('errorBox');
const connectBtn = $('connectBtn');
const disconnectBtn = $('disconnectBtn');
const targetInput = $('targetInput');
const placeholder = $('placeholder');

function updateStatus(state, text) {
  statusIndicator.className = 'status-indicator ' + state;
  statusText.textContent = text;
}

function showError(msg) {
  errorBox.textContent = '❌ ' + msg;
  errorBox.style.display = 'block';
}

function hideError() {
  errorBox.style.display = 'none';
}

function connect() {
  hideError();
  const target = targetInput.value.trim();
  if (!target) {
    showError('请输入目标VNC地址（格式: IP:端口）');
    return;
  }

  updateStatus('connecting', '正在连接到 ' + target + '...');
  connectBtn.style.display = 'none';
  disconnectBtn.style.display = 'inline-block';

  // 构建WebSocket URL
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${proto}//${location.host}/api/vnc/ws?target=${encodeURIComponent(target)}`;

  console.log('连接到:', wsUrl);

  try {
    ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      console.log('WebSocket已连接');
      updateStatus('connected', '✓ WebSocket已建立 - 等待VNC握手...');
    };

    ws.onmessage = (event) => {
      handleVNCMessage(event.data);
    };

    ws.onerror = (error) => {
      console.error('WebSocket错误:', error);
      showError('WebSocket连接错误 - 请检查网络和后端服务');
      updateStatus('error', '连接错误');
    };

    ws.onclose = (event) => {
      console.log('WebSocket已关闭', event);
      isConnected = false;
      updateStatus('', '已断开');
      connectBtn.style.display = 'inline-block';
      disconnectBtn.style.display = 'none';
      if (!event.wasClean) {
        showError(`连接断开: ${event.reason || '未知原因 (code: ' + event.code + ')'}`);
      }
    };

  } catch (err) {
    console.error('连接异常:', err);
    showError('连接失败: ' + err.message);
    updateStatus('error', '连接失败');
    connectBtn.style.display = 'inline-block';
    disconnectBtn.style.display = 'none';
  }
}

function disconnect() {
  if (ws) {
    ws.close();
    ws = null;
  }
  isConnected = false;
  updateStatus('', '已断开');
  connectBtn.style.display = 'inline-block';
  disconnectBtn.style.display = 'none';
}

let receivedBytes = 0;
let vncState = 'handshake';

function handleVNCMessage(data) {
  receivedBytes += data.byteLength;
  
  if (vncState === 'handshake') {
    // VNC握手阶段
    const view = new Uint8Array(data);
    const text = String.fromCharCode.apply(null, view.slice(0, Math.min(12, view.length)));
    console.log('收到VNC数据:', text, '字节数:', data.byteLength);
    
    if (text.startsWith('RFB')) {
      updateStatus('connected', `✓ VNC握手成功 (${text.trim()}) - 已接收 ${receivedBytes} 字节`);
      placeholder.style.display = 'none';
      initCanvas();
      vncState = 'connected';
      isConnected = true;
      
      // 发送客户端版本响应（RFB 003.008）
      if (ws && ws.readyState === WebSocket.OPEN) {
        const response = new TextEncoder().encode('RFB 003.008\n');
        ws.send(response);
      }
    } else {
      console.log('等待VNC握手...');
    }
  } else if (vncState === 'connected') {
    // 已连接状态 - 接收帧缓冲数据
    updateStatus('connected', `✓ 已连接 - 已接收 ${(receivedBytes / 1024).toFixed(1)} KB`);
    // TODO: 解析并渲染VNC帧数据到Canvas
    // 这里需要实现完整的RFB协议解析，比较复杂
    console.log('接收VNC数据:', data.byteLength, '字节');
  }
}

function initCanvas() {
  canvas = $('vncCanvas');
  ctx = canvas.getContext('2d');
  canvas.width = 1024;
  canvas.height = 768;
  
  // 绘制提示信息
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#10b981';
  ctx.font = '24px "Source Han Sans SC", "Source Han Sans CN", "Source Han Sans", "思源黑体", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('VNC连接已建立', canvas.width / 2, canvas.height / 2 - 20);
  ctx.fillStyle = '#64748b';
  ctx.font = '14px "Source Han Sans SC", "Source Han Sans CN", "Source Han Sans", "思源黑体", sans-serif';
  ctx.fillText('正在等待远程桌面画面...', canvas.width / 2, canvas.height / 2 + 10);
  ctx.fillText('(完整的VNC画面渲染需要实现RFB协议解析)', canvas.width / 2, canvas.height / 2 + 30);
}

// 键盘和鼠标事件转发
document.addEventListener('DOMContentLoaded', () => {
  const urlParams = new URLSearchParams(location.search);
  const target = urlParams.get('target');
  if (target) {
    targetInput.value = target;
  }
});
</script>
</body>
</html>
