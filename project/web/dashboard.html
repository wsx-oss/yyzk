<!DOCTYPE html>
<html lang="zh-CN">
<script>if(localStorage.getItem('cc-theme')==='dark')document.documentElement.classList.add('dark')</script>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>云翼智控</title>
  <link rel="icon" type="image/jpeg" href="/app/logo.jpg" />
  <style>
    :root {
      --sidebar-width: 220px;
      --sidebar-collapsed-width: 60px;
      --navbar-height: 60px;
      --cc-primary: #165dff;
      --cc-primary-light: #e8f3ff;
      --cc-primary-hover: #0e42d2;
      --cc-bg-1: #f7f8fa;
      --cc-bg-2: #ffffff;
      --cc-bg-3: #f2f3f5;
      --cc-border: #e5e6eb;
      --cc-text-1: #1d2129;
      --cc-text-2: #4e5969;
      --cc-text-3: #86909c;
      --cc-text-4: #c9cdd4;
      --cc-sidebar-bg: #ffffff;
      --cc-sidebar-border: #e5e6eb;
      --cc-sidebar-text: #4e5969;
      --cc-sidebar-text-hover: #1d2129;
      --cc-sidebar-hover: #f2f3f5;
      --cc-sidebar-active-bg: rgba(22,93,255,0.08);
      --cc-sidebar-active-text: #165dff;
      --cc-sidebar-section: #86909c;
      --cc-sidebar-footer: #c9cdd4;
      --cc-font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      --cc-shadow-1: 0 10px 30px rgba(15, 23, 42, 0.08);
      --cc-shadow-2: 0 24px 60px rgba(15, 23, 42, 0.10);
      --cc-glass-bg: rgba(255,255,255,0.58);
      --cc-glass-bg-strong: rgba(255,255,255,0.74);
      --cc-glass-bg-soft: rgba(255,255,255,0.38);
      --cc-glass-border: rgba(255,255,255,0.56);
      --cc-glass-border-strong: rgba(255,255,255,0.82);
      --cc-page-bg: radial-gradient(circle at top left, rgba(22,93,255,0.14), transparent 30%), radial-gradient(circle at top right, rgba(20,201,201,0.10), transparent 26%), linear-gradient(180deg, #f4f8ff 0%, #eef3fb 46%, #f8fafc 100%);
    }
    /* ===== Dark Theme — Blue-Black Tech ===== */
    html.dark {
      --cc-primary: #4e9fff;
      --cc-primary-light: rgba(60,140,255,0.12);
      --cc-primary-hover: #6db3ff;
      --cc-bg-1: #080d1a;
      --cc-bg-2: #0e1525;
      --cc-bg-3: #151d30;
      --cc-border: rgba(56,132,255,0.25);
      --cc-text-1: rgba(224,235,255,0.95);
      --cc-text-2: rgba(185,205,240,0.85);
      --cc-text-3: rgba(145,175,225,0.72);
      --cc-text-4: rgba(110,145,200,0.50);
      --cc-sidebar-bg: #0a1020;
      --cc-sidebar-border: rgba(56,132,255,0.1);
      --cc-sidebar-text: rgba(185,205,240,0.85);
      --cc-sidebar-text-hover: rgba(224,235,255,0.95);
      --cc-sidebar-hover: rgba(40,100,255,0.10);
      --cc-sidebar-active-bg: rgba(60,140,255,0.18);
      --cc-sidebar-active-text: #6db3ff;
      --cc-sidebar-section: rgba(130,170,230,0.65);
      --cc-sidebar-footer: rgba(110,150,200,0.55);
      --cc-shadow-1: 0 12px 36px rgba(2, 10, 28, 0.42), 0 0 32px rgba(40,100,255,0.04);
      --cc-shadow-2: 0 28px 72px rgba(2, 10, 28, 0.56), 0 0 48px rgba(40,100,255,0.06);
      --cc-glass-bg: rgba(9,16,32,0.58);
      --cc-glass-bg-strong: rgba(10,18,36,0.74);
      --cc-glass-bg-soft: rgba(18,30,56,0.42);
      --cc-glass-border: rgba(120,170,255,0.14);
      --cc-glass-border-strong: rgba(150,200,255,0.26);
      --cc-page-bg: radial-gradient(circle at top left, rgba(60,140,255,0.16), transparent 32%), radial-gradient(circle at 100% 0%, rgba(20,201,201,0.10), transparent 22%), linear-gradient(180deg, #050914 0%, #08101e 44%, #080d1a 100%);
      color-scheme: dark;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--cc-font);
      background: var(--cc-page-bg, var(--cc-bg-1));
      overflow: hidden;
      color: var(--cc-text-1);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      position: relative;
    }

    /* ===== Navbar (Fixed top) ===== */
    .layout-navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--navbar-height);
      background: var(--cc-glass-bg-strong);
      backdrop-filter: blur(26px) saturate(180%);
      -webkit-backdrop-filter: blur(26px) saturate(180%);
      border-bottom: 1px solid var(--cc-glass-border);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      box-shadow: var(--cc-shadow-1), inset 0 1px 0 var(--cc-glass-border-strong);
    }
    .navbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--cc-text-1);
    }
    .navbar-logo img {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      object-fit: cover;
    }
    .navbar-logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #165dff, #14c9c9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .navbar-collapse-btn {
      width: 32px; height: 32px;
      border: 1px solid var(--cc-glass-border);
      border-radius: 8px;
      background: var(--cc-glass-bg-soft);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cc-text-3);
      font-size: 18px;
      transition: all 0.2s;
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
    }
    .navbar-collapse-btn:hover {
      border-color: var(--cc-primary);
      color: var(--cc-primary);
      background: rgba(22,93,255,0.12);
    }
    .navbar-breadcrumb {
      display: none;
    }
    .navbar-breadcrumb span { color: var(--cc-text-4); }
    .navbar-breadcrumb .bc-current { color: var(--cc-text-1); font-weight: 500; }
    .navbar-right {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
    }
    .navbar-right li {
      display: flex;
      align-items: center;
    }
    .nav-btn {
      width: 36px; height: 36px;
      border: 1px solid var(--cc-glass-border);
      border-radius: 50%;
      background: var(--cc-glass-bg-soft);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cc-text-2);
      font-size: 16px;
      transition: all 0.2s;
      position: relative;
      margin: 0 4px;
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
    }
    .nav-btn:hover {
      border-color: var(--cc-primary);
      color: var(--cc-primary);
      background: rgba(22,93,255,0.12);
    }
    .nav-btn .badge {
      position: absolute;
      top: -2px; right: -2px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f53f3f;
      border: 2px solid var(--cc-bg-2);
    }
    .user-dropdown {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 12px 4px 4px;
      border-radius: 20px;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      margin-left: 8px;
      position: relative;
      background: var(--cc-glass-bg-soft);
      border: 1px solid transparent;
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
    }
    .user-dropdown:hover { background: var(--cc-glass-bg); border-color: var(--cc-glass-border); box-shadow: inset 0 1px 0 var(--cc-glass-border-strong); }
    .user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--cc-glass-border);
      background: var(--cc-glass-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: inset 0 1px 0 var(--cc-glass-border-strong);
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-name {
      font-size: 14px;
      color: var(--cc-text-1);
      font-weight: 500;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .user-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 8px;
      background: var(--cc-glass-bg-strong);
      backdrop-filter: blur(26px) saturate(180%);
      -webkit-backdrop-filter: blur(26px) saturate(180%);
      border-radius: var(--cc-radius-lg);
      box-shadow: var(--cc-shadow-1), inset 0 1px 0 var(--cc-glass-border-strong);
      border: 1px solid var(--cc-glass-border);
      min-width: 160px;
      padding: 6px;
      z-index: 200;
      animation: menuFadeIn 0.15s ease-out;
    }
    .user-menu.show { display: block; }
    .user-menu-item {
      padding: 8px 16px;
      font-size: 14px;
      color: var(--cc-text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
      border-radius: 8px;
    }
    .user-menu-item:hover { background: rgba(0,0,0,0.04); color: var(--cc-text-1); }
    .user-menu-item.danger { color: #f53f3f; }
    .user-menu-item.danger:hover { background: #ffece8; }
    .user-menu-divider { height: 1px; background: var(--cc-border); margin: 4px 0; }

    /* ===== Sidebar ===== */
    .layout-sidebar {
      position: fixed;
      top: var(--navbar-height);
      left: 0;
      width: var(--sidebar-width);
      height: calc(100vh - var(--navbar-height));
      background: var(--cc-glass-bg);
      backdrop-filter: blur(26px) saturate(180%);
      -webkit-backdrop-filter: blur(26px) saturate(180%);
      border-right: 1px solid var(--cc-glass-border);
      z-index: 99;
      transition: width 0.2s cubic-bezier(0.34, 0.69, 0.1, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: inset -1px 0 0 var(--cc-glass-border-strong);
    }
    .layout-sidebar.collapsed {
      width: var(--sidebar-collapsed-width);
    }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--cc-text-4) transparent;
    }
    .sidebar-nav::-webkit-scrollbar { width: 4px; }
    .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: var(--cc-text-4); border-radius: 2px; }

    .nav-section-label {
      padding: 20px 16px 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--cc-sidebar-section);
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      overflow: hidden;
    }
    .layout-sidebar.collapsed .nav-section-label {
      opacity: 0;
      height: 0;
      padding: 0;
      overflow: hidden;
    }
    .nav-item {
      padding: 0 8px;
      margin: 2px 0;
    }
    .nav-item a, .nav-item-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      color: var(--cc-sidebar-text);
      text-decoration: none;
      font-size: 14px;
      border-radius: 10px;
      transition: all 0.2s;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      border: 1px solid transparent;
    }
    .nav-item a:hover, .nav-item-link:hover {
      background: var(--cc-glass-bg-soft);
      color: var(--cc-sidebar-text-hover);
      border-color: var(--cc-glass-border);
    }
    .nav-item a.active, .nav-item-link.active {
      background: var(--cc-sidebar-active-bg);
      color: var(--cc-sidebar-active-text);
      font-weight: 500;
      border-radius: 10px;
      border-color: rgba(22,93,255,0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
    }
    .nav-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      opacity: 0.85;
    }
    .nav-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .layout-sidebar.collapsed .nav-text {
      display: none;
    }
    .layout-sidebar.collapsed .nav-group-arrow {
      display: none;
    }

    .nav-group-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      color: var(--cc-sidebar-text);
      font-size: 14px;
      border-radius: 10px;
      transition: all 0.2s;
      cursor: pointer;
      white-space: nowrap;
      margin: 0 8px;
      user-select: none;
      border: 1px solid transparent;
    }
    .nav-group-toggle:hover {
      background: var(--cc-glass-bg-soft);
      color: var(--cc-sidebar-text-hover);
      border-color: var(--cc-glass-border);
    }
    .nav-group-toggle.has-active {
      color: var(--cc-sidebar-text-hover);
    }
    .nav-group-arrow {
      margin-left: auto;
      font-size: 10px;
      transition: transform 0.2s;
      color: var(--cc-sidebar-section);
    }
    .nav-group-toggle.open .nav-group-arrow {
      transform: rotate(90deg);
    }
    .nav-group-children {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s cubic-bezier(0.34, 0.69, 0.1, 1);
    }
    .nav-group-children.open {
      max-height: 500px;
    }
    .nav-group-children .nav-item a,
    .nav-group-children .nav-item-link {
      padding-left: 46px;
      font-size: 13px;
    }
    .layout-sidebar.collapsed .nav-group-children {
      max-height: 0 !important;
    }

    /* ===== Main Content ===== */
    .layout-content {
      margin-left: var(--sidebar-width);
      padding-top: var(--navbar-height);
      height: 100vh;
      transition: margin-left 0.2s cubic-bezier(0.34, 0.69, 0.1, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: transparent;
    }
    .layout-content.sidebar-collapsed {
      margin-left: var(--sidebar-collapsed-width);
    }
    .content-area {
      flex: 1;
      overflow: hidden;
      padding: 14px 14px 16px;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      box-shadow: var(--cc-shadow-2), inset 0 1px 0 var(--cc-glass-border-strong);
    }

    /* ===== Data Screen Fullscreen ===== */
    body.ds-page-fullscreen .layout-navbar,
    body.ds-page-fullscreen .layout-sidebar { display:none !important; }
    body.ds-page-fullscreen .layout-content { margin-left:0 !important; padding-top:0 !important; }
    body.ds-page-fullscreen .content-area { border-radius:0; }
    body.ds-page-fullscreen iframe { border-radius:0; }

    /* ===== Animations ===== */
    @keyframes menuFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== View Transition Theme Animation ===== */
    ::view-transition-old(root) {
      z-index: 1;
    }
    ::view-transition-new(root) {
      z-index: 9999;
    }
    ::view-transition-old(*) {
      animation: none;
    }
    ::view-transition-new(*) {
      animation: themeClip 0.5s ease-in both;
    }
    html.dark::view-transition-old(*) {
      animation: themeClip 0.5s ease-in reverse both;
    }
    html.dark::view-transition-new(*) {
      animation: none;
    }
    html.dark::view-transition-old(root) {
      z-index: 9999;
    }
    html.dark::view-transition-new(root) {
      z-index: 1;
    }
    @keyframes themeClip {
      from { clip-path: circle(0% at var(--x) var(--y)); }
      to   { clip-path: circle(var(--r) at var(--x) var(--y)); }
    }

    /* ===== Theme toggle button ===== */
    .theme-toggle-btn {
      width: 36px; height: 36px;
      border: 1px solid var(--cc-glass-border);
      border-radius: 50%;
      background: var(--cc-glass-bg-soft);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cc-text-2);
      font-size: 18px;
      transition: all 0.2s;
      margin: 0 4px;
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
    }
    .theme-toggle-btn:hover {
      border-color: var(--cc-primary);
      color: var(--cc-primary);
      background: rgba(22,93,255,0.12);
    }
    .theme-toggle-btn svg {
      transition: transform 0.3s ease;
    }
    .theme-toggle-btn:hover svg {
      transform: rotate(30deg);
    }

    /* ===== Tooltip on collapsed sidebar ===== */
    .layout-sidebar.collapsed .nav-item a,
    .layout-sidebar.collapsed .nav-item-link {
      justify-content: center;
      padding: 10px 0;
      position: relative;
    }
    .layout-sidebar.collapsed .nav-group-toggle {
      justify-content: center;
      padding: 10px 0;
      margin: 0 4px;
      position: relative;
    }
    /* Sidebar tooltip (JS-driven, appended to body) */
    .sidebar-tooltip {
      position: fixed;
      background: rgba(30,30,30,0.88);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      color: #fff;
      padding: 6px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      pointer-events: none;
      z-index: 9999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18), 0 0 0 0.5px rgba(255,255,255,0.08);
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .sidebar-tooltip.visible {
      opacity: 1;
    }

    /* ===== Sidebar footer ===== */
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--cc-sidebar-border);
      color: var(--cc-sidebar-footer);
      font-size: 11px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      background: var(--cc-glass-bg-soft);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
    }
    .layout-sidebar.collapsed .sidebar-footer {
      display: none;
    }

    /* ===== Dark overrides for injected widgets ===== */
    html.dark .ai-msg.assistant .ai-msg-bubble {
      background: var(--cc-bg-3) !important;
      color: var(--cc-text-1) !important;
      border-color: var(--cc-border) !important;
    }
    html.dark .ai-msg.user .ai-msg-avatar {
      background: var(--cc-bg-3) !important;
      color: var(--cc-text-2) !important;
    }
    html.dark .ai-suggestions,
    html.dark .ai-quick-cmds,
    html.dark .ai-input-area {
      background: var(--cc-bg-2) !important;
      border-color: var(--cc-border) !important;
    }
    html.dark .ai-suggestions .sug-btn {
      background: var(--cc-bg-3) !important;
      color: var(--cc-text-2) !important;
      border-color: var(--cc-border) !important;
    }
    html.dark .ai-suggestions .sug-btn:hover {
      background: var(--cc-border) !important;
      color: var(--cc-text-1) !important;
    }
    html.dark .ai-quick-cmds .qcmd {
      background: var(--cc-bg-3) !important;
      color: var(--cc-text-2) !important;
      border-color: var(--cc-border) !important;
    }
    html.dark .ai-input-area input {
      background: var(--cc-bg-3) !important;
      color: var(--cc-text-1) !important;
      border-color: var(--cc-border) !important;
    }
    html.dark .ai-input-area input:focus {
      border-color: #0ea5e9 !important;
    }
    html.dark #ai-panel {
      background: var(--cc-bg-2) !important;
      border-color: rgba(56,132,255,0.12) !important;
      box-shadow: 0 8px 40px rgba(4,8,20,0.5), 0 0 30px rgba(40,100,255,0.04) !important;
    }
    html.dark #notif-panel {
      background: var(--cc-bg-2) !important;
      box-shadow: 0 8px 40px rgba(4,8,20,0.5), 0 0 30px rgba(40,100,255,0.04) !important;
      border-color: rgba(56,132,255,0.12) !important;
    }
    html.dark .notif-header {
      border-color: var(--cc-border) !important;
    }
    html.dark .notif-header h3 {
      color: var(--cc-text-1) !important;
    }
    html.dark .notif-header-actions button {
      background: var(--cc-bg-3) !important;
      border-color: var(--cc-border) !important;
      color: var(--cc-text-2) !important;
    }
    html.dark .notif-header-actions button:hover {
      background: var(--cc-border) !important;
      color: var(--cc-text-1) !important;
    }
    html.dark .notif-filters {
      border-color: var(--cc-border) !important;
    }
    html.dark .notif-filters .nf-btn {
      background: var(--cc-bg-3) !important;
      color: var(--cc-text-2) !important;
      border-color: var(--cc-border) !important;
    }
    html.dark .notif-filters .nf-btn:hover {
      background: var(--cc-border) !important;
    }
    html.dark .notif-filters .nf-btn.active {
      background: #0ea5e9 !important;
      color: #fff !important;
      border-color: #0ea5e9 !important;
    }
    html.dark .notif-item {
      border-color: var(--cc-border) !important;
    }

  <script>
    // ---- Auth guard ----
    const token = localStorage.getItem('token');
    const storedUsername = localStorage.getItem('username');
    if (!token) { window.location.href = '/app/login.html'; }

    const usernameEl = document.getElementById('username');
    usernameEl.textContent = storedUsername || '用户';

    // ---- Logout ----
    document.getElementById('btnLogout').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = '/app/login.html';
    });

    // ---- User dropdown ----
    const userDropdown = document.getElementById('userDropdown');
    const userMenu = document.getElementById('userMenu');
    userDropdown.addEventListener('click', (e) => {
      e.stopPropagation();
      userMenu.classList.toggle('show');
    });
    document.addEventListener('click', () => { userMenu.classList.remove('show'); });

    // ---- Fullscreen ----
    document.getElementById('btnFullscreen').addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    // ---- Sidebar collapse ----
    const sidebar = document.getElementById('sidebar');
    const layoutContent = document.getElementById('layoutContent');
    // Restore sidebar collapse state
    if (localStorage.getItem('cc-sidebar-collapsed') === '1') {
      sidebar.classList.add('collapsed');
      layoutContent.classList.add('sidebar-collapsed');
    }
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
      layoutContent.classList.toggle('sidebar-collapsed');
      localStorage.setItem('cc-sidebar-collapsed', sidebar.classList.contains('collapsed') ? '1' : '0');
    });

    // ---- Nav group toggle ----
    document.querySelectorAll('.nav-group-toggle').forEach(toggle => {
      toggle.addEventListener('click', () => {
        if (sidebar.classList.contains('collapsed')) {
          sidebar.classList.remove('collapsed');
          layoutContent.classList.remove('sidebar-collapsed');
          localStorage.setItem('cc-sidebar-collapsed', '0');
        }
        toggle.classList.toggle('open');
        const children = toggle.nextElementSibling;
        if (children) children.classList.toggle('open');
      });
    });

    // ---- Sidebar collapsed tooltips (JS-driven) ----
    const sidebarTooltip = document.createElement('div');
    sidebarTooltip.className = 'sidebar-tooltip';
    document.body.appendChild(sidebarTooltip);

    function showSidebarTooltip(e) {
      if (!sidebar.classList.contains('collapsed')) return;
      const label = e.currentTarget.dataset.label;
      if (!label) return;
      const rect = e.currentTarget.getBoundingClientRect();
      sidebarTooltip.textContent = label;
      sidebarTooltip.style.left = (rect.right + 8) + 'px';
      sidebarTooltip.style.top = (rect.top + rect.height / 2) + 'px';
      sidebarTooltip.style.transform = 'translateY(-50%)';
      sidebarTooltip.classList.add('visible');
    }
    function hideSidebarTooltip() {
      sidebarTooltip.classList.remove('visible');
    }

    document.querySelectorAll('.nav-item a[data-label], .nav-item-link[data-label], .nav-group-toggle[data-label]').forEach(el => {
      el.addEventListener('mouseenter', showSidebarTooltip);
      el.addEventListener('mouseleave', hideSidebarTooltip);
    });

    // ---- Navigation ----
    const iframe = document.getElementById('contentFrame');
    const bcCurrent = document.getElementById('bcCurrent');

    function navigateTo(page) {
      let hash = '';
      if (page.includes('#')) {
        const parts = page.split('#');
        page = parts[0];
        hash = '#' + parts[1];
      }
      // Clear active
      document.querySelectorAll('.nav-item a, .nav-item-link').forEach(i => i.classList.remove('active'));
      // Set active
      const target = document.querySelector(`[data-page="${page}"]`);
      if (target) {
        target.classList.add('active');
        // Open parent group
        const group = target.closest('.nav-group-children');
        if (group) {
          group.classList.add('open');
          const toggle = group.previousElementSibling;
          if (toggle) toggle.classList.add('open');
        }
        // Update breadcrumb
        bcCurrent.textContent = target.dataset.label || page;
      }
      // Clear old content before loading new page to prevent stale display
      const newSrc = `/app/modules/${page}.html${hash}`;
      if (iframe.contentDocument) {
        try { iframe.contentDocument.open(); iframe.contentDocument.write(''); iframe.contentDocument.close(); } catch(e) {}
      }
      iframe.src = newSrc;
    }

    document.querySelectorAll('.nav-item a[data-page], .nav-item-link[data-page]').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.setItem('cc-active-page', item.dataset.page);
        navigateTo(item.dataset.page);
      });
    });

    // Expose for iframe child pages
    window.navigateTo = navigateTo;

    // Restore last active page on load
    const savedPage = localStorage.getItem('cc-active-page');
    if (savedPage) {
      navigateTo(savedPage);
    } else {
      navigateTo('monitor');
    }

    // ---- Theme System ----
    const isDark = () => document.documentElement.classList.contains('dark');
    const sunIcon = document.querySelector('.theme-icon-sun');
    const moonIcon = document.querySelector('.theme-icon-moon');

    function updateThemeIcons() {
      if (isDark()) {
        sunIcon.style.display = '';
        moonIcon.style.display = 'none';
      } else {
        sunIcon.style.display = 'none';
        moonIcon.style.display = '';
      }
    }

    function applyThemeClass(dark) {
      if (dark) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      localStorage.setItem('cc-theme', dark ? 'dark' : 'light');
      updateThemeIcons();
      // Propagate to iframe
      const frame = document.getElementById('contentFrame');
      if (frame && frame.contentWindow) {
        frame.contentWindow.postMessage({ type: 'cc-theme-change', dark: dark }, '*');
      }
    }

    function toggleTheme() {
      applyThemeClass(!isDark());
    }

    // View Transition API animation (reference project style)
    document.getElementById('btnThemeToggle').addEventListener('click', function(e) {
      const x = e.clientX;
      const y = e.clientY;
      const endRadius = Math.hypot(Math.max(x, innerWidth - x), Math.max(y, innerHeight - y));

      document.documentElement.style.setProperty('--x', x + 'px');
      document.documentElement.style.setProperty('--y', y + 'px');
      document.documentElement.style.setProperty('--r', endRadius + 'px');

      if (document.startViewTransition) {
        document.startViewTransition(() => toggleTheme());
      } else {
        toggleTheme();
      }
    });

    // Restore theme on load
    if (localStorage.getItem('cc-theme') === 'dark') {
      document.documentElement.classList.add('dark');
    }
    updateThemeIcons();

    // Sync theme to iframe on load
    iframe.addEventListener('load', function() {
      if (iframe.contentWindow) {
        iframe.contentWindow.postMessage({ type: 'cc-theme-change', dark: isDark() }, '*');
      }
    });

    // Data screen fullscreen toggle from iframe — instant switch
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'ds-fullscreen') {
        if (e.data.enter) {
          document.body.classList.add('ds-page-fullscreen');
        } else {
          document.body.classList.remove('ds-page-fullscreen');
        }
      }
    });
  </script>
